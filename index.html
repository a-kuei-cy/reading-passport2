<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>興嘉閱讀護照</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <style>
    body { font-family: 'M PLUS Rounded 1c', sans-serif; background-color: #F9FAFB; background-image: radial-gradient(#E5E7EB 1.5px, transparent 1.5px); background-size: 24px 24px; }
    .clean-box { background-color: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid #F3F4F6; }
    .clean-btn { border-radius: 1rem; transition: all 0.2s ease; font-weight: 700; }
    .clean-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08); }
    .clean-btn:active { transform: translateY(1px); }
    .clean-input { border: 2px solid #E5E7EB; border-radius: 1rem; background-color: #FAFAFA; transition: all 0.2s; }
    .clean-input:focus { background-color: #ffffff; border-color: #60A5FA; box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15); outline: none; }
    .animate-bounce-in { animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.9) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #F3F4F6; border-radius: 10px;}
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }
  </style>
</head>
<body class="text-gray-800 antialiased min-h-screen pb-20 selection:bg-blue-200 selection:text-gray-900">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ✨ 您的 GAS 網址 (請確保有重新部署)
    const FIXED_GAS_URL = 'https://script.google.com/macros/s/AKfycbz8PuqxvXMnDOLizffDYbvjHkkUJc8wvfGlfAUcXSR-XVxawhnzOkmAmcgZ4ir8EzIt/exec';
    const ADMIN_PASSWORD = '1234'; 

    const Icon = ({ name, size = 18, className = "" }) => <i className={`fas fa-${name} ${className}`} style={{ fontSize: size }}></i>;
    const Card = ({ children, className = "" }) => <div className={`clean-box ${className}`}>{children}</div>;
    const Button = ({ children, onClick, variant = 'primary', className = "", icon, title, disabled=false }) => {
      const baseStyle = "flex items-center justify-center gap-2 clean-btn px-5 py-2.5 cursor-pointer shrink-0 disabled:opacity-50 disabled:cursor-not-allowed";
      const variants = {
        primary: "bg-blue-500 text-white hover:bg-blue-600",
        secondary: "bg-amber-400 text-amber-950 hover:bg-amber-500",
        danger: "bg-rose-500 text-white hover:bg-rose-600",
        success: "bg-emerald-500 text-white hover:bg-emerald-600",
        outline: "bg-white text-gray-700 border-2 border-gray-200 hover:border-gray-300 hover:bg-gray-50",
      };
      return (
        <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`} title={title} disabled={disabled}>
          {icon && <Icon name={icon} />}
          {children}
        </button>
      );
    };

    const Modal = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div className="clean-box w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh] animate-bounce-in m-2">
            <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-white">
              <h3 className="text-xl font-black text-gray-800">{title}</h3>
              <button onClick={onClose} className="w-8 h-8 rounded-full text-gray-400 hover:text-gray-700 hover:bg-gray-100 flex items-center justify-center">
                <Icon name="times" />
              </button>
            </div>
            <div className="p-6 overflow-y-auto bg-gray-50">{children}</div>
          </div>
        </div>
      );
    };

    function CSVToArray(strData) {
        let arrData = [[]];
        let matches = null;
        let objPattern = new RegExp(("(\\,|\\r?\\n|\\r|^)(?:\"([^\"]*(?:\"\"[^\"]*)*)\"|([^\\,\\r\\n]*))"),"gi");
        while (matches = objPattern.exec(strData)) {
            let strMatchedDelimiter = matches[1];
            if (strMatchedDelimiter.length && strMatchedDelimiter !== ",") arrData.push([]);
            let strMatchedValue;
            if (matches[2]) strMatchedValue = matches[2].replace(new RegExp("\"\"", "g"), "\"");
            else strMatchedValue = matches[3];
            arrData[arrData.length - 1].push(strMatchedValue);
        }
        return arrData.filter(row => row.length > 1 || (row.length === 1 && row[0] !== ""));
    }

    const App = () => {
      const gasUrl = FIXED_GAS_URL;
      const [currentView, setCurrentView] = useState('dashboard');
      const [loading, setLoading] = useState(false);
      const [loadingMsg, setLoadingMsg] = useState('與伺服器連線中...');
      const [msgBox, setMsgBox] = useState({ show: false, title: '', msg: '', onConfirm: null });
      const [records, setRecords] = useState([]);
      const [studentInfo, setStudentInfo] = useState({ classId: '', name: '' });
      const [isStudentSet, setIsStudentSet] = useState(false); 
      const [isAdminAuth, setIsAdminAuth] = useState(false);
      const [adminTab, setAdminTab] = useState('pending'); // pending, all, diagnostics
      const [tempPwd, setTempPwd] = useState('');
      const [diagnosticsLog, setDiagnosticsLog] = useState('');
      
      const [formData, setFormData] = useState({ 
        id: '', classId: '', name: '', bookTitle: '', author: '', publisher: '', pages: '', reviewType: 'text', review: '', image: '' 
      });
      const [isFormModalOpen, setIsFormModalOpen] = useState(false);
      const [viewRecordModal, setViewRecordModal] = useState({ show: false, data: null });

      const showMsg = (title, msg, onConfirm = null) => setMsgBox({ show: true, title, msg, onConfirm });

      const loadData = async () => {
        setLoading(true); setLoadingMsg('從資料庫讀取中...');
        try {
          // 嘗試使用 POST (大部分修改後的 GAS 習慣使用 POST)
          const params = new URLSearchParams(); params.append('action', 'getAll');
          let res;
          try {
             res = await fetch(gasUrl, { method: 'POST', body: params });
          } catch(e) {
             // 備用方案: 嘗試 GET
             res = await fetch(`${gasUrl}?action=getAll`);
          }
          
          const text = await res.text();
          let json;
          try { 
            json = JSON.parse(text); 
          } catch (e) { 
            console.error("回傳的不是有效 JSON:", text);
            return showMsg('資料格式錯誤', '無法解析 Google 試算表回傳的資料。\n請到「我是老師」>「🔧系統診斷」查看詳細錯誤訊息。'); 
          }

          // 🧠 智慧解析: 支援不同 GAS 寫法回傳的 JSON 結構
          let rawRecords = [];
          if (Array.isArray(json)) rawRecords = json;
          else if (json.data && Array.isArray(json.data.records)) rawRecords = json.data.records;
          else if (json.records && Array.isArray(json.records)) rawRecords = json.records;
          else if (json.data && Array.isArray(json.data)) rawRecords = json.data;

          // 🛡️ 智慧對應欄位 (容錯機制): 將中文欄位或不同大小寫轉換為標準 key，並自動去除空白
          const normalizedRecords = rawRecords.map(r => ({
            id: r.id || r['ID'] || r['編號'] || r['id'] || '',
            classId: String(r.classId || r['班級'] || r['ClassId'] || r['classid'] || '').trim(),
            name: String(r.name || r['姓名'] || r['Name'] || r['name'] || '').trim(),
            bookTitle: r.bookTitle || r['書名'] || r['BookTitle'] || r['booktitle'] || '',
            author: r.author || r['作者'] || r['Author'] || r['author'] || '',
            publisher: r.publisher || r['出版社'] || r['Publisher'] || r['publisher'] || '',
            pages: r.pages || r['頁數'] || r['Pages'] || r['pages'] || '',
            reviewType: r.reviewType || r['心得類型'] || r['繳交方式'] || r['Type'] || 'text',
            status: r.status || r['狀態'] || r['審核狀態'] || r['Status'] || 'pending',
            review: r.review || r['心得'] || r['文字心得'] || r['Review'] || '',
            image: r.image || r['圖片'] || r['圖片網址'] || r['Image'] || '',
            time: r.time || r['時間'] || r['時間戳記'] || r['Timestamp'] || ''
          }));

          setRecords(normalizedRecords.reverse());
        } catch (e) {
          showMsg('網路錯誤', '❌ 連線失敗！請確認網路狀態或 GAS 網址是否正確。');
          console.error(e);
        } finally { 
          setLoading(false); 
        }
      };

      const runDiagnostics = async () => {
        setDiagnosticsLog('⏳ 開始測試連線與抓取資料...\n--------------------------------\n');
        try {
          const params = new URLSearchParams(); params.append('action', 'getAll');
          setDiagnosticsLog(prev => prev + `👉 正在向 GAS 網址發送 POST 請求...\n`);
          const res = await fetch(gasUrl, { method: 'POST', body: params });
          const text = await res.text();
          
          setDiagnosticsLog(prev => prev + `✅ 成功收到伺服器回應 (長度: ${text.length} 字元)\n\n👉 嘗試解析 JSON 格式...\n`);
          
          try {
            const json = JSON.parse(text);
            setDiagnosticsLog(prev => prev + `✅ JSON 解析成功！\n\n📌 伺服器回傳的原始資料結構前 300 字：\n${JSON.stringify(json, null, 2).substring(0, 300)}...\n\n👉 判斷：如果您看到這串資料，代表前後端連線正常。如果是空的 []，代表您的試算表目前沒有資料，或 Google Apps Script 抓錯工作表(Sheet)。`);
          } catch(e) {
            setDiagnosticsLog(prev => prev + `❌ JSON 解析失敗！\n錯誤原因: ${e.message}\n\n📌 伺服器實際回傳的內容 (前 300 字)：\n${text.substring(0, 300)}...\n\n👉 判斷：通常是因為 GAS 發布時權限沒有設為「所有人」，或者程式碼寫錯導致回傳 HTML 錯誤頁面而非 JSON 資料。請回 Google 試算表重新部署一次。`);
          }

        } catch(e) {
          setDiagnosticsLog(prev => prev + `❌ 網路請求完全失敗！\n錯誤: ${e.message}\n👉 判斷：請檢查網路是否斷線，或者您的 GAS 網址 (${gasUrl}) 是不是貼錯了。`);
        }
      };

      useEffect(() => { loadData(); }, []);

      const apiCall = async (action, id = null, data = null, silent = false) => {
        if(!silent) { setLoading(true); setLoadingMsg('處理中...'); }
        try {
          const params = new URLSearchParams(); params.append('action', action);
          if (id) params.append('id', id);
          if (data) params.append('data', JSON.stringify(data));

          const res = await fetch(gasUrl, { method: 'POST', body: params });
          const text = await res.text();
          let json;
          try { json = JSON.parse(text); } catch (e) { if(!silent) showMsg('執行失敗', '無法解析伺服器回傳內容:\n' + text); return false; }

          if (json.status === 'success') {
            if(!silent) await loadData();
            return true;
          } else {
            if(!silent) showMsg('執行失敗', json.message || '發生未知錯誤');
            return false;
          }
        } catch (e) {
          if(!silent) showMsg('網路錯誤', '❌ 連線發生錯誤。');
          return false;
        } finally {
          if(!silent) setLoading(false);
        }
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 5 * 1024 * 1024) return showMsg('提醒', '圖片不能超過 5MB 喔！');
          const reader = new FileReader();
          reader.onload = (event) => setFormData({ ...formData, image: event.target.result, review: '' });
          reader.readAsDataURL(file);
        }
      };

      const submitForm = async () => {
        if (!formData.classId || !formData.name || !formData.bookTitle) return showMsg('提醒', '請完整填寫班級、姓名與書名！');
        
        // 驗證字數限制 (100 ~ 500字)
        if (formData.reviewType === 'text') {
          const textLen = (formData.review || '').trim().length;
          if (textLen < 100) {
            return showMsg('字數不足', `心得字數最少需要 100 字喔！\n目前字數：${textLen} 字，還差 ${100 - textLen} 字，再多寫一點吧！加油！💪`);
          }
          if (textLen > 500) {
            return showMsg('字數太多', `心得字數不能超過 500 字喔！\n目前字數：${textLen} 字，請稍微精簡一下內容。`);
          }
        }
        
        if (formData.reviewType === 'image' && !formData.image) return showMsg('提醒', '請上傳畫作或圖片！');

        const success = await apiCall(formData.id ? 'updateRecord' : 'addRecord', formData.id, formData);
        if (success) {
          setIsFormModalOpen(false);
          showMsg('太棒了！', formData.id ? '紀錄已成功更新！' : '紀錄已送出，請等待老師審核喔！');
        }
      };

      const exportCSV = () => {
        let csvContent = "\uFEFF"; 
        csvContent += "ID,時間,班級,姓名,書名,作者,出版社,頁數,心得類型,狀態,文字心得,圖片網址\n";
        records.forEach(r => {
          const safeReview = r.review ? r.review.replace(/"/g, '""') : '';
          const row = [
            r.id, r.time, r.classId, r.name, `"${r.bookTitle}"`, `"${r.author||''}"`, `"${r.publisher||''}"`, r.pages||'', 
            r.reviewType, r.status, `"${safeReview}"`, r.image||''
          ].join(',');
          csvContent += row + "\n";
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `閱讀護照資料_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
      };

      const handleImportCSV = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        showMsg('確認匯入', '即將逐筆將 CSV 的資料匯入系統中。這可能需要幾分鐘的時間，請勿關閉網頁。', async () => {
          setMsgBox({show: false});
          const text = await file.text();
          const rows = CSVToArray(text);
          
          if(rows.length < 2) return showMsg('錯誤', '找不到有效資料列');
          
          setLoading(true);
          let successCount = 0; let failCount = 0;
          
          for(let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if(row.length < 5) continue; 
            
            setLoadingMsg(`匯入中... (${i} / ${rows.length - 1})`);
            const newRecord = {
              id: '', classId: row[2] || '未填', name: row[3] || '未填', bookTitle: row[4] || '未填',
              author: row[5] || '', publisher: row[6] || '', pages: row[7] || '', reviewType: row[8] || 'text',
              status: row[9] || 'approved', review: row[10] || '', image: row[11] || ''
            };
            const success = await apiCall('addRecord', null, newRecord, true); 
            if(success) successCount++; else failCount++;
          }
          setLoading(false);
          await loadData();
          showMsg('匯入完成', `共處理 ${rows.length - 1} 筆資料。\n成功：${successCount} 筆\n失敗：${failCount} 筆`);
        });
        e.target.value = ''; 
      };

      const renderNavbar = () => (
        <nav className="bg-white border-b border-gray-100 sticky top-0 z-40 px-4 py-3 shadow-sm">
          <div className="max-w-6xl mx-auto flex flex-wrap justify-between items-center gap-4">
            <div className="flex items-center gap-3 cursor-pointer group" onClick={() => setCurrentView('dashboard')}>
              <div className="bg-blue-500 p-2.5 rounded-xl text-white shadow-md shadow-blue-500/30 group-hover:scale-105"><Icon name="book-reader" size={24} /></div>
              <h1 className="text-xl md:text-2xl font-black text-gray-800 tracking-wide">興嘉閱讀護照</h1>
            </div>
            <div className="flex gap-2 flex-wrap">
              <Button variant={currentView === 'dashboard' ? 'primary' : 'outline'} className="py-2 px-3" onClick={() => setCurrentView('dashboard')}><Icon name="home" /> <span className="hidden sm:inline">榮譽大廳</span></Button>
              <Button variant={currentView === 'student' ? 'secondary' : 'outline'} className="py-2 px-3" onClick={() => setCurrentView('student')}><Icon name="user-astronaut" /> <span className="hidden sm:inline">我是學生</span></Button>
              <Button variant={currentView === 'admin' ? 'danger' : 'outline'} className="py-2 px-3" onClick={() => setCurrentView('admin')}><Icon name="magic" /> <span className="hidden sm:inline">我是老師</span></Button>
            </div>
          </div>
        </nav>
      );

      const renderDashboard = () => {
        const approvedRecords = records.filter(r => r.status === 'approved');
        const latestStars = approvedRecords.slice(0, 6); 
        const stats = {};
        approvedRecords.forEach(r => {
          const key = `${r.classId}-${r.name}`;
          if (!stats[key]) stats[key] = { classId: r.classId, name: r.name, count: 0 };
          stats[key].count++;
        });
        const studentStats = Object.values(stats).sort((a, b) => b.count - a.count).slice(0, 10);

        return (
          <div className="space-y-8 animate-bounce-in max-w-6xl mx-auto mt-6 px-4">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <Card className="p-8 text-center bg-white"><div className="w-14 h-14 mx-auto bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center text-2xl mb-4">📚</div><p className="text-gray-500 font-bold mb-1">大家總共讀了</p><p className="text-5xl font-black text-gray-800">{records.length}<span className="text-lg text-gray-400 ml-1">本</span></p></Card>
              <Card className="p-8 text-center bg-white"><div className="w-14 h-14 mx-auto bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center text-2xl mb-4">📝</div><p className="text-gray-500 font-bold mb-1">累積文字心得</p><p className="text-5xl font-black text-gray-800">{records.filter(r => r.reviewType === 'text').length}<span className="text-lg text-gray-400 ml-1">篇</span></p></Card>
              <Card className="p-8 text-center bg-white"><div className="w-14 h-14 mx-auto bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center text-2xl mb-4">🎨</div><p className="text-gray-500 font-bold mb-1">累積畫畫心得</p><p className="text-5xl font-black text-gray-800">{records.filter(r => r.reviewType === 'image').length}<span className="text-lg text-gray-400 ml-1">幅</span></p></Card>
            </div>
            
            {records.length === 0 && (
               <div className="bg-blue-50 text-blue-800 p-6 rounded-2xl text-center border-2 border-dashed border-blue-200 mt-6 font-bold flex flex-col items-center">
                 <Icon name="info-circle" size={32} className="mb-2 text-blue-400" />
                 目前系統找不到資料。如果您的試算表應該要有資料，請切換至「我是老師」> 點擊「🔧系統診斷」檢查連線狀況！
               </div>
            )}

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-8">
              <Card className="p-6 md:p-8 bg-white flex flex-col h-full">
                <div className="flex items-center gap-3 mb-6"><div className="w-10 h-10 bg-amber-100 text-amber-500 rounded-xl flex items-center justify-center text-xl">👑</div><h3 className="text-2xl font-black text-gray-800">閱讀達人榮譽榜</h3></div>
                <div className="flex-1 bg-gray-50 rounded-2xl p-2 md:p-4 border border-gray-100">
                  {studentStats.length === 0 ? <div className="text-center py-10 text-gray-400 font-bold">快去新增第一筆吧！</div> : (
                    <div className="space-y-2">
                      {studentStats.map((student, index) => {
                        let rankStyle = "bg-white text-gray-500"; let medal = <span className="text-sm font-black w-6 text-center">{index + 1}</span>;
                        if (index === 0) { rankStyle = "bg-yellow-50 border-yellow-200 border"; medal = <span className="text-xl">🥇</span>; }
                        else if (index === 1) { rankStyle = "bg-gray-100 border-gray-200 border"; medal = <span className="text-xl">🥈</span>; }
                        else if (index === 2) { rankStyle = "bg-orange-50 border-orange-200 border"; medal = <span className="text-xl">🥉</span>; }
                        return (
                          <div key={index} className={`flex items-center justify-between p-3 rounded-xl hover:scale-[1.02] ${rankStyle}`}>
                            <div className="flex items-center gap-3"><div className="w-8 flex justify-center">{medal}</div><div><span className="text-xs text-gray-500 font-bold block">{student.classId}</span><span className="text-base font-black text-gray-800">{student.name}</span></div></div>
                            <div className="text-right flex items-center gap-1.5"><span className="text-2xl font-black text-blue-600">{student.count}</span><span className="text-xs text-gray-400 mt-1">本</span></div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </Card>
              <Card className="p-6 md:p-8 bg-white flex flex-col h-full">
                <div className="flex items-center gap-3 mb-6"><div className="w-2 h-8 bg-blue-500 rounded-full"></div><h3 className="text-2xl font-black text-gray-800">🌟 最新閃亮星星</h3></div>
                <div className="space-y-4">
                  {latestStars.length === 0 ? <div className="text-center py-10 text-gray-400 font-bold">目前還沒有星星喔！</div> : (
                    latestStars.map(r => (
                      <div key={r.id} className="p-4 bg-gray-50 rounded-xl hover:-translate-y-1 hover:shadow-md cursor-pointer border border-gray-100" onClick={() => setViewRecordModal({show: true, data: r})}>
                        <div className="flex justify-between items-center mb-1"><span className="font-bold text-blue-700 bg-blue-100 px-2 py-0.5 rounded text-xs">{r.classId} {r.name}</span><span className="text-xs text-gray-400">{r.time.split(' ')[0]}</span></div>
                        <h4 className="font-black text-gray-800 text-lg">《{r.bookTitle}》</h4>
                      </div>
                    ))
                  )}
                </div>
              </Card>
            </div>
          </div>
        );
      };

      const renderStudent = () => {
        const myRecords = records.filter(r => 
          r.classId === String(studentInfo.classId || '').trim() && 
          r.name === String(studentInfo.name || '').trim()
        );
        const approvedCount = myRecords.filter(r => r.status === 'approved').length;
        const pendingCount = myRecords.filter(r => r.status === 'pending').length;
        
        let stage = { icon: '🥚', name: '閱讀新手', color: 'bg-gray-100 text-gray-500' };
        if (approvedCount >= 5) stage = { icon: '🐤', name: '知識小雞', color: 'bg-amber-100 text-amber-600' };
        if (approvedCount >= 10) stage = { icon: '🦅', name: '聰明老鷹', color: 'bg-blue-100 text-blue-600' };
        if (approvedCount >= 20) stage = { icon: '🐉', name: '博學飛龍', color: 'bg-rose-100 text-rose-600' };

        return (
          <div className="space-y-6 max-w-4xl mx-auto animate-bounce-in mt-6 px-4">
            <Card className="bg-white overflow-hidden">
              <div className="flex flex-col md:flex-row items-center">
                <div className={`w-full md:w-48 py-8 flex items-center justify-center text-6xl ${stage.color}`}>{stage.icon}</div>
                <div className="flex-1 p-6 w-full text-center md:text-left">
                  {!isStudentSet ? (
                    <div>
                      <h3 className="text-lg font-black text-gray-700 mb-4">歡迎！請輸入你的班級與姓名</h3>
                      <div className="flex flex-col sm:flex-row gap-3">
                        <input placeholder="班級 (例如: 101)" className="clean-input px-4 py-2.5 w-full font-bold" value={studentInfo.classId} onChange={e => setStudentInfo({...studentInfo, classId: e.target.value})} />
                        <input placeholder="姓名 (例如: 王小明)" className="clean-input px-4 py-2.5 w-full font-bold" value={studentInfo.name} onChange={e => setStudentInfo({...studentInfo, name: e.target.value})} onKeyDown={e => { if(e.key === 'Enter' && studentInfo.classId && studentInfo.name) setIsStudentSet(true); }}/>
                        <Button onClick={() => { if(studentInfo.classId && studentInfo.name) setIsStudentSet(true); else showMsg('提醒','請填寫班級姓名'); }}>確認</Button>
                      </div>
                    </div>
                  ) : (
                    <div className="flex flex-col sm:flex-row justify-between items-start gap-4 w-full">
                      <div className="w-full">
                        <div className="flex justify-between items-center w-full mb-2">
                           <h2 className="text-3xl font-black text-gray-800">{studentInfo.classId} {studentInfo.name}</h2>
                           <Button variant="outline" className="text-sm py-1 px-2" onClick={() => setIsStudentSet(false)}>登出切換</Button>
                        </div>
                        <div className="inline-flex items-center gap-2 text-gray-600 font-bold text-sm bg-gray-50 px-3 py-1.5 rounded-lg mb-4">
                          目前等級：<span className={stage.color.split(' ')[1]}>{stage.name}</span>
                        </div>
                        <div className="grid grid-cols-3 gap-2 sm:gap-4 mt-2">
                          <div className="bg-amber-50 border border-amber-100 rounded-xl p-3 flex flex-col items-center">
                             <span className="text-amber-600 text-xs sm:text-sm font-bold mb-1">⭐ 蒐集星星</span>
                             <span className="text-2xl sm:text-3xl font-black text-amber-700">{approvedCount}</span>
                          </div>
                          <div className="bg-blue-50 border border-blue-100 rounded-xl p-3 flex flex-col items-center">
                             <span className="text-blue-600 text-xs sm:text-sm font-bold mb-1">📝 總發表數</span>
                             <span className="text-2xl sm:text-3xl font-black text-blue-700">{myRecords.length}</span>
                          </div>
                          <div className="bg-rose-50 border border-rose-100 rounded-xl p-3 flex flex-col items-center">
                             <span className="text-rose-600 text-xs sm:text-sm font-bold mb-1">⏳ 待審核</span>
                             <span className="text-2xl sm:text-3xl font-black text-rose-700">{pendingCount}</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </Card>

            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 px-2">
              <h3 className="text-xl font-black text-gray-800 flex items-center gap-2"><Icon name="history" className="text-blue-500" /> 我的閱讀紀錄</h3>
              <div className="flex gap-2 w-full sm:w-auto">
                <Button variant="outline" className="flex-1 sm:flex-none" icon="sync-alt" onClick={loadData} />
                <Button variant="primary" className="flex-1 sm:flex-none" icon="plus" onClick={() => {
                   if(!isStudentSet) return showMsg('提醒', '請先輸入班級姓名！');
                   const isJunior = /^[12一二]/.test(studentInfo.classId.trim());
                   setFormData({
                     id: '', classId: studentInfo.classId, name: studentInfo.name, 
                     bookTitle: '', author: '', publisher: '', pages: '', 
                     reviewType: 'text', review: '', image: ''
                   });
                   setIsFormModalOpen(true);
                 }}>新增心得</Button>
              </div>
            </div>

            <div className="space-y-4">
              {myRecords.length === 0 ? (
                <div className="text-center py-10 bg-white rounded-2xl border-2 border-dashed border-gray-200"><p className="text-gray-500 font-bold">目前發表 0 篇，快點擊上方新增吧！</p></div>
              ) : (
                myRecords.map(r => (
                  <Card key={r.id} className="p-5 flex flex-col md:flex-row justify-between md:items-center gap-4 hover:shadow-lg bg-white">
                    <div>
                      <div className="flex items-center gap-2 mb-1">
                        <span className={`px-2 py-0.5 rounded text-xs font-bold ${r.status === 'approved' ? 'bg-green-100 text-green-700' : r.status === 'rejected' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}`}>
                          {r.status === 'approved' ? '✅ 審核通過' : r.status === 'rejected' ? '❌ 老師退回' : '⏳ 老師審核中'}
                        </span>
                        <span className="text-xs text-gray-400 font-medium">{r.time}</span>
                      </div>
                      <h4 className="font-black text-xl text-gray-800">《{r.bookTitle}》</h4>
                    </div>
                    <div className="flex gap-2">
                      <Button variant="outline" onClick={() => setViewRecordModal({show: true, data: r})}>查看內容</Button>
                      {r.status !== 'approved' && <Button variant="secondary" onClick={() => { setFormData({...r}); setIsFormModalOpen(true); }}>重新編輯</Button>}
                    </div>
                  </Card>
                ))
              )}
            </div>
          </div>
        );
      };

      const renderAdmin = () => {
        if (!isAdminAuth) return (
          <div className="max-w-md mx-auto mt-20 px-4">
            <Card className="p-8 text-center bg-white">
              <div className="w-16 h-16 mx-auto bg-rose-100 text-rose-500 rounded-full flex items-center justify-center text-3xl mb-4">🔒</div>
              <h2 className="text-2xl font-black text-gray-800 mb-6">管理員登入</h2>
              <input type="password" placeholder="輸入密碼" className="clean-input w-full px-4 py-3 mb-4 text-center text-lg" value={tempPwd} onChange={e => setTempPwd(e.target.value)} onKeyDown={(e) => { if(e.key === 'Enter') { if(tempPwd === ADMIN_PASSWORD) { setIsAdminAuth(true); setTempPwd(''); } else showMsg('錯誤', '密碼不正確！'); } }}/>
              <Button className="w-full text-lg" onClick={() => { if(tempPwd === ADMIN_PASSWORD) { setIsAdminAuth(true); setTempPwd(''); } else showMsg('錯誤', '密碼不正確！'); }}>登入</Button>
            </Card>
          </div>
        );

        const displayRecords = adminTab === 'pending' ? records.filter(r => r.status === 'pending') : records;

        return (
          <div className="max-w-6xl mx-auto mt-6 px-4 animate-bounce-in">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
              <div className="flex gap-2 bg-gray-100 p-1.5 rounded-xl w-full md:w-auto overflow-x-auto">
                <button className={`whitespace-nowrap flex-1 md:flex-none px-4 py-2 rounded-lg font-bold transition-all ${adminTab === 'pending' ? 'bg-white shadow text-blue-600' : 'text-gray-500 hover:text-gray-700'}`} onClick={() => setAdminTab('pending')}>
                  待審核 ({records.filter(r => r.status === 'pending').length})
                </button>
                <button className={`whitespace-nowrap flex-1 md:flex-none px-4 py-2 rounded-lg font-bold transition-all ${adminTab === 'all' ? 'bg-white shadow text-blue-600' : 'text-gray-500 hover:text-gray-700'}`} onClick={() => setAdminTab('all')}>
                  全部紀錄 ({records.length})
                </button>
                <button className={`whitespace-nowrap flex-1 md:flex-none px-4 py-2 rounded-lg font-bold transition-all ${adminTab === 'diagnostics' ? 'bg-rose-500 shadow text-white' : 'text-rose-500 hover:bg-rose-100'}`} onClick={() => setAdminTab('diagnostics')}>
                  🔧 系統診斷
                </button>
              </div>
              
              <div className="flex gap-2 flex-wrap w-full md:w-auto">
                <Button variant="success" icon="file-csv" onClick={exportCSV} className="flex-1 md:flex-none py-2 text-sm"><span className="hidden sm:inline">匯出資料</span></Button>
                <Button variant="secondary" icon="upload" onClick={() => document.getElementById('csv-upload').click()} className="flex-1 md:flex-none py-2 text-sm"><span className="hidden sm:inline">匯入資料</span></Button>
                <Button variant="outline" onClick={loadData} icon="sync-alt" className="py-2 px-3 text-sm"></Button>
                <input type="file" id="csv-upload" className="hidden" accept=".csv" onChange={handleImportCSV} />
              </div>
            </div>

            {adminTab === 'diagnostics' ? (
              <Card className="p-6 bg-white border-2 border-rose-100">
                <h3 className="text-xl font-black text-rose-600 mb-4 flex items-center gap-2"><Icon name="stethoscope" /> GAS 連線除錯工具</h3>
                <p className="text-gray-600 font-bold mb-4">如果您發現前台資料全部變成 0，請點擊下方按鈕測試，看看 Google 伺服器到底回傳了什麼給我們：</p>
                <Button variant="danger" icon="play" onClick={runDiagnostics} className="mb-4">執行完整連線測試</Button>
                <div className="bg-gray-900 text-green-400 p-4 rounded-xl overflow-x-auto font-mono text-sm whitespace-pre-wrap min-h-[300px]">
                  {diagnosticsLog || '點擊上方按鈕開始測試...'}
                </div>
              </Card>
            ) : (
              <div className="space-y-4">
                {displayRecords.length === 0 ? (
                  <div className="text-center py-16 bg-white rounded-2xl border border-gray-100 shadow-sm"><div className="text-5xl mb-4 text-emerald-400">☕</div><p className="text-gray-500 font-bold text-lg">目前沒有任何紀錄。</p></div>
                ) : (
                  displayRecords.map(r => (
                    <Card key={r.id} className="p-5 flex flex-col md:flex-row justify-between md:items-center gap-4 bg-white">
                      <div>
                        <div className="flex items-center gap-2 mb-1">
                          {adminTab === 'all' && (
                            <span className={`px-2 py-0.5 rounded text-xs font-bold ${r.status === 'approved' ? 'bg-green-100 text-green-700' : r.status === 'rejected' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}`}>
                              {r.status === 'approved' ? '已通過' : r.status === 'rejected' ? '已退回' : '待審核'}
                            </span>
                          )}
                          <span className="font-bold text-blue-700 bg-blue-50 px-2 py-0.5 rounded text-sm">{r.classId} {r.name}</span>
                          <span className="text-xs text-gray-400">{r.time}</span>
                        </div>
                        <h4 className="font-black text-xl text-gray-800">《{r.bookTitle}》</h4>
                      </div>
                      <div className="flex gap-2 flex-wrap">
                        <Button variant="outline" onClick={() => setViewRecordModal({show: true, data: r})}>查看</Button>
                        
                        {r.status === 'pending' && (
                          <>
                            <Button variant="success" icon="check" onClick={() => apiCall('approveRecord', r.id)}>給星星</Button>
                            <Button variant="danger" icon="times" onClick={() => showMsg('退回確認', `要退回【${r.name}】的心得嗎？`, () => { apiCall('rejectRecord', r.id); setMsgBox({show:false}); })}>退回</Button>
                          </>
                        )}
                        
                        {adminTab === 'all' && (
                          <Button variant="outline" className="text-rose-500 border-rose-200 hover:bg-rose-50" icon="trash" onClick={() => showMsg('刪除確認', `確定要永久刪除這筆紀錄嗎？此動作無法復原。`, () => { apiCall('deleteRecord', r.id); setMsgBox({show:false}); })}></Button>
                        )}
                      </div>
                    </Card>
                  ))
                )}
              </div>
            )}
          </div>
        );
      };

      const currentTextLength = (formData.review || '').trim().length;
      const isJuniorStudent = /^[12一二]/.test((formData.classId || '').trim());

      return (
        <div className="min-h-screen">
          {loading && (
            <div className="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex items-center justify-center">
              <div className="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center">
                <div className="text-4xl animate-spin mb-3 text-blue-500"><Icon name="spinner" /></div>
                <p className="font-bold text-gray-700">{loadingMsg}</p>
              </div>
            </div>
          )}

          {renderNavbar()}

          <div className="pb-20">
            {currentView === 'dashboard' && renderDashboard()}
            {currentView === 'student' && renderStudent()}
            {currentView === 'admin' && renderAdmin()}
          </div>

          <Modal isOpen={msgBox.show} onClose={() => setMsgBox({ ...msgBox, show: false })} title={msgBox.title}>
            <p className="text-lg text-gray-700 font-bold text-center py-6 whitespace-pre-wrap">{msgBox.msg}</p>
            <div className="flex gap-3 mt-2">
              {msgBox.onConfirm ? (
                <><Button variant="outline" className="flex-1" onClick={() => setMsgBox({ ...msgBox, show: false })}>取消</Button><Button variant="primary" className="flex-1" onClick={msgBox.onConfirm}>確定</Button></>
              ) : <Button className="w-full" onClick={() => setMsgBox({ ...msgBox, show: false })}>我知道了</Button>}
            </div>
          </Modal>

          <Modal isOpen={isFormModalOpen} onClose={() => setIsFormModalOpen(false)} title={formData.id ? "編輯閱讀紀錄" : "新增閱讀紀錄"}>
            <div className="space-y-4 bg-white">
              <div><label className="block text-sm font-bold text-gray-700 mb-1">書名 (必填)</label><input placeholder="例如：神奇樹屋" className="clean-input w-full px-4 py-3" value={formData.bookTitle} onChange={e => setFormData({...formData, bookTitle: e.target.value})} /></div>
              <div className="flex gap-4">
                <div className="flex-1"><label className="block text-sm font-bold text-gray-700 mb-1">作者</label><input placeholder="選填" className="clean-input w-full px-4 py-3" value={formData.author} onChange={e => setFormData({...formData, author: e.target.value})} /></div>
                <div className="flex-1"><label className="block text-sm font-bold text-gray-700 mb-1">出版社</label><input placeholder="選填" className="clean-input w-full px-4 py-3" value={formData.publisher} onChange={e => setFormData({...formData, publisher: e.target.value})} /></div>
              </div>
              <div className="flex gap-4">
                <div className="flex-1"><label className="block text-sm font-bold text-gray-700 mb-1">頁數</label><input type="number" placeholder="選填" className="clean-input w-full px-4 py-3" value={formData.pages} onChange={e => setFormData({...formData, pages: e.target.value})} /></div>
                <div className="flex-1">
                  <label className="block text-sm font-bold text-gray-700 mb-1">繳交方式</label>
                  {isJuniorStudent ? (
                    <select className="clean-input w-full px-4 py-3 font-bold text-blue-600" value={formData.reviewType} onChange={e => setFormData({...formData, reviewType: e.target.value, review: '', image: ''})}>
                      <option value="text">📝 打字寫心得</option><option value="image">🎨 上傳圖片(1、2年級)</option>
                    </select>
                  ) : (
                    <div className="clean-input w-full px-4 py-3 font-bold text-gray-500 bg-gray-100 cursor-not-allowed text-sm flex items-center">
                      📝 限打字寫心得
                    </div>
                  )}
                </div>
              </div>

              {formData.reviewType === 'text' ? (
                <div>
                  <label className="block text-sm font-bold text-gray-700 mb-1 flex justify-between">
                    <span>心得內容 (限制 100 ~ 500 字)</span>
                    <span className={`text-xs ${currentTextLength < 100 || currentTextLength > 500 ? 'text-red-500 font-black' : 'text-emerald-500 font-bold'}`}>
                      目前: {currentTextLength} 字
                    </span>
                  </label>
                  <textarea placeholder="這本書告訴我..." className="clean-input w-full px-4 py-3 h-40 resize-none" value={formData.review} onChange={e => setFormData({...formData, review: e.target.value})}></textarea>
                </div>
              ) : (
                <div className="p-4 border-2 border-dashed border-gray-300 rounded-xl bg-gray-50 text-center">
                  <label className="block text-sm font-bold text-gray-700 mb-2">上傳圖片 (必填, 最大 5MB)</label>
                  <input type="file" accept="image/*" onChange={handleImageUpload} className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer" />
                  {formData.image && <img src={formData.image} alt="預覽" className="mt-4 max-h-48 mx-auto rounded-lg shadow-sm" />}
                </div>
              )}
              <Button className="w-full text-lg py-3 mt-4" onClick={submitForm}>送出</Button>
            </div>
          </Modal>

          <Modal isOpen={viewRecordModal.show} onClose={() => setViewRecordModal({show:false, data: null})} title="閱讀紀錄詳情">
            {viewRecordModal.data && (
              <div className="space-y-4 bg-white">
                <div className="text-center border-b border-gray-100 pb-4">
                  <h3 className="text-2xl font-black text-gray-800 mb-2">《{viewRecordModal.data.bookTitle}》</h3>
                  <div className="flex flex-wrap justify-center gap-x-4 gap-y-1 text-sm text-gray-500 font-bold">
                    <span>👤 作者: {viewRecordModal.data.author || '未提供'}</span>
                    <span>🏢 出版社: {viewRecordModal.data.publisher || '未提供'}</span>
                    <span>📖 頁數: {viewRecordModal.data.pages || '?'} 頁</span>
                  </div>
                </div>
                <div className="pt-2">
                  <div className="flex items-center gap-2 mb-3"><span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-lg text-sm font-bold">{viewRecordModal.data.classId} {viewRecordModal.data.name}</span><span className="text-sm text-gray-400 font-bold">{viewRecordModal.data.time}</span></div>
                  {viewRecordModal.data.reviewType === 'text' ? (
                    <div className="bg-amber-50 p-5 rounded-2xl border border-amber-100 text-gray-700 leading-relaxed min-h-[150px] whitespace-pre-wrap">{viewRecordModal.data.review}</div>
                  ) : (
                    <div className="rounded-2xl overflow-hidden border border-gray-200"><img src={viewRecordModal.data.image} alt="學生上傳的心得" className="w-full h-auto object-contain bg-gray-50" /></div>
                  )}
                </div>
              </div>
            )}
          </Modal>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
