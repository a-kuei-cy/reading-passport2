<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>興嘉閱讀護照 | 視覺優化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); }
        .nav-active { background: #f59e0b; color: white; box-shadow: 0 10px 20px -5px rgba(245, 158, 11, 0.4); }
        .card-shadow { box-shadow: 0 4px 25px rgba(0,0,0,0.04); }
        .btn-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-hover:active { transform: scale(0.95); }
        
        /* 捲軸美化 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        
        .list-container { max-height: 480px; overflow-y: auto; padding-right: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        const CONFIG = {
            GAS_URL: "https://script.google.com/macros/s/AKfycbz8PuqxvXMnDOLizffDYbvjHkkUJc8wvfGlfAUcXSR-XVxawhnzOkmAmcgZ4ir8EzIt/exec",
            ADMIN_PWD: "123" 
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [view, setView] = useState('home');
            const [loading, setLoading] = useState(false);
            const [records, setRecords] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminTab, setAdminTab] = useState('pending');
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [student, setStudent] = useState({ classId: '', name: '' });
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [formData, setFormData] = useState({ 
                id: null, bookTitle: '', author: '', publisher: '', pages: '', 
                reviewType: 'text', review: '', image: '', status: 'pending' 
            });
            const [detail, setDetail] = useState(null);

            const getVal = (obj, key) => {
                if (!obj) return "";
                const keys = Object.keys(obj);
                const targetKey = keys.find(k => k.trim().toLowerCase() === key.toLowerCase());
                return targetKey ? obj[targetKey] : "";
            };

            const mask = (s) => (s && s.length > 1) ? s[0] + 'O' + (s.length > 2 ? s.slice(2) : '') : s;

            const fetchData = useCallback(async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${CONFIG.GAS_URL}?action=getAll`);
                    const json = await res.json();
                    if (json.status === 'success') setRecords(json.data.records || []);
                } catch (e) { console.error(e); }
                setLoading(false);
            }, []);

            useEffect(() => { fetchData(); }, [fetchData]);

            const callGAS = async (action, id = null, data = null) => {
                setLoading(true);
                try {
                    await fetch(CONFIG.GAS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action, id, data })
                    });
                    if (action === 'addRecord' && !isAdmin) {
                        setTimeout(() => {
                            alert("心得已送出審核！為了保護隱私，系統即將登出並清除紀錄。");
                            handleLogout();
                            setLoading(false);
                        }, 2000);
                    } else {
                        setTimeout(() => { fetchData(); setLoading(false); }, 1500);
                    }
                } catch (e) { console.error(e); setLoading(false); }
            };

            const handleLogin = () => {
                if (!student.classId || !student.name) return alert("請輸入班級與姓名");
                setIsLoggedIn(true);
            };

            const handleLogout = () => {
                setStudent({ classId: '', name: '' });
                setIsLoggedIn(false);
                setView('home');
                localStorage.clear();
                sessionStorage.clear();
            };

            const isJunior = useMemo(() => {
                const grade = student.classId ? student.classId[0] : '';
                return grade === '1' || grade === '2';
            }, [student.classId]);

            const topStudents = useMemo(() => {
                const approved = records.filter(r => String(getVal(r, 'status')).toLowerCase() === 'approved');
                const counts = {};
                approved.forEach(r => {
                    const key = `${getVal(r, 'classId')}_${getVal(r, 'name')}`;
                    counts[key] = (counts[key] || 0) + 1;
                });
                return Object.entries(counts).map(([k, count]) => ({ classId: k.split('_')[0], name: k.split('_')[1], count }))
                    .sort((a, b) => b.count - a.count).slice(0, 10);
            }, [records]);

            const gradeStats = useMemo(() => {
                const g = { "一年級":0, "二年級":0, "三年級":0, "四年級":0, "五年級":0, "六年級":0 };
                records.filter(r => String(getVal(r, 'status')).toLowerCase() === 'approved').forEach(r => {
                    const cid = String(getVal(r, 'classId'))[0];
                    const n = ["","一","二","三","四","五","六"][cid] + "年級";
                    if(g[n]!==undefined) g[n]++;
                });
                return Object.entries(g);
            }, [records]);

            const latestReviews = useMemo(() => records.filter(r => getVal(r, 'status') === 'approved').slice(-4).reverse(), [records]);

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => setFormData({ ...formData, image: ev.target.result, reviewType: 'image' });
                reader.readAsDataURL(file);
            };

            return (
                <div className="min-h-screen pb-32">
                    <header className="glass sticky top-0 z-50 border-b p-5 flex justify-between items-center shadow-sm">
                        <div onClick={()=>setView('home')} className="cursor-pointer flex items-center gap-3">
                            <div className="bg-amber-400 p-2 rounded-xl text-white shadow-inner"><Icon name="book-open" size={24}/></div>
                            <h1 className="text-xl font-black text-slate-800 tracking-tight">興嘉閱讀護照</h1>
                        </div>
                        <div className="flex gap-2">
                            {isLoggedIn && <span className="text-[10px] font-black bg-slate-100 px-3 py-2 rounded-xl text-slate-500 border border-slate-200">{student.classId} {student.name}</span>}
                            <button onClick={fetchData} className="p-2.5 bg-white rounded-xl border shadow-sm text-slate-400 hover:text-amber-500 transition-all"><Icon name="refresh-cw" size={18}/></button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-8 space-y-6">
                        {view === 'home' && (
                            <div className="space-y-6 animate-in fade-in duration-700">
                                <div className="bg-gradient-to-br from-indigo-500 to-indigo-700 rounded-[2.5rem] p-8 md:p-12 text-center space-y-4 shadow-xl shadow-indigo-200 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full blur-3xl -mr-20 -mt-20"></div>
                                    <h2 className="text-3xl md:text-5xl font-black text-white leading-tight relative z-10">讀萬卷書，行萬里路</h2>
                                    <p className="text-indigo-100 font-medium text-sm md:text-base opacity-80 relative z-10">興嘉小達人，讓我們一起探索書中的奇幻世界！</p>
                                    {!isLoggedIn && (
                                        <button onClick={()=>setView('passport')} className="mt-4 px-10 py-3.5 bg-white text-indigo-600 font-black rounded-2xl shadow-lg hover:bg-slate-50 transition-all hover:-translate-y-1 relative z-10">登入個人護照</button>
                                    )}
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                                    {/* 排行榜區塊 - 調整寬度比例並限制高度 */}
                                    <div className="lg:col-span-5 bg-white rounded-[2rem] p-6 border card-shadow flex flex-col">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="text-lg font-black flex items-center gap-2"><Icon name="award" className="text-amber-400"/> 閱讀小達人榜</h3>
                                            <span className="text-[10px] bg-amber-50 text-amber-400 px-2 py-1 rounded-lg font-black uppercase tracking-wider">Top 10</span>
                                        </div>
                                        <div className="list-container custom-scrollbar">
                                            <div className="space-y-2">
                                                {topStudents.map((s, i) => (
                                                    <div key={i} className="flex items-center justify-between p-3 bg-slate-50/50 rounded-xl border border-transparent hover:border-amber-100 transition-all">
                                                        <div className="flex items-center gap-3">
                                                            <span className={`w-7 h-7 flex items-center justify-center rounded-full font-black text-[10px] ${i<3 ? 'bg-amber-400 text-white' : 'bg-slate-200 text-slate-500'}`}>{i+1}</span>
                                                            <div>
                                                                <p className="font-black text-slate-700 text-sm">{mask(s.name)}</p>
                                                                <p className="text-[10px] text-slate-400 font-bold">{s.classId} 班</p>
                                                            </div>
                                                        </div>
                                                        <div className="text-right">
                                                            <span className="text-lg font-black text-amber-500">{s.count}</span>
                                                            <span className="text-[9px] text-slate-400 font-black ml-1">份</span>
                                                        </div>
                                                    </div>
                                                ))}
                                                {topStudents.length === 0 && <p className="text-center py-10 text-slate-300 text-xs font-bold">目前尚無排名...</p>}
                                            </div>
                                        </div>
                                    </div>

                                    {/* 右側統計與心得區塊 */}
                                    <div className="lg:col-span-7 flex flex-col gap-6">
                                        {/* 各年級閱讀量 */}
                                        <div className="bg-white rounded-[2rem] p-6 border card-shadow">
                                            <h3 className="text-lg font-black mb-6 flex items-center gap-2"><Icon name="bar-chart-3" className="text-indigo-500"/> 各年級閱讀量</h3>
                                            <div className="grid grid-cols-2 gap-x-8 gap-y-4">
                                                {gradeStats.map(([grade, count]) => {
                                                    const max = Math.max(...gradeStats.map(gs => gs[1])) || 1;
                                                    const percent = (count / max) * 100;
                                                    return (
                                                        <div key={grade} className="space-y-1.5">
                                                            <div className="flex justify-between text-[10px] font-black px-0.5">
                                                                <span className="text-slate-500">{grade}</span>
                                                                <span className="text-indigo-500">{count} 份</span>
                                                            </div>
                                                            <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                                                                <div className="h-full bg-indigo-500 rounded-full transition-all duration-1000" style={{ width: `${percent}%` }}></div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        {/* 精選心得 */}
                                        <div className="bg-white rounded-[2rem] p-6 border card-shadow flex-1">
                                            <h3 className="text-lg font-black mb-4 flex items-center gap-2"><Icon name="message-circle" className="text-rose-500"/> 精選心得</h3>
                                            <div className="space-y-3">
                                                {latestReviews.map((r, i) => (
                                                    <div key={i} onClick={()=>setDetail(r)} className="p-3 bg-rose-50/30 rounded-xl border border-rose-100/50 cursor-pointer hover:bg-rose-50 transition-all flex justify-between items-center group">
                                                        <div className="flex flex-col gap-0.5">
                                                            <p className="font-black text-slate-800 text-sm truncate max-w-[200px] group-hover:text-rose-500 transition-colors">《{getVal(r, 'bookTitle')}》</p>
                                                            <p className="text-[10px] text-slate-400 font-bold">{mask(getVal(r, 'name'))} ({getVal(r, 'classId')})</p>
                                                        </div>
                                                        <Icon name="chevron-right" size={14} className="text-slate-300"/>
                                                    </div>
                                                ))}
                                                {latestReviews.length === 0 && <p className="text-center py-6 text-slate-300 text-xs font-bold">期待你的心得分享...</p>}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'passport' && (
                            !isLoggedIn ? (
                                <div className="bg-white p-10 rounded-[3rem] shadow-xl border text-center max-w-md mx-auto mt-6">
                                    <div className="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">📚</div>
                                    <h2 className="text-2xl font-black mb-6">登入個人護照</h2>
                                    <div className="space-y-4 text-left">
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black text-slate-400 ml-3">班級編號</label>
                                            <input className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-amber-400 outline-none font-bold text-center text-lg" placeholder="如: 305" value={student.classId} onChange={e=>setStudent({...student, classId:e.target.value})}/>
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black text-slate-400 ml-3">學生姓名</label>
                                            <input className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-amber-400 outline-none font-bold text-center text-lg" placeholder="姓名" value={student.name} onChange={e=>setStudent({...student, name:e.target.value})}/>
                                        </div>
                                        <button onClick={handleLogin} className="w-full py-4 bg-amber-400 text-white font-black rounded-2xl shadow-lg hover:bg-amber-500 transition-all text-lg mt-2">開啟閱讀寶盒</button>
                                        <p className="text-center text-[10px] text-slate-400 font-medium">系統會自動清除公用電腦使用痕跡</p>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-6 animate-in slide-in-from-right duration-500">
                                    <div className="bg-white rounded-[2.5rem] p-8 border shadow-sm flex flex-col items-center relative overflow-hidden">
                                        <div className="text-6xl mb-4">✨</div>
                                        <h3 className="text-2xl font-black text-slate-800">{student.name} 的專屬空間</h3>
                                        <div className="mt-6 w-full grid grid-cols-2 gap-4 border-t border-slate-100 pt-6">
                                            <div className="text-center"><p className="text-[10px] text-slate-400 font-black">累計篇數</p><p className="text-2xl font-black text-indigo-500">{records.filter(r => getVal(r, 'name') === student.name).length}</p></div>
                                            <div className="text-center"><p className="text-[10px] text-slate-400 font-black">審核通過</p><p className="text-2xl font-black text-green-500">{records.filter(r => getVal(r, 'name') === student.name && getVal(r, 'status') === 'approved').length}</p></div>
                                        </div>
                                    </div>
                                    
                                    <button onClick={() => { setIsEditMode(false); setFormData({id:null, bookTitle:'', author:'', publisher:'', pages:'', reviewType:'text', review:'', image:'', status:'pending'}); setIsFormOpen(true); }} className="w-full py-5 bg-indigo-600 text-white font-black text-lg rounded-[2rem] shadow-xl hover:bg-indigo-700 btn-hover flex items-center justify-center gap-3">
                                        <Icon name="pencil-line"/> 發表心得作品
                                    </button>

                                    <div className="bg-white p-6 rounded-[2rem] border card-shadow">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-black text-lg flex items-center gap-2"><Icon name="history" className="text-amber-500"/> 作品歷史紀錄</h3>
                                            <button onClick={handleLogout} className="text-[10px] font-black text-rose-400 bg-rose-50 px-3 py-1.5 rounded-lg">登出並清除</button>
                                        </div>
                                        <div className="space-y-3">
                                            {records.filter(r => getVal(r, 'name') === student.name).reverse().map(r => (
                                                <div key={getVal(r, 'id')} className="p-4 bg-slate-50/50 rounded-xl flex justify-between items-center cursor-pointer hover:bg-white border border-transparent hover:border-slate-200 transition-all" onClick={() => setDetail(r)}>
                                                    <p className="font-bold text-slate-700 truncate max-w-[180px]">《{getVal(r, 'bookTitle')}》</p>
                                                    <span className={`text-[9px] font-black px-2 py-1 rounded-md ${getVal(r, 'status')==='approved'?'text-green-500 bg-green-50':'text-amber-500 bg-amber-50'}`}>{getVal(r, 'status')==='approved'?'通過':'審核中'}</span>
                                                </div>
                                            ))}
                                            {records.filter(r => getVal(r, 'name') === student.name).length === 0 && <p className="text-center py-10 text-slate-300 text-xs font-bold">還沒有發表過作品喔！</p>}
                                        </div>
                                    </div>
                                </div>
                            )
                        )}

                        {view === 'admin' && (
                            !isAdmin ? (
                                <div className="bg-white p-10 rounded-[3rem] shadow-xl border text-center max-w-md mx-auto mt-6">
                                    <h2 className="text-2xl font-black mb-6">後台管理</h2>
                                    <input type="password" id="pw" className="w-full p-4 rounded-2xl bg-slate-50 mb-6 text-center text-xl font-black border focus:border-indigo-400 outline-none" placeholder="輸入管理密碼"/>
                                    <button className="w-full py-4 bg-slate-800 text-white font-black rounded-2xl shadow-lg" onClick={() => { if(document.getElementById('pw').value===CONFIG.ADMIN_PWD) setIsAdmin(true); else alert('密碼錯誤'); }}>登入後台</button>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center bg-white p-6 rounded-[2rem] border card-shadow">
                                        <h2 className="text-xl font-black">管理中心</h2>
                                        <button onClick={() => setIsAdmin(false)} className="p-3 bg-rose-50 text-rose-500 rounded-xl hover:bg-rose-500 hover:text-white transition-all"><Icon name="log-out" size={18}/></button>
                                    </div>
                                    <div className="flex bg-slate-200 p-1 rounded-xl gap-1">
                                        {['pending','approved'].map(t => (
                                            <button key={t} onClick={() => setAdminTab(t)} className={`flex-1 py-3 rounded-lg text-[10px] font-black transition-all ${adminTab===t?'bg-white shadow text-amber-500':'text-slate-500'}`}>{t==='pending'?'待審核':'已通過'}</button>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {records.filter(r => getVal(r, 'status') === adminTab).reverse().map(r => (
                                            <div key={getVal(r, 'id')} className="bg-white p-5 rounded-2xl border shadow-sm flex flex-col gap-4">
                                                <div className="flex justify-between items-start">
                                                    <div onClick={()=>setDetail(r)} className="cursor-pointer">
                                                        <p className="font-black text-slate-800 text-sm">{getVal(r, 'classId')} {getVal(r, 'name')}</p>
                                                        <p className="text-[10px] font-bold text-slate-400 mt-0.5 truncate max-w-[150px]">《{getVal(r, 'bookTitle')}》</p>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={()=>{setDetail(r); setIsEditMode(true); setFormData({...r}); setIsFormOpen(true);}} className="p-2 bg-slate-100 text-slate-500 rounded-lg"><Icon name="edit" size={14}/></button>
                                                        <button onClick={() => {if(confirm('確定刪除？')) callGAS('deleteRecord', getVal(r, 'id'));}} className="p-2 bg-slate-100 text-slate-400 rounded-lg"><Icon name="trash-2" size={14}/></button>
                                                    </div>
                                                </div>
                                                {adminTab==='pending' && <button onClick={() => callGAS('approveRecord', getVal(r, 'id'))} className="w-full py-2.5 bg-green-500 text-white rounded-lg font-black text-[10px] hover:bg-green-600 transition-colors">審核通過</button>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )
                        )}
                    </main>

                    {/* 底部導覽 */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass rounded-full p-1.5 flex shadow-2xl border border-white/40 z-50">
                        {['home','passport','admin'].map(v => (
                            <button key={v} onClick={() => setView(v)} className={`flex-1 flex flex-col items-center py-3 rounded-full transition-all duration-300 ${view===v?'nav-active':'text-slate-400'}`}>
                                <Icon name={v==='home'?'home':v==='passport'?'book':'settings'} size={18}/>
                                <span className="text-[9px] font-black mt-0.5 uppercase tracking-tighter">{v==='home'?'首頁':v==='passport'?'我的':'管理'}</span>
                            </button>
                        ))}
                    </nav>

                    {/* 撰寫心得彈窗 */}
                    {isFormOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-2xl rounded-[2.5rem] p-6 md:p-8 max-h-[90vh] overflow-y-auto shadow-2xl custom-scrollbar relative">
                                <button onClick={()=>setIsFormOpen(false)} className="absolute top-6 right-6 p-2 bg-slate-100 rounded-full hover:bg-rose-100 text-slate-400 hover:text-rose-500 transition-all"><Icon name="x" size={18}/></button>
                                <h3 className="text-xl font-black mb-6">{isEditMode ? '修改心得' : '發表閱讀心得'}</h3>
                                
                                <div className="space-y-4">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 ml-2">書名</label>
                                            <input className="w-full p-3 bg-slate-50 rounded-xl font-bold border-2 border-transparent focus:border-amber-400 outline-none" value={formData.bookTitle} onChange={e=>setFormData({...formData, bookTitle:e.target.value})}/>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 ml-2">作者</label>
                                            <input className="w-full p-3 bg-slate-50 rounded-xl font-bold border-2 border-transparent focus:border-amber-400 outline-none" value={formData.author} onChange={e=>setFormData({...formData, author:e.target.value})}/>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 ml-2">出版社</label>
                                            <input className="w-full p-3 bg-slate-50 rounded-xl font-bold border-2 border-transparent focus:border-amber-400 outline-none" value={formData.publisher} onChange={e=>setFormData({...formData, publisher:e.target.value})}/>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 ml-2">頁數</label>
                                            <input type="number" className="w-full p-3 bg-slate-50 rounded-xl font-bold border-2 border-transparent focus:border-amber-400 outline-none" value={formData.pages} onChange={e=>setFormData({...formData, pages:e.target.value})}/>
                                        </div>
                                    </div>

                                    {isJunior && !isEditMode && (
                                        <div className="p-4 bg-indigo-50 rounded-2xl border-2 border-dashed border-indigo-200 text-center">
                                            <label className="cursor-pointer">
                                                <div className="bg-white p-3 rounded-full shadow-sm mx-auto w-fit mb-2 text-indigo-500"><Icon name="camera" size={24}/></div>
                                                <span className="text-[10px] font-black text-indigo-600 block">低年級專屬：上傳心得照片/畫作</span>
                                                <input type="file" className="hidden" accept="image/*" onChange={handleImageChange}/>
                                            </label>
                                            {formData.image && <div className="mt-2 relative inline-block"><img src={formData.image} className="h-24 rounded-lg border-2 border-white"/><button onClick={()=>setFormData({...formData, image:'', reviewType:'text'})} className="absolute -top-1 -right-1 bg-rose-500 text-white rounded-full p-0.5"><Icon name="x" size={10}/></button></div>}
                                        </div>
                                    )}

                                    <div className="space-y-1 relative">
                                        <label className="text-[10px] font-black text-slate-400 ml-2 flex justify-between">
                                            <span>心得分享 (100-500字)</span>
                                            <span className={`${(formData.review.length < 100 || formData.review.length > 500) ? 'text-rose-500' : 'text-green-500'}`}>{formData.review.length} 字</span>
                                        </label>
                                        <textarea className="w-full p-4 bg-slate-50 rounded-2xl h-40 font-medium border-2 border-transparent focus:border-amber-400 outline-none resize-none transition-all" placeholder="分享這本書帶給你的感動..." value={formData.review} onChange={e=>setFormData({...formData, review:e.target.value})}></textarea>
                                    </div>

                                    <button className={`w-full py-4 text-white text-lg font-black rounded-2xl shadow-xl transition-all btn-hover ${ (formData.review.length < 100 || formData.review.length > 500) && formData.reviewType==='text' ? 'bg-slate-300 cursor-not-allowed' : 'bg-amber-400 hover:bg-amber-500' }`} 
                                        onClick={()=>{
                                            if(!formData.bookTitle) return alert('請填寫書名');
                                            if(formData.reviewType === 'text' && (formData.review.length < 100 || formData.review.length > 500)) return alert('心得字數需介於 100 至 500 字之間喔！');
                                            const action = isEditMode ? 'updateRecord' : 'addRecord';
                                            const payload = isEditMode ? formData : { ...formData, name: student.name, classId: student.classId };
                                            callGAS(action, formData.id, payload);
                                            setIsFormOpen(false);
                                        }}
                                        disabled={formData.reviewType === 'text' && (formData.review.length < 100 || formData.review.length > 500)}
                                    >
                                        {isEditMode ? '更新紀錄' : '送出審核'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 詳細內容查看 */}
                    {detail && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4" onClick={()=>setDetail(null)}>
                            <div className="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl border" onClick={e=>e.stopPropagation()}>
                                <div className="flex justify-between items-start mb-6">
                                    <div>
                                        <h3 className="text-xl font-black text-slate-800 leading-tight">《{getVal(detail, 'bookTitle')}》</h3>
                                        <p className="text-[10px] font-black text-amber-500 mt-1 uppercase">{getVal(detail, 'classId')} {mask(getVal(detail, 'name'))}</p>
                                    </div>
                                    <button onClick={()=>setDetail(null)} className="p-2 bg-slate-50 rounded-full text-slate-300"><Icon name="x" size={20}/></button>
                                </div>
                                <div className="grid grid-cols-2 gap-3 mb-6">
                                    <div className="bg-slate-50 p-3 rounded-xl"><p className="text-[9px] font-black text-slate-400">作者</p><p className="font-bold text-slate-700 text-sm">{getVal(detail, 'author') || '-'}</p></div>
                                    <div className="bg-slate-50 p-3 rounded-xl"><p className="text-[9px] font-black text-slate-400">出版社</p><p className="font-bold text-slate-700 text-sm">{getVal(detail, 'publisher') || '-'}</p></div>
                                </div>
                                <div className="bg-slate-50/50 p-6 rounded-[1.5rem] mb-6 border border-slate-100 max-h-[30vh] overflow-y-auto custom-scrollbar leading-relaxed text-slate-600 text-sm">
                                    {getVal(detail, 'reviewType') === 'image' && getVal(detail, 'image') && (
                                        <img src={getVal(detail, 'image')} className="w-full rounded-xl border-2 border-white shadow-sm mb-4" />
                                    )}
                                    <p className="whitespace-pre-wrap">{getVal(detail, 'review')}</p>
                                </div>
                                <button className="w-full bg-slate-800 py-3 rounded-xl text-white font-black hover:bg-slate-700 text-sm" onClick={()=>setDetail(null)}>關閉視窗</button>
                            </div>
                        </div>
                    )}

                    {loading && (
                        <div className="fixed inset-0 bg-white/70 backdrop-blur-md z-[200] flex flex-col items-center justify-center">
                            <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                            <div className="font-black text-indigo-500 text-[10px] tracking-widest uppercase">校園數據連線中</div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
