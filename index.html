<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>興嘉閱讀護照 | 雲端試算表整合版</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐛</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); }
        .nav-active { background: #f59e0b; color: white; box-shadow: 0 10px 20px -5px rgba(245, 158, 11, 0.4); }
        .card-shadow { box-shadow: 0 4px 25px rgba(0,0,0,0.04); }
        
        .field-label { font-size: 1.2rem; font-weight: 900; color: #1e293b; margin-bottom: 0.75rem; display: block; border-left: 5px solid #f59e0b; padding-left: 10px; }
        .field-input { font-size: 1.4rem; font-weight: 700; padding: 1.5rem !important; background-color: #fff !important; border: 2px solid #e2e8f0 !important; border-radius: 1.5rem; width: 100%; outline: none; transition: border-color 0.2s; }
        .field-input:focus { border-color: #f59e0b; }
        .field-textarea { font-size: 1.3rem; line-height: 1.8; padding: 1.5rem !important; min-height: 250px; resize: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .cert-border {
            border: 15px solid transparent;
            border-image: repeating-linear-gradient(45deg, #f59e0b, #f59e0b 10px, #fff 10px, #fff 20px) 15;
        }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // =========================================================================
        // ⚠️ 記得更換成你最新部署的網頁應用程式網址 (Web App URL)
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzpwetN6q2kiFDd1OZJfvfaPibKjIRBMfq7cHbzaUTOcDe6JigPskhuBSvaSIl63ezP/exec"; 
        const CONFIG = { ADMIN_PWD: "S2860885*110" }; 
        // =========================================================================

        const LOADING_QUOTES = [
            "好書值得等待... 📚", "毛毛蟲正在努力吃書... 🐛", "準備羽化成蝶... 🦋",
            "正在從圖書館搬書過來... 🏃‍♂️", "每一本書，都是一次蛻變... 🗺️"
        ];

        const getSafeStr = (val) => String(val || '').trim();
        const getSafeStatus = (val) => {
            const s = getSafeStr(val).toLowerCase();
            if(s === 'approved' || s === '已核准' || s === '已通過') return 'approved';
            if(s === 'returned' || s === '退回' || s === '已退回') return 'returned';
            return 'pending';
        };

        const { useState, useEffect, useCallback, useMemo } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
            return <span className={`inline-flex items-center justify-center ${className}`} dangerouslySetInnerHTML={{ __html: `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px;"></i>` }} />;
        };

        const getReadingStage = (count) => {
            if (count <= 10) return { name: '卵期', emoji: '🥚', desc: '閱讀的種子正在萌芽', next: 11, max: 10, min: 0, color: 'from-slate-300 to-slate-400', textColor: 'text-slate-600', bg: 'bg-slate-100', progress: (count / 10) * 100 };
            if (count <= 30) return { name: '幼蟲期', emoji: '🐛', desc: '努力吸收知識養分', next: 31, max: 30, min: 11, color: 'from-green-400 to-emerald-500', textColor: 'text-emerald-700', bg: 'bg-emerald-50', progress: ((count - 10) / 20) * 100 };
            if (count <= 60) return { name: '蛹期', emoji: '🥜', desc: '沉澱與蛻變中', next: 61, max: 60, min: 31, color: 'from-amber-400 to-orange-500', textColor: 'text-amber-700', bg: 'bg-amber-50', progress: ((count - 30) / 30) * 100 };
            return { name: '成蟲期', emoji: '🦋', desc: '展翅飛翔的閱讀達人！', next: 'MAX', max: count, min: 61, color: 'from-sky-400 to-indigo-500', textColor: 'text-indigo-700', bg: 'bg-indigo-50', progress: 100 };
        };

        const maskName = (name) => {
            const str = getSafeStr(name);
            if (!str) return '';
            if (str.length <= 2) return str[0] + 'O';
            if (str.length === 3) return str[0] + 'O' + str[2];
            return str[0] + 'O'.repeat(str.length - 2) + str[str.length - 1];
        };

        function App() {
            const [view, setView] = useState('home');
            const [loading, setLoading] = useState(false);
            const [records, setRecords] = useState([]);
            const [quotes, setQuotes] = useState([]); 
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminPw, setAdminPw] = useState(''); 
            const [adminTab, setAdminTab] = useState('pending');
            const [selectedIds, setSelectedIds] = useState([]);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [student, setStudent] = useState({ classId: '', name: '' });
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [isAllReviewsOpen, setIsAllReviewsOpen] = useState(false);
            const [showCertificate, setShowCertificate] = useState(false);
            
            const [slogan, setSlogan] = useState("讀萬卷書，行萬里路");
            const [sloganSub, setSloganSub] = useState("興嘉小達人，讓我們一起探索書中的奇幻世界！");
            
            const [formData, setFormData] = useState({ id: null, bookTitle: '', author: '', publisher: '', pages: '', reviewType: 'text', review: '', image: '', status: 'pending', returnReason: '' });
            const [detail, setDetail] = useState(null);

            const currentLoadingText = useMemo(() => LOADING_QUOTES[Math.floor(Math.random() * LOADING_QUOTES.length)], [loading]);

            const fetchData = useCallback(async () => {
                setLoading(true);
                try {
                    const res = await fetch(GAS_URL);
                    const json = await res.json();
                    
                    const dataRecords = json.reflections || json.records || [];
                    setRecords(dataRecords);
                    
                    if (json.quotes && json.quotes.length > 0) {
                        setQuotes(json.quotes);
                        const randomQuote = json.quotes[Math.floor(Math.random() * json.quotes.length)];
                        setSlogan(randomQuote.zh || randomQuote.title || "讀萬卷書，行萬里路");
                        setSloganSub(randomQuote.en || randomQuote.sub || "讓我們一起探索書中的奇幻世界！");
                    }
                } catch (e) { console.error("讀取失敗:", e); }
                setLoading(false);
            }, []);

            useEffect(() => { fetchData(); }, [fetchData]);
            useEffect(() => { setSelectedIds([]); }, [adminTab]);

            const handleBackendAction = async (action, id = null, data = null) => {
                setLoading(true);
                try {
                    let beAction = action;
                    if (action === 'addRecord') beAction = 'addReflection';
                    if (action === 'updateRecord') beAction = 'updateReflection';
                    if (action === 'deleteRecord') beAction = 'deleteReflection';

                    const res = await fetch(GAS_URL, { 
                        method: "POST", 
                        redirect: "follow",
                        headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                        body: JSON.stringify({ action: beAction, id: id, data: data }) 
                    });
                    
                    const result = await res.json();
                    if (result.status === 'success' || result.success) {
                        if (action === 'addRecord') { setTimeout(() => { alert("心得已提交！"); setView('passport'); }, 500); } 
                        else if (action === 'deleteRecord') { alert("刪除成功！"); }
                        else if (action === 'addQuote') { alert("金句新增成功！"); }
                        await fetchData(); 
                    } else throw new Error(result.message || result.error);
                } catch (e) { alert("發送失敗，請稍後再試。錯誤：" + e.message); }
                setLoading(false);
            };

            const handleBatchApprove = async () => {
                if (selectedIds.length === 0 || !confirm(`確定要一口氣通過 ${selectedIds.length} 筆心得嗎？`)) return;
                setLoading(true);
                for (const id of selectedIds) {
                    await fetch(GAS_URL, { 
                        method: "POST", redirect: "follow", headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify({ action: 'updateReflection', id: id, data: { status: 'approved' } }) 
                    });
                }
                alert("批次審核全部完成！");
                setSelectedIds([]);
                await fetchData();
                setLoading(false);
            };

            const exportToExcel = () => {
                const dataToExport = records.map(r => ({ 
                    '編號': r.id, '班級': r.classId, '姓名': r.name, '書名': r.bookTitle, 
                    '作者': r.author, '出版社': r.publisher, '頁數': r.pages, 
                    '心得內容': r.reviewType === 'image' ? `(圖片已上傳)` : r.review, 
                    '狀態': getSafeStatus(r.status) === 'approved' ? '已核准' : getSafeStatus(r.status) === 'returned' ? '已退回' : '待審核', 
                    '時間': r.timestamp || r.date ? new Date(r.timestamp || r.date).toLocaleString('zh-TW') : '' 
                }));
                const worksheet = XLSX.utils.json_to_sheet(dataToExport);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "閱讀紀錄");
                XLSX.writeFile(workbook, `興嘉閱讀護照_${new Date().toLocaleDateString()}.xlsx`);
            };

            const importFromExcel = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        const data = new Uint8Array(ev.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const mappedData = XLSX.utils.sheet_to_json(worksheet).map((item) => ({
                            classId: String(item['班級'] || ''), name: item['姓名'] || '', bookTitle: item['書名'] || '', author: item['作者'] || '', publisher: item['出版社'] || '', pages: item['頁數'] || '', reviewType: 'text', review: item['心得內容'] || '', status: 'approved', timestamp: new Date().getTime()
                        }));
                        
                        if (confirm(`已解析 ${mappedData.length} 筆資料。確定匯入嗎？`)) {
                            for (const item of mappedData) {
                                await fetch(GAS_URL, { method: "POST", redirect: "follow", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: 'addReflection', data: item }) });
                            }
                            await fetchData();
                        }
                    } catch (err) { alert("解析失敗。"); }
                    setLoading(false); e.target.value = ""; 
                };
                reader.readAsArrayBuffer(file);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 600; const scaleSize = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
                            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            setFormData({...formData, image: canvas.toDataURL('image/jpeg', 0.6)});
                        }
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleFormSubmit = () => {
                if (!formData.bookTitle || !formData.author || !formData.publisher || !formData.pages) {
                    return alert('「書名」、「作者」、「出版社」、「頁數」皆為必填！');
                }
                
                // 🌟 字數限制防呆機制
                if (formData.reviewType === 'text') {
                    const textLen = formData.review.length;
                    if (textLen < 100) {
                        return alert(`文字心得至少需要 100 字喔！\n您目前只有 ${textLen} 字，還差 ${100 - textLen} 字，加油！`);
                    }
                    if (textLen > 500) {
                        return alert(`文字心得不能超過 500 字喔！\n您目前寫了 ${textLen} 字，請稍微精簡一下。`);
                    }
                }

                if (formData.reviewType === 'image' && !formData.image) {
                    return alert('請上傳照片！');
                }
                
                const submitData = isEditMode 
                    ? { ...formData, status: 'pending', returnReason: '' } 
                    : { ...formData, name: student.name, classId: student.classId, timestamp: new Date().getTime(), status: 'pending' };
                
                handleBackendAction(isEditMode ? 'updateRecord' : 'addRecord', formData.id, submitData);
                setIsFormOpen(false);
            };

            const approvedRecords = useMemo(() => records.filter(r => r && getSafeStatus(r.status) === 'approved'), [records]);
            const pendingRecords = useMemo(() => records.filter(r => r && getSafeStatus(r.status) === 'pending'), [records]);
            const adminCurrentRecords = useMemo(() => records.filter(r => r && getSafeStatus(r.status) === adminTab), [records, adminTab]);

            const myRecords = useMemo(() => records.filter(r => r && getSafeStr(r.name) === getSafeStr(student.name) && getSafeStr(r.classId) === getSafeStr(student.classId)), [records, student]);
            const myApprovedCount = useMemo(() => myRecords.filter(r => getSafeStatus(r.status) === 'approved').length, [myRecords]);
            const currentStage = useMemo(() => getReadingStage(myApprovedCount), [myApprovedCount]);

            const leaderboard = useMemo(() => {
                const counts = {};
                approvedRecords.forEach(r => {
                    const key = `${getSafeStr(r.classId)}_${getSafeStr(r.name)}`;
                    counts[key] = (counts[key] || 0) + 1;
                });
                return Object.entries(counts).map(([key, count]) => {
                    const [classId, name] = key.split('_');
                    return { classId, name, count };
                }).sort((a, b) => b.count - a.count).slice(0, 10);
            }, [approvedRecords]);

            const gradeStats = useMemo(() => {
                const stats = {};
                approvedRecords.forEach(r => {
                    const gradeStr = r.classId ? getSafeStr(r.classId).charAt(0) : '';
                    const gradeNum = parseInt(gradeStr);
                    if (!isNaN(gradeNum) && gradeNum >= 1 && gradeNum <= 6) stats[gradeNum] = (stats[gradeNum] || 0) + 1;
                    else stats['其他'] = (stats['其他'] || 0) + 1;
                });
                return Object.entries(stats).map(([grade, count]) => ({
                    grade: grade === '其他' ? '其他' : `${grade}年級`, count, rawGrade: grade === '其他' ? 99 : parseInt(grade)
                })).sort((a, b) => a.rawGrade - b.rawGrade);
            }, [approvedRecords]);
            const maxGradeCount = gradeStats.length > 0 ? Math.max(...gradeStats.map(s => s.count)) : 1;

            const latestReviews = useMemo(() => [...approvedRecords].sort((a, b) => new Date(b.timestamp || b.date) - new Date(a.timestamp || a.date)).slice(0, 4), [approvedRecords]);

            return (
                <div className="min-h-screen pb-32">
                    <header className="glass sticky top-0 z-50 border-b p-5 flex justify-between items-center">
                        <div onClick={()=>setView('home')} className="cursor-pointer flex items-center gap-3">
                            <div className="bg-amber-400 p-2 rounded-xl text-white shadow-inner font-black"><Icon name="book-open" size={24}/></div>
                            <h1 className="text-xl font-black text-slate-800 tracking-tight">興嘉閱讀護照</h1>
                        </div>
                        <div className="flex gap-2">
                            {isLoggedIn && <span className="text-xs font-black bg-white px-3 py-2 rounded-xl border shadow-sm flex items-center">{student.classId} {student.name}</span>}
                            <button onClick={fetchData} className="p-2.5 bg-white rounded-xl border shadow-sm hover:text-amber-500 transition-colors"><Icon name="refresh-cw" size={18}/></button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-8 space-y-6">
                        
                        {/* ======================= 首頁 ======================= */}
                        {view === 'home' && (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <div className="bg-gradient-to-br from-amber-500 to-orange-600 rounded-[3rem] p-12 text-center shadow-xl relative overflow-hidden">
                                    <h2 className="text-4xl md:text-5xl font-black text-white drop-shadow-lg mb-4">{slogan}</h2>
                                    <p className="text-white/90 font-bold text-xl">{sloganSub}</p>
                                    {!isLoggedIn && (
                                        <button onClick={()=>setView('passport')} className="mt-8 px-12 py-4 bg-white text-orange-600 font-black rounded-2xl shadow-xl hover:-translate-y-1 transition-all text-xl">點此登入護照</button>
                                    )}
                                </div>
                                
                                <div className="bg-white rounded-[2.5rem] p-8 border card-shadow">
                                    <h3 className="text-2xl font-black text-center mb-8 flex justify-center items-center gap-3">
                                        <span className="text-4xl animate-float">🦋</span> 閱讀歷程：毛毛蟲的蛻變之旅
                                    </h3>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                                        {[10, 30, 60, 61].map((count, i) => {
                                            const stage = getReadingStage(count);
                                            return (
                                                <div key={i} className={`p-4 md:p-6 rounded-[2rem] border-2 border-transparent text-center ${stage.bg}`}>
                                                    <div className="text-4xl md:text-5xl mb-3 animate-float" style={{animationDelay: `${i*0.2}s`}}>{stage.emoji}</div>
                                                    <h4 className={`text-lg md:text-xl font-black mb-1 ${stage.textColor}`}>{stage.name}</h4>
                                                    <p className="text-slate-500 font-bold text-xs md:text-sm mb-3">{stage.desc}</p>
                                                    <span className="bg-white px-3 py-1 rounded-full text-[10px] md:text-xs font-black shadow-sm text-slate-600">
                                                        {count === 61 ? '60+ 本書' : `${stage.min}-${stage.max} 本書`}
                                                    </span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-white p-6 rounded-[2rem] border card-shadow flex flex-col items-center justify-center relative overflow-hidden"><div className="absolute -right-4 -top-4 opacity-5"><Icon name="book" size={100}/></div><p className="text-slate-500 font-black text-sm mb-1 z-10">全校閱讀總冊數</p><p className="text-5xl font-black text-amber-500 z-10">{approvedRecords.length}</p></div>
                                    <div className="bg-white p-6 rounded-[2rem] border card-shadow flex flex-col items-center justify-center relative overflow-hidden"><div className="absolute -right-4 -top-4 opacity-5"><Icon name="users" size={100}/></div><p className="text-slate-500 font-black text-sm mb-1 z-10">參與閱讀人數</p><p className="text-5xl font-black text-emerald-500 z-10">{new Set(approvedRecords.map(r => r.classId + r.name)).size}</p></div>
                                    <div className="bg-white p-6 rounded-[2rem] border card-shadow flex flex-col items-center justify-center relative overflow-hidden cursor-pointer hover:bg-slate-50 transition-colors" onClick={() => setIsAllReviewsOpen(true)}><div className="absolute -right-4 -top-4 opacity-5"><Icon name="message-square" size={100}/></div><div className="flex flex-col items-center z-10"><div className="bg-indigo-100 text-indigo-600 p-3 rounded-2xl mb-2"><Icon name="eye" size={24}/></div><p className="text-indigo-600 font-black">點擊觀摩</p><p className="text-slate-500 font-bold text-xs mt-1">看看大家讀了什麼好書</p></div></div>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white rounded-[2rem] border card-shadow p-6 md:p-8">
                                        <h3 className="text-2xl font-black mb-6 flex items-center gap-3"><span className="bg-amber-100 text-amber-600 p-2 rounded-xl"><Icon name="trophy"/></span> 閱讀達人風雲榜 (Top 10)</h3>
                                        <div className="space-y-4">
                                            {leaderboard.length === 0 ? <p className="text-slate-400 text-center py-8 font-bold text-lg border-2 border-dashed rounded-2xl">尚無紀錄，等你來霸榜！</p> : 
                                                leaderboard.map((item, idx) => (
                                                <div key={idx} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border hover:border-amber-300 transition-colors">
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black text-lg ${idx === 0 ? 'bg-yellow-400 text-white shadow-lg' : idx === 1 ? 'bg-slate-300 text-slate-700' : idx === 2 ? 'bg-amber-700 text-white' : 'bg-white text-slate-400 border-2'}`}>{idx + 1}</div>
                                                        <div>
                                                            <div className="font-black text-slate-800 text-lg">{item.classId} {maskName(item.name)}</div>
                                                            <div className="text-xs text-slate-500 font-bold flex items-center gap-1"><Icon name="book" size={12}/> 閱讀達人</div>
                                                        </div>
                                                    </div>
                                                    <div className="text-right"><div className="text-2xl font-black text-amber-500">{item.count}</div><div className="text-xs text-slate-400 font-bold">冊</div></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-6">
                                        <div className="bg-white rounded-[2rem] border card-shadow p-6 md:p-8">
                                            <h3 className="text-2xl font-black mb-6 flex items-center gap-3"><span className="bg-emerald-100 text-emerald-600 p-2 rounded-xl"><Icon name="bar-chart-2"/></span> 各年級閱讀力</h3>
                                            <div className="space-y-4">
                                                {gradeStats.map((stat, idx) => (
                                                    <div key={idx}>

                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-white/80 backdrop-blur-sm">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl text-center">
                                <div className="animate-spin text-amber-500 mx-auto mb-4 w-12 h-12 flex justify-center items-center"><Icon name="loader-2" size={48} /></div>
                                <p className="font-black text-lg text-slate-800">{currentLoadingText}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
