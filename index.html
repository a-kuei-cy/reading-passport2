<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>興嘉閱讀護照 | 隱私規範版 7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); }
        .nav-active { background: #f59e0b; color: white; box-shadow: 0 10px 20px -5px rgba(245, 158, 11, 0.4); }
        .card-shadow { box-shadow: 0 4px 25px rgba(0,0,0,0.04); }
        .btn-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-hover:active { transform: scale(0.95); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        const CONFIG = {
            GAS_URL: "https://script.google.com/macros/s/AKfycbz8PuqxvXMnDOLizffDYbvjHkkUJc8wvfGlfAUcXSR-XVxawhnzOkmAmcgZ4ir8EzIt/exec",
            ADMIN_PWD: "S2860885*110" 
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [view, setView] = useState('home');
            const [loading, setLoading] = useState(false);
            const [records, setRecords] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminTab, setAdminTab] = useState('pending');
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [student, setStudent] = useState({ classId: '', name: '' });
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [formData, setFormData] = useState({ 
                id: null, bookTitle: '', author: '', publisher: '', pages: '', 
                reviewType: 'text', review: '', image: '', status: 'pending' 
            });
            const [detail, setDetail] = useState(null);

            const getVal = (obj, key) => {
                if (!obj) return "";
                const keys = Object.keys(obj);
                const targetKey = keys.find(k => k.trim().toLowerCase() === key.toLowerCase());
                return targetKey ? obj[targetKey] : "";
            };

            const mask = (s) => (s && s.length > 1) ? s[0] + 'O' + (s.length > 2 ? s.slice(2) : '') : s;

            const fetchData = useCallback(async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${CONFIG.GAS_URL}?action=getAll`);
                    const json = await res.json();
                    if (json.status === 'success') setRecords(json.data.records || []);
                } catch (e) { console.error(e); }
                setLoading(false);
            }, []);

            useEffect(() => { fetchData(); }, [fetchData]);

            const callGAS = async (action, id = null, data = null) => {
                setLoading(true);
                try {
                    await fetch(CONFIG.GAS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action, id, data })
                    });
                    // 送出成功後，如果是學生端，執行清理
                    if (action === 'addRecord' && !isAdmin) {
                        setTimeout(() => {
                            alert("心得已送出審核！為了保護隱私，系統即將登出並清除紀錄。");
                            handleLogout();
                            setLoading(false);
                        }, 2000);
                    } else {
                        setTimeout(() => { fetchData(); setLoading(false); }, 1500);
                    }
                } catch (e) { console.error(e); setLoading(false); }
            };

            // 登入與登出邏輯 (加強隱私)
            const handleLogin = () => {
                if (!student.classId || !student.name) return alert("請輸入班級與姓名");
                setIsLoggedIn(true);
            };

            const handleLogout = () => {
                // 清除記憶體與視圖
                setStudent({ classId: '', name: '' });
                setIsLoggedIn(false);
                setView('home');
                // 清除本機所有可能留下的歷史痕跡
                localStorage.clear();
                sessionStorage.clear();
            };

            // 數據計算
            const isJunior = useMemo(() => {
                const grade = student.classId ? student.classId[0] : '';
                return grade === '1' || grade === '2';
            }, [student.classId]);

            const topStudents = useMemo(() => {
                const approved = records.filter(r => String(getVal(r, 'status')).toLowerCase() === 'approved');
                const counts = {};
                approved.forEach(r => {
                    const key = `${getVal(r, 'classId')}_${getVal(r, 'name')}`;
                    counts[key] = (counts[key] || 0) + 1;
                });
                return Object.entries(counts).map(([k, count]) => ({ classId: k.split('_')[0], name: k.split('_')[1], count }))
                    .sort((a, b) => b.count - a.count).slice(0, 10);
            }, [records]);

            const gradeStats = useMemo(() => {
                const g = { "一年級":0, "二年級":0, "三年級":0, "四年級":0, "五年級":0, "六年級":0 };
                records.filter(r => String(getVal(r, 'status')).toLowerCase() === 'approved').forEach(r => {
                    const cid = String(getVal(r, 'classId'))[0];
                    const n = ["","一","二","三","四","五","六"][cid] + "年級";
                    if(g[n]!==undefined) g[n]++;
                });
                return Object.entries(g);
            }, [records]);

            const latestReviews = useMemo(() => records.filter(r => getVal(r, 'status') === 'approved').slice(-5).reverse(), [records]);

            // 圖片處理 (Base64)
            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 2 * 1024 * 1024) return alert("檔案太大囉！請上傳 2MB 以下的照片。");
                const reader = new FileReader();
                reader.onload = (ev) => setFormData({ ...formData, image: ev.target.result, reviewType: 'image' });
                reader.readAsDataURL(file);
            };

            return (
                <div className="min-h-screen pb-32">
                    <header className="glass sticky top-0 z-50 border-b p-5 flex justify-between items-center shadow-sm">
                        <div onClick={()=>setView('home')} className="cursor-pointer flex items-center gap-3">
                            <div className="bg-amber-400 p-2 rounded-xl text-white shadow-inner"><Icon name="book-open" size={24}/></div>
                            <h1 className="text-xl font-black text-slate-800 tracking-tight">興嘉閱讀護照</h1>
                        </div>
                        <div className="flex gap-2">
                            {isLoggedIn && <span className="text-[10px] font-black bg-slate-100 px-3 py-2 rounded-xl text-slate-500 border border-slate-200">{student.classId} {student.name}</span>}
                            <button onClick={fetchData} className="p-2.5 bg-white rounded-xl border shadow-sm text-slate-400 hover:text-amber-500 transition-all"><Icon name="refresh-cw" size={18}/></button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-8 space-y-8">
                        {view === 'home' && (
                            <div className="space-y-8 animate-in fade-in duration-700">
                                <div className="bg-gradient-to-br from-amber-50 to-white rounded-[3rem] p-12 card-shadow border border-amber-100/50 text-center space-y-4">
                                    <h2 className="text-3xl md:text-5xl font-black text-slate-800 leading-tight">讀萬卷書，行萬里路</h2>
                                    <p className="text-slate-400 font-medium text-sm md:text-base">興嘉小達人，讓我們一起探索書中的奇幻世界吧！</p>
                                    {!isLoggedIn && (
                                        <button onClick={()=>setView('passport')} className="mt-6 px-14 py-4 bg-amber-400 text-white font-black rounded-2xl shadow-xl hover:bg-amber-500 transition-all hover:-translate-y-1">登入個人護照</button>
                                    )}
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    {/* 排行榜區塊 */}
                                    <div className="bg-white rounded-[2.5rem] p-8 border card-shadow">
                                        <div className="flex justify-between items-center mb-8">
                                            <h3 className="text-xl font-black flex items-center gap-2"><Icon name="award" className="text-amber-400"/> 閱讀小達人榜</h3>
                                            <span className="text-[10px] bg-amber-50 text-amber-500 px-3 py-1 rounded-full font-black">TOP 10</span>
                                        </div>
                                        <div className="space-y-3">
                                            {topStudents.map((s, i) => (
                                                <div key={i} className="flex items-center justify-between p-4 bg-slate-50/50 rounded-2xl border border-transparent hover:border-amber-100 transition-all">
                                                    <div className="flex items-center gap-4">
                                                        <span className={`w-8 h-8 flex items-center justify-center rounded-full font-black text-xs ${i<3 ? 'bg-amber-400 text-white' : 'bg-slate-200 text-slate-500'}`}>{i+1}</span>
                                                        <p className="font-black text-slate-700">{mask(s.name)} <span className="text-[10px] text-slate-400 font-bold ml-2">{s.classId} 班</span></p>
                                                    </div>
                                                    <div className="text-right"><span className="text-xl font-black text-amber-500">{s.count}</span> <span className="text-[9px] text-slate-400 font-black">份</span></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 統計與心得牆區塊 */}
                                    <div className="space-y-8">
                                        <div className="bg-white rounded-[2.5rem] p-8 border card-shadow">
                                            <h3 className="text-xl font-black mb-8 flex items-center gap-2"><Icon name="pie-chart" className="text-indigo-500"/> 各年級閱讀量</h3>
                                            <div className="space-y-5">
                                                {gradeStats.map(([grade, count]) => {
                                                    const max = Math.max(...gradeStats.map(gs => gs[1])) || 1;
                                                    const percent = (count / max) * 100;
                                                    return (
                                                        <div key={grade} className="space-y-2">
                                                            <div className="flex justify-between text-[11px] font-black px-1">
                                                                <span className="text-slate-500">{grade}</span>
                                                                <span className="text-indigo-500">{count} 份作品</span>
                                                            </div>
                                                            <div className="h-3 w-full bg-slate-100 rounded-full overflow-hidden">
                                                                <div className="h-full bg-indigo-500 rounded-full transition-all duration-1000 shadow-sm shadow-indigo-200" style={{ width: `${percent}%` }}></div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        <div className="bg-white rounded-[2.5rem] p-8 border card-shadow">
                                            <h3 className="text-xl font-black mb-6 flex items-center gap-2"><Icon name="message-square" className="text-rose-500"/> 精選心得</h3>
                                            <div className="space-y-4">
                                                {latestReviews.map((r, i) => (
                                                    <div key={i} onClick={()=>setDetail(r)} className="p-4 bg-rose-50/20 rounded-2xl border border-rose-50 cursor-pointer hover:bg-rose-50 transition-all flex justify-between items-center group">
                                                        <div className="flex flex-col gap-1">
                                                            <p className="font-black text-slate-800 text-sm group-hover:text-rose-500 transition-colors">《{getVal(r, 'bookTitle')}》</p>
                                                            <p className="text-[10px] text-slate-400 font-bold">{mask(getVal(r, 'name'))} ({getVal(r, 'classId')})</p>
                                                        </div>
                                                        <Icon name="chevron-right" size={14} className="text-slate-300"/>
                                                    </div>
                                                ))}
                                                <button onClick={()=>setView('passport')} className="w-full mt-2 py-3 text-[11px] font-black text-slate-400 hover:text-indigo-500 transition-colors uppercase tracking-widest">More Reviews ...</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'passport' && (
                            !isLoggedIn ? (
                                <div className="bg-white p-12 rounded-[3.5rem] shadow-xl border text-center max-w-md mx-auto mt-10">
                                    <div className="w-24 h-24 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-8 text-5xl">🦋</div>
                                    <h2 className="text-2xl font-black mb-6">歡迎登入興嘉護照</h2>
                                    <div className="space-y-4">
                                        <input className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-amber-400 outline-none font-bold text-center text-lg" placeholder="班級 (如:305)" value={student.classId} onChange={e=>setStudent({...student, classId:e.target.value})}/>
                                        <input className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-amber-400 outline-none font-bold text-center text-lg" placeholder="姓名" value={student.name} onChange={e=>setStudent({...student, name:e.target.value})}/>
                                        <button onClick={handleLogin} className="w-full py-4 bg-amber-400 text-white font-black rounded-2xl shadow-lg hover:bg-amber-500 transition-all text-lg">開啟閱讀寶盒</button>
                                        <p className="text-[10px] text-slate-400 font-medium">※公用電腦請放心，登出將自動清除隱私痕跡</p>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-8 animate-in slide-in-from-right duration-500">
                                    <div className="bg-white rounded-[3rem] p-10 border-2 border-slate-100 shadow-sm flex flex-col items-center relative overflow-hidden">
                                        <div className="absolute -top-10 -right-10 w-40 h-40 bg-indigo-50 rounded-full blur-3xl opacity-50"></div>
                                        <div className="text-7xl mb-6">🐛</div>
                                        <h3 className="text-3xl font-black text-slate-800">{student.name} 的專屬空間</h3>
                                        <div className="mt-8 w-full flex justify-around border-t border-slate-100 pt-8">
                                            <div className="text-center"><p className="text-[10px] text-slate-400 font-black uppercase">總篇數</p><p className="text-3xl font-black text-indigo-500">{records.filter(r => getVal(r, 'name') === student.name).length}</p></div>
                                            <div className="text-center"><p className="text-[10px] text-slate-400 font-black uppercase">已通過</p><p className="text-3xl font-black text-green-500">{records.filter(r => getVal(r, 'name') === student.name && getVal(r, 'status') === 'approved').length}</p></div>
                                        </div>
                                    </div>
                                    
                                    <button onClick={() => { setIsEditMode(false); setFormData({id:null, bookTitle:'', author:'', publisher:'', pages:'', reviewType:'text', review:'', image:'', status:'pending'}); setIsFormOpen(true); }} className="w-full py-6 bg-indigo-600 text-white font-black text-xl rounded-[2.5rem] shadow-xl hover:bg-indigo-700 btn-hover flex items-center justify-center gap-3">
                                        <Icon name="edit-3"/> 撰寫心得作品
                                    </button>

                                    <div className="bg-white p-8 rounded-[3rem] border card-shadow">
                                        <div className="flex justify-between items-center mb-8">
                                            <h3 className="font-black text-xl flex items-center gap-2"><Icon name="folder" className="text-amber-500"/> 作品歷史紀錄</h3>
                                            <button onClick={handleLogout} className="text-xs font-black text-rose-400 hover:bg-rose-50 px-4 py-2 rounded-xl transition-all">登出並清除隱私</button>
                                        </div>
                                        <div className="space-y-3">
                                            {records.filter(r => getVal(r, 'name') === student.name).reverse().map(r => (
                                                <div key={getVal(r, 'id')} className="p-5 bg-slate-50/50 rounded-2xl flex justify-between items-center cursor-pointer hover:bg-white border border-transparent hover:border-slate-200 transition-all" onClick={() => setDetail(r)}>
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-2.5 h-2.5 rounded-full ${getVal(r, 'status')==='approved'?'bg-green-400 shadow-[0_0_8px_rgba(74,222,128,0.5)]':'bg-amber-400 shadow-[0_0_8px_rgba(251,191,36,0.5)]'}`}></div>
                                                        <p className="font-bold text-slate-700 truncate max-w-[180px]">《{getVal(r, 'bookTitle')}》</p>
                                                    </div>
                                                    <span className={`text-[10px] font-black px-3 py-1.5 rounded-lg ${getVal(r, 'status')==='approved'?'text-green-500 bg-green-50':'text-amber-500 bg-amber-50'}`}>{getVal(r, 'status')==='approved'?'已通過':'審理中'}</span>
                                                </div>
                                            ))}
                                            {records.filter(r => getVal(r, 'name') === student.name).length === 0 && <p className="text-center py-10 text-slate-300 font-bold">還沒有發表過作品喔，趕快去寫一篇吧！</p>}
                                        </div>
                                    </div>
                                </div>
                            )
                        )}

                        {view === 'admin' && (
                            !isAdmin ? (
                                <div className="bg-white p-12 rounded-[3.5rem] shadow-xl border text-center max-w-md mx-auto mt-10">
                                    <h2 className="text-2xl font-black mb-6">後台管理員</h2>
                                    <input type="password" id="pw" className="w-full p-4 rounded-2xl bg-slate-50 mb-6 text-center text-xl font-black border focus:border-indigo-400 outline-none" placeholder="輸入管理密碼"/>
                                    <button className="w-full py-4 bg-slate-800 text-white font-black rounded-2xl shadow-lg" onClick={() => { if(document.getElementById('pw').value===CONFIG.ADMIN_PWD) setIsAdmin(true); else alert('密碼錯誤'); }}>登入後台</button>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center bg-white p-8 rounded-[2.5rem] border card-shadow">
                                        <h2 className="text-2xl font-black">管理中心</h2>
                                        <button onClick={() => setIsAdmin(false)} className="p-4 bg-rose-50 text-rose-500 rounded-2xl hover:bg-rose-500 hover:text-white transition-all"><Icon name="log-out"/></button>
                                    </div>
                                    <div className="flex bg-slate-200 p-1.5 rounded-2xl gap-1">
                                        {['pending','approved'].map(t => (
                                            <button key={t} onClick={() => setAdminTab(t)} className={`flex-1 py-4 rounded-xl text-xs font-black transition-all ${adminTab===t?'bg-white shadow text-amber-500':'text-slate-500'}`}>{t==='pending'?'待審核':'已通過'}</button>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {records.filter(r => getVal(r, 'status') === adminTab).reverse().map(r => (
                                            <div key={getVal(r, 'id')} className="bg-white p-6 rounded-3xl border shadow-sm flex flex-col gap-4">
                                                <div className="flex justify-between items-start">
                                                    <div onClick={()=>setDetail(r)} className="cursor-pointer group">
                                                        <p className="font-black text-slate-800 group-hover:text-indigo-600">{getVal(r, 'classId')} {getVal(r, 'name')}</p>
                                                        <p className="text-xs font-bold text-slate-400 mt-1">《{getVal(r, 'bookTitle')}》</p>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={()=>{setDetail(r); setIsEditMode(true); setFormData({...r}); setIsFormOpen(true);}} className="p-3 bg-slate-100 text-slate-500 rounded-xl hover:bg-indigo-500 hover:text-white transition-all"><Icon name="edit" size={16}/></button>
                                                        <button onClick={() => {if(confirm('刪除後無法恢復，確定嗎？')) callGAS('deleteRecord', getVal(r, 'id'));}} className="p-3 bg-slate-100 text-slate-400 rounded-xl hover:bg-rose-500 hover:text-white transition-all"><Icon name="trash-2" size={16}/></button>
                                                    </div>
                                                </div>
                                                {adminTab==='pending' && <button onClick={() => callGAS('approveRecord', getVal(r, 'id'))} className="w-full py-3 bg-green-500 text-white rounded-xl font-black text-xs hover:bg-green-600">審核通過</button>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )
                        )}
                    </main>

                    {/* 底部導覽 */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md glass rounded-[3rem] p-2 flex shadow-2xl border border-white/40 z-50">
                        {['home','passport','admin'].map(v => (
                            <button key={v} onClick={() => setView(v)} className={`flex-1 flex flex-col items-center py-4 rounded-[2.6rem] transition-all duration-300 ${view===v?'nav-active':'text-slate-400'}`}>
                                <Icon name={v==='home'?'home':v==='passport'?'book':'settings'}/>
                                <span className="text-[10px] font-black mt-1 uppercase">{v==='home'?'首頁':v==='passport'?'我的':'管理'}</span>
                            </button>
                        ))}
                    </nav>

                    {/* 撰寫心得彈窗 */}
                    {isFormOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-2xl rounded-[3rem] p-8 max-h-[90vh] overflow-y-auto shadow-2xl custom-scrollbar relative">
                                <button onClick={()=>setIsFormOpen(false)} className="absolute top-8 right-8 p-3 bg-slate-100 rounded-full hover:bg-rose-100 text-slate-400 hover:text-rose-500 transition-all"><Icon name="x" size={20}/></button>
                                <h3 className="text-2xl font-black mb-8">{isEditMode ? '修改心得作品' : '發表閱讀心得'}</h3>
                                
                                <div className="space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-xs font-black text-slate-400 ml-2">書名</label>
                                            <input className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-2 border-transparent focus:border-amber-400 outline-none" value={formData.bookTitle} onChange={e=>setFormData({...formData, bookTitle:e.target.value})}/>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-xs font-black text-slate-400 ml-2">作者</label>
                                            <input className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-2 border-transparent focus:border-amber-400 outline-none" value={formData.author} onChange={e=>setFormData({...formData, author:e.target.value})}/>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-xs font-black text-slate-400 ml-2">出版社</label>
                                            <input className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-2 border-transparent focus:border-amber-400 outline-none" value={formData.publisher} onChange={e=>setFormData({...formData, publisher:e.target.value})}/>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-xs font-black text-slate-400 ml-2">頁數</label>
                                            <input type="number" className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-2 border-transparent focus:border-amber-400 outline-none" value={formData.pages} onChange={e=>setFormData({...formData, pages:e.target.value})}/>
                                        </div>
                                    </div>

                                    {/* 低年級照片上傳功能 */}
                                    {isJunior && !isEditMode && (
                                        <div className="p-6 bg-indigo-50 rounded-[2rem] border-2 border-dashed border-indigo-200">
                                            <label className="flex flex-col items-center cursor-pointer">
                                                <div className="bg-white p-4 rounded-full shadow-sm mb-3 text-indigo-500"><Icon name="camera" size={30}/></div>
                                                <span className="text-sm font-black text-indigo-600">低年級專屬：上傳心得照片/畫作</span>
                                                <input type="file" className="hidden" accept="image/*" onChange={handleImageChange}/>
                                            </label>
                                            {formData.image && <div className="mt-4 relative"><img src={formData.image} className="w-full h-40 object-cover rounded-xl border-2 border-white"/><button onClick={()=>setFormData({...formData, image:'', reviewType:'text'})} className="absolute -top-2 -right-2 bg-rose-500 text-white rounded-full p-1"><Icon name="x" size={14}/></button></div>}
                                        </div>
                                    )}

                                    <div className="space-y-2 relative">
                                        <label className="text-xs font-black text-slate-400 ml-2 flex justify-between">
                                            <span>心得分享 (100-500字)</span>
                                            <span className={`${(formData.review.length < 100 || formData.review.length > 500) ? 'text-rose-500' : 'text-green-500'}`}>{formData.review.length} 字</span>
                                        </label>
                                        <textarea className="w-full p-6 bg-slate-50 rounded-[2rem] h-52 font-medium border-2 border-transparent focus:border-amber-400 outline-none resize-none transition-all" placeholder="分享這本書帶給你的感動、啟發或是最喜歡的片段..." value={formData.review} onChange={e=>setFormData({...formData, review:e.target.value})}></textarea>
                                    </div>

                                    <button className={`w-full py-6 text-white text-xl font-black rounded-3xl shadow-xl transition-all btn-hover ${ (formData.review.length < 100 || formData.review.length > 500) && formData.reviewType==='text' ? 'bg-slate-300 cursor-not-allowed' : 'bg-amber-400 hover:bg-amber-500' }`} 
                                        onClick={()=>{
                                            if(!formData.bookTitle) return alert('請填寫書名');
                                            if(formData.reviewType === 'text' && (formData.review.length < 100 || formData.review.length > 500)) return alert('心得字數需介於 100 至 500 字之間喔！');
                                            const action = isEditMode ? 'updateRecord' : 'addRecord';
                                            const payload = isEditMode ? formData : { ...formData, name: student.name, classId: student.classId };
                                            callGAS(action, formData.id, payload);
                                            setIsFormOpen(false);
                                        }}
                                        disabled={formData.reviewType === 'text' && (formData.review.length < 100 || formData.review.length > 500)}
                                    >
                                        {isEditMode ? '更新紀錄' : '送出審核'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 詳細內容查看 */}
                    {detail && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4" onClick={()=>setDetail(null)}>
                            <div className="bg-white w-full max-w-xl rounded-[3.5rem] p-10 shadow-2xl border" onClick={e=>e.stopPropagation()}>
                                <div className="flex justify-between items-start mb-8">
                                    <div>
                                        <h3 className="text-3xl font-black text-slate-800 leading-tight">《{getVal(detail, 'bookTitle')}》</h3>
                                        <p className="text-xs font-black text-amber-500 mt-2 uppercase tracking-widest">{getVal(detail, 'classId')} {mask(getVal(detail, 'name'))}</p>
                                    </div>
                                    <button onClick={()=>setDetail(null)} className="p-3 bg-slate-50 rounded-full text-slate-300 hover:text-rose-500"><Icon name="x" size={24}/></button>
                                </div>
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="bg-slate-50 p-4 rounded-2xl"><p className="text-[10px] font-black text-slate-400 uppercase">作者</p><p className="font-bold text-slate-700">{getVal(detail, 'author') || '未填寫'}</p></div>
                                    <div className="bg-slate-50 p-4 rounded-2xl"><p className="text-[10px] font-black text-slate-400 uppercase">出版社</p><p className="font-bold text-slate-700">{getVal(detail, 'publisher') || '未填寫'}</p></div>
                                </div>
                                <div className="bg-slate-50/50 p-8 rounded-[2.5rem] mb-8 border border-slate-100 max-h-[40vh] overflow-y-auto custom-scrollbar leading-relaxed text-slate-600 font-medium">
                                    {getVal(detail, 'reviewType') === 'image' && getVal(detail, 'image') && (
                                        <img src={getVal(detail, 'image')} className="w-full rounded-2xl border-4 border-white shadow-sm mb-6" />
                                    )}
                                    <p className="whitespace-pre-wrap">{getVal(detail, 'review')}</p>
                                </div>
                                <button className="w-full bg-slate-800 py-4 rounded-2xl text-white font-black hover:bg-slate-700 transition-all shadow-lg" onClick={()=>setDetail(null)}>關閉</button>
                            </div>
                        </div>
                    )}

                    {loading && (
                        <div className="fixed inset-0 bg-white/70 backdrop-blur-md z-[200] flex flex-col items-center justify-center">
                            <div className="w-16 h-16 border-4 border-amber-400 border-t-transparent rounded-full animate-spin mb-4"></div>
                            <div className="font-black text-amber-500 text-[10px] tracking-[0.3em] uppercase">校園數據連線中...</div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
