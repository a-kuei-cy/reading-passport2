<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 線上閱讀護照</title>
    <!-- 使用 Tailwind CSS 加速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 使用 SweetAlert2 製作美觀的彈出視窗 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* 隱藏/顯示的輔助類別 */
        .hidden { display: none !important; }
        /* 載入動畫 */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <script>
        // ==========================================
        // 🔴 請在這裡填入您的 Google Apps Script 部署網址
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyU4Ljogie6v0WdGG_UEul-gRbS1_U-rIFIWbn717DYU4QMdO8ti40QQ9DU2BRsddhJ/exec"; 
    </script>

    <!-- 頂部導覽列 -->
    <nav class="bg-blue-600 text-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span>📚</span> 線上閱讀護照
            </h1>
            <div class="flex gap-2">
                <button onclick="switchView('student')" class="nav-btn bg-blue-700 hover:bg-blue-800 px-3 py-1 rounded transition">學生打卡</button>
                <button onclick="switchView('teacher')" class="nav-btn hover:bg-blue-800 px-3 py-1 rounded transition">老師後台</button>
            </div>
        </div>
    </nav>

    <!-- 主要內容區塊 -->
    <main class="container mx-auto px-4 py-8 max-w-4xl">

        <!-- ========================================== -->
        <!-- 🧑‍🎓 學生打卡視圖 -->
        <!-- ========================================== -->
        <section id="studentView" class="view-section">
            
            <!-- 隨機金句顯示區 -->
            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-8 rounded shadow-sm">
                <p class="text-gray-700 italic flex items-start gap-2">
                    <span class="text-yellow-500 text-xl">💡</span>
                    <span id="quoteDisplay">載入金句中...</span>
                </p>
            </div>

            <!-- 打卡表單 -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-2xl font-bold mb-6 text-center text-blue-800 border-b pb-3">新增閱讀紀錄</h2>
                
                <form id="recordForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">班級 (必填)</label>
                            <input type="text" id="classId" required class="w-full border rounded p-2 focus:ring focus:ring-blue-200 outline-none" placeholder="例如：101">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">姓名 (必填)</label>
                            <input type="text" id="name" required class="w-full border rounded p-2 focus:ring focus:ring-blue-200 outline-none" placeholder="例如：王小明">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">書名 (必填)</label>
                        <input type="text" id="bookTitle" required class="w-full border rounded p-2 focus:ring focus:ring-blue-200 outline-none">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">作者</label>
                            <input type="text" id="author" class="w-full border rounded p-2 focus:ring focus:ring-blue-200 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">出版社</label>
                            <input type="text" id="publisher" class="w-full border rounded p-2 focus:ring focus:ring-blue-200 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">閱讀頁數</label>
                            <input type="number" id="pages" class="w-full border rounded p-2 focus:ring focus:ring-blue-200 outline-none" min="1">
                        </div>
                    </div>

                    <!-- 心得類型選擇 -->
                    <div class="pt-4 border-t mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">請選擇心得繳交方式 (擇一)</label>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2 cursor-pointer p-3 border rounded w-1/2 hover:bg-gray-50 transition">
                                <input type="radio" name="reviewType" value="text" checked onchange="toggleReviewInput()" class="text-blue-600 focus:ring-blue-500">
                                <span>📝 文字心得</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer p-3 border rounded w-1/2 hover:bg-gray-50 transition">
                                <input type="radio" name="reviewType" value="image" onchange="toggleReviewInput()" class="text-blue-600 focus:ring-blue-500">
                                <span>📸 上傳圖片</span>
                            </label>
                        </div>
                    </div>

                    <!-- 📝 文字輸入區 -->
                    <div id="textInputArea" class="mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">心得內容</label>
                        <textarea id="reviewText" rows="4" class="w-full border rounded p-2 focus:ring focus:ring-blue-200 outline-none" placeholder="請寫下這本書的讀後心得..."></textarea>
                    </div>

                    <!-- 📸 圖片上傳區 -->
                    <div id="imageInputArea" class="mt-4 hidden bg-gray-50 p-4 rounded border border-dashed border-gray-300">
                        <label class="block text-sm font-medium text-gray-700 mb-2">上傳手寫心得/學習單照片</label>
                        <input type="file" id="reviewImage" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" onchange="previewImage(event)">
                        
                        <!-- 預覽圖片容器 -->
                        <div id="imagePreviewContainer" class="mt-4 hidden">
                            <p class="text-xs text-gray-500 mb-1">圖片預覽：</p>
                            <img id="imagePreview" src="" alt="預覽圖片" class="max-h-48 rounded border shadow-sm">
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition mt-6 flex justify-center items-center gap-2">
                        <span>送出紀錄</span>
                    </button>
                </form>
            </div>
        </section>


        <!-- ========================================== -->
        <!-- 👨‍🏫 老師後台視圖 -->
        <!-- ========================================== -->
        <section id="teacherView" class="view-section hidden">
            <div class="bg-white rounded-lg shadow-md p-6">
                <div class="flex justify-between items-center mb-6 border-b pb-3">
                    <h2 class="text-2xl font-bold text-blue-800">審核與管理後台</h2>
                    <button onclick="fetchData()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded text-sm transition flex items-center gap-1">
                        <span>🔄</span> 重新整理
                    </button>
                </div>

                <!-- 載入中動畫 -->
                <div id="loading" class="text-center py-10 hidden">
                    <div class="loader mb-2"></div>
                    <p class="text-gray-500">正在從 Google 試算表讀取資料...</p>
                </div>

                <!-- 狀態篩選器 -->
                <div class="flex gap-2 mb-4">
                    <button onclick="filterRecords('all')" id="btn-filter-all" class="px-3 py-1 rounded text-sm font-medium bg-gray-200 text-gray-800">全部</button>
                    <button onclick="filterRecords('pending')" id="btn-filter-pending" class="px-3 py-1 rounded text-sm font-medium bg-yellow-100 text-yellow-800 border border-yellow-200">待審核</button>
                    <button onclick="filterRecords('approved')" id="btn-filter-approved" class="px-3 py-1 rounded text-sm font-medium bg-green-100 text-green-800 border border-green-200">已通過</button>
                    <button onclick="filterRecords('rejected')" id="btn-filter-rejected" class="px-3 py-1 rounded text-sm font-medium bg-red-100 text-red-800 border border-red-200">已退回</button>
                </div>

                <!-- 紀錄列表 -->
                <div class="overflow-x-auto">
                    <table class="min-w-full bg-white border rounded">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="py-2 px-3 border-b text-left text-xs font-semibold text-gray-600">時間/學生</th>
                                <th class="py-2 px-3 border-b text-left text-xs font-semibold text-gray-600">書籍資訊</th>
                                <th class="py-2 px-3 border-b text-left text-xs font-semibold text-gray-600">心得內容</th>
                                <th class="py-2 px-3 border-b text-center text-xs font-semibold text-gray-600">狀態</th>
                                <th class="py-2 px-3 border-b text-center text-xs font-semibold text-gray-600">操作</th>
                            </tr>
                        </thead>
                        <tbody id="recordsTableBody" class="text-sm">
                            <!-- 資料會由 JS 動態生成 -->
                        </tbody>
                    </table>
                    <p id="noDataMsg" class="text-center text-gray-500 py-8 hidden">目前沒有任何紀錄。</p>
                </div>
            </div>
        </section>

    </main>

    <!-- ========================================== -->
    <!-- 🟢 JavaScript 邏輯區 -->
    <!-- ========================================== -->
    <script>
        // --- 變數與初始化 ---
        let allRecords = [];
        let currentFilter = 'all';

        // 檢查 GAS URL 是否有填寫
        if (GAS_URL === "在此填入您的網頁應用程式網址") {
            Swal.fire('系統提示', '請先在程式碼第17行填入 Google Apps Script 的網址！', 'warning');
        } else {
            // 頁面載入時先抓取一次資料(為了顯示金句)
            fetchData(); 
        }

        // --- 畫面切換 (學生/老師) ---
        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(view + 'View').classList.remove('hidden');
            
            // 更新導覽列按鈕樣式
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('bg-blue-700'));
            event.target.classList.add('bg-blue-700');

            if(view === 'teacher') fetchData();
        }

        // --- 切換心得輸入方式 (文字/圖片) ---
        function toggleReviewInput() {
            const type = document.querySelector('input[name="reviewType"]:checked').value;
            const textInput = document.getElementById('textInputArea');
            const imgInput = document.getElementById('imageInputArea');
            
            if (type === 'text') {
                textInput.classList.remove('hidden');
                imgInput.classList.add('hidden');
                document.getElementById('reviewText').required = true;
                document.getElementById('reviewImage').required = false;
            } else {
                textInput.classList.add('hidden');
                imgInput.classList.remove('hidden');
                document.getElementById('reviewText').required = false;
                document.getElementById('reviewImage').required = true;
            }
        }

        // --- 圖片預覽與壓縮轉換為 Base64 ---
        let base64ImageString = ""; // 用來儲存準備送出的圖片字串

        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 顯示預覽容器
            const container = document.getElementById('imagePreviewContainer');
            const preview = document.getElementById('imagePreview');
            container.classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // --- 圖片壓縮邏輯 ---
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; // 最大寬度
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    // 計算等比例縮小
                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 轉為 jpeg 格式並降低品質 (0.7 = 70% 品質) 以減小檔案體積
                    base64ImageString = canvas.toDataURL('image/jpeg', 0.7); 
                    preview.src = base64ImageString; // 更新預覽圖
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        // --- 送出表單 (學生打卡) ---
        document.getElementById('recordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const reviewType = document.querySelector('input[name="reviewType"]:checked').value;
            
            // 檢查圖片是否已選擇
            if (reviewType === 'image' && !base64ImageString) {
                Swal.fire('錯誤', '請選擇要上傳的圖片！', 'error');
                return;
            }

            const data = {
                classId: document.getElementById('classId').value,
                name: document.getElementById('name').value,
                bookTitle: document.getElementById('bookTitle').value,
                author: document.getElementById('author').value,
                publisher: document.getElementById('publisher').value,
                pages: document.getElementById('pages').value,
                reviewType: reviewType,
                review: reviewType === 'text' ? document.getElementById('reviewText').value : '',
                image: reviewType === 'image' ? base64ImageString : ''
            };

            // 改變按鈕狀態
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="loader border-t-white" style="width:20px;height:20px;border-width:2px;"></div> 處理中...';

            // 發送至 GAS
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'addRecord', data: data })
            })
            .then(res => res.json())
            .then(result => {
                if (result.status === 'success') {
                    Swal.fire('成功！', '閱讀紀錄已送出，等待老師審核！', 'success');
                    document.getElementById('recordForm').reset();
                    document.getElementById('imagePreviewContainer').classList.add('hidden');
                    base64ImageString = ""; // 清空圖片資料
                } else {
                    Swal.fire('發生錯誤', result.message || '無法儲存', 'error');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                Swal.fire('網路錯誤', '無法連線至伺服器，請稍後再試。', 'error');
            })
            .finally(() => {
                // 恢復按鈕狀態
                submitBtn.disabled = false;
                submitBtn.innerHTML = '送出紀錄';
            });
        });

        // --- 取得所有資料 (含金句與紀錄) ---
        function fetchData() {
            if(!document.getElementById('teacherView').classList.contains('hidden')){
                document.getElementById('loading').classList.remove('hidden');
                document.getElementById('recordsTableBody').innerHTML = '';
            }

            fetch(`${GAS_URL}?action=getAll`)
            .then(res => res.json())
            .then(result => {
                if (result.status === 'success') {
                    // 更新隨機金句
                    if(result.data.quotes && result.data.quotes.length > 0) {
                        const randomQuote = result.data.quotes[Math.floor(Math.random() * result.data.quotes.length)].text;
                        document.getElementById('quoteDisplay').textContent = randomQuote;
                    }

                    // 儲存紀錄並渲染表格
                    allRecords = result.data.records || [];
                    
                    // 倒序排列 (最新的在最上面)
                    allRecords.reverse();
                    
                    renderTable();
                } else {
                    console.error("資料獲取失敗:", result);
                }
            })
            .catch(error => {
                console.error('Error fetching data:', error);
            })
            .finally(() => {
                document.getElementById('loading').classList.add('hidden');
            });
        }

        // --- 渲染老師後台表格 ---
        function renderTable() {
            const tbody = document.getElementById('recordsTableBody');
            const noDataMsg = document.getElementById('noDataMsg');
            tbody.innerHTML = '';

            // 根據目前過濾狀態篩選
            const filteredRecords = currentFilter === 'all' 
                ? allRecords 
                : allRecords.filter(r => r.status === currentFilter);

            if (filteredRecords.length === 0) {
                noDataMsg.classList.remove('hidden');
            } else {
                noDataMsg.classList.add('hidden');
                
                filteredRecords.forEach(record => {
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-gray-50 border-b';
                    
                    // 狀態標籤樣式
                    let statusHtml = '';
                    if (record.status === 'approved') statusHtml = '<span class="bg-green-100 text-green-800 px-2 py-1 rounded text-xs">已通過</span>';
                    else if (record.status === 'rejected') statusHtml = '<span class="bg-red-100 text-red-800 px-2 py-1 rounded text-xs">已退回</span>';
                    else statusHtml = '<span class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded text-xs">待審核</span>';

                    // 心得內容顯示 (文字或圖片)
                    let reviewHtml = '';
                    if (record.reviewType === 'image') {
                        reviewHtml = `<a href="${record.image}" target="_blank" class="text-blue-500 hover:underline flex items-center gap-1"><span>🖼️</span> 查看圖片</a>`;
                    } else {
                        // 限制字數預覽
                        const shortReview = record.review.length > 30 ? record.review.substring(0, 30) + '...' : record.review;
                        reviewHtml = `<span title="${record.review}">${shortReview}</span>`;
                    }

                    tr.innerHTML = `
                        <td class="py-2 px-3 align-top">
                            <div class="text-xs text-gray-500">${record.time.split(' ')[0]}</div>
                            <div class="font-medium">${record.classId} ${record.name}</div>
                        </td>
                        <td class="py-2 px-3 align-top">
                            <div class="font-medium text-blue-700">${record.bookTitle}</div>
                            <div class="text-xs text-gray-600">${record.author} / ${record.pages}頁</div>
                        </td>
                        <td class="py-2 px-3 align-top max-w-xs">
                            ${reviewHtml}
                        </td>
                        <td class="py-2 px-3 align-top text-center">
                            ${statusHtml}
                        </td>
                        <td class="py-2 px-3 align-top text-center">
                            ${record.status === 'pending' ? `
                                <button onclick="updateStatus('${record.id}', 'approveRecord')" class="bg-green-500 hover:bg-green-600 text-white p-1 rounded mb-1 text-xs w-full">通過</button>
                                <button onclick="updateStatus('${record.id}', 'rejectRecord')" class="bg-red-400 hover:bg-red-500 text-white p-1 rounded text-xs w-full">退回</button>
                            ` : `
                                <button onclick="deleteRecord('${record.id}')" class="text-red-500 hover:underline text-xs">刪除</button>
                            `}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            updateFilterButtons();
        }

        // --- 過濾紀錄 ---
        function filterRecords(status) {
            currentFilter = status;
            renderTable();
        }

        function updateFilterButtons() {
            ['all', 'pending', 'approved', 'rejected'].forEach(status => {
                const btn = document.getElementById(`btn-filter-${status}`);
                if(status === currentFilter) {
                    btn.classList.add('ring-2', 'ring-blue-400', 'ring-offset-1');
                } else {
                    btn.classList.remove('ring-2', 'ring-blue-400', 'ring-offset-1');
                }
            });
        }

        // --- 更新狀態 (審核通過/退回) ---
        function updateStatus(id, actionCode) {
            const actionText = actionCode === 'approveRecord' ? '通過' : '退回';
            
            Swal.fire({
                title: `確定要${actionText}此紀錄嗎？`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: '確定',
                cancelButtonText: '取消'
            }).then((result) => {
                if (result.isConfirmed) {
                    
                    Swal.fire({ title: '處理中...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});

                    fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: actionCode, id: id })
                    })
                    .then(res => res.json())
                    .then(res => {
                        if (res.status === 'success') {
                            Swal.fire('完成！', `紀錄已${actionText}`, 'success');
                            // 在本地端更新資料，不用重新抓取
                            const idx = allRecords.findIndex(r => r.id === id);
                            if(idx > -1) allRecords[idx].status = actionCode === 'approveRecord' ? 'approved' : 'rejected';
                            renderTable();
                        } else {
                            Swal.fire('錯誤', res.message, 'error');
                        }
                    });
                }
            });
        }

        // --- 刪除紀錄 ---
        function deleteRecord(id) {
            Swal.fire({
                title: '確定要永久刪除此紀錄嗎？',
                text: "如果含有圖片，雲端檔案也會一併刪除且無法恢復！",
                icon: 'error',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: '確定刪除',
                cancelButtonText: '取消'
            }).then((result) => {
                if (result.isConfirmed) {
                    
                    Swal.fire({ title: '刪除中...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});

                    fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'deleteRecord', id: id })
                    })
                    .then(res => res.json())
                    .then(res => {
                        if (res.status === 'success') {
                            Swal.fire('完成！', '紀錄已刪除', 'success');
                            allRecords = allRecords.filter(r => r.id !== id);
                            renderTable();
                        } else {
                            Swal.fire('錯誤', res.message, 'error');
                        }
                    });
                }
            });
        }

    </script>
</body>
</html>
