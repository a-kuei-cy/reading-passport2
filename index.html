<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>興嘉閱讀護照 | 管理與視覺升級版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); }
        .nav-active { background: #f59e0b; color: white; box-shadow: 0 10px 20px -5px rgba(245, 158, 11, 0.4); }
        .card-shadow { box-shadow: 0 4px 25px rgba(0,0,0,0.04); }
        .btn-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-hover:active { transform: scale(0.95); }
        
        /* 捲軸美化 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .list-container { max-height: 420px; overflow-y: auto; padding-right: 4px; }
        
        /* 加大字型 */
        .field-label { font-size: 0.95rem; font-weight: 900; color: #475569; margin-left: 0.5rem; margin-bottom: 0.25rem; display: block; }
        .field-input { font-size: 1.15rem; font-weight: 700; }
        .field-textarea { font-size: 1.1rem; line-height: 1.7; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        const CONFIG = {
            GAS_URL: "https://script.google.com/macros/s/AKfycbz8PuqxvXMnDOLizffDYbvjHkkUJc8wvfGlfAUcXSR-XVxawhnzOkmAmcgZ4ir8EzIt/exec",
            ADMIN_PWD: "S2860885*110" 
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [view, setView] = useState('home');
            const [loading, setLoading] = useState(false);
            const [records, setRecords] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminTab, setAdminTab] = useState('pending');
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [student, setStudent] = useState({ classId: '', name: '' });
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            
            // 金句管理
            const [slogan, setSlogan] = useState(() => localStorage.getItem('xj_slogan') || "讀萬卷書，行萬里路");
            const [sloganSub, setSloganSub] = useState(() => localStorage.getItem('xj_slogan_sub') || "興嘉小達人，讓我們一起探索書中的奇幻世界！");

            const [formData, setFormData] = useState({ 
                id: null, bookTitle: '', author: '', publisher: '', pages: '', 
                reviewType: 'text', review: '', image: '', status: 'pending' 
            });
            const [detail, setDetail] = useState(null);

            const getVal = (obj, key) => {
                if (!obj) return "";
                const keys = Object.keys(obj);
                const targetKey = keys.find(k => k.trim().toLowerCase() === key.toLowerCase());
                return targetKey ? obj[targetKey] : "";
            };

            const mask = (s) => (s && s.length > 1) ? s[0] + 'O' + (s.length > 2 ? s.slice(2) : '') : s;

            const fetchData = useCallback(async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${CONFIG.GAS_URL}?action=getAll`);
                    const json = await res.json();
                    if (json.status === 'success') setRecords(json.data.records || []);
                } catch (e) { console.error(e); }
                setLoading(false);
            }, []);

            useEffect(() => { fetchData(); }, [fetchData]);

            const callGAS = async (action, id = null, data = null) => {
                setLoading(true);
                try {
                    await fetch(CONFIG.GAS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action, id, data })
                    });
                    if (action === 'addRecord' && !isAdmin) {
                        setTimeout(() => {
                            alert("心得已送出！為了保護隱私，系統即將清除紀錄並登出。");
                            handleLogout();
                            setLoading(false);
                        }, 2000);
                    } else {
                        setTimeout(() => { fetchData(); setLoading(false); }, 1500);
                    }
                } catch (e) { console.error(e); setLoading(false); }
            };

            const handleLogin = () => {
                if (!student.classId || !student.name) return alert("請輸入班級與姓名");
                setIsLoggedIn(true);
            };

            const handleLogout = () => {
                setStudent({ classId: '', name: '' });
                setIsLoggedIn(false);
                setView('home');
                // 保留金句，其餘清除
                const s = localStorage.getItem('xj_slogan');
                const ss = localStorage.getItem('xj_slogan_sub');
                localStorage.clear();
                if(s) localStorage.setItem('xj_slogan', s);
                if(ss) localStorage.setItem('xj_slogan_sub', ss);
                sessionStorage.clear();
            };

            // 資料匯出匯入
            const exportData = () => {
                const dataStr = JSON.stringify(records, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `興嘉閱讀紀錄備份_${new Date().toLocaleDateString()}.json`;
                link.click();
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (Array.isArray(imported)) {
                            if (confirm(`確定要匯入 ${imported.length} 筆資料嗎？這不會覆蓋 GAS 上的資料，僅供本地瀏覽與操作。`)) {
                                setRecords(imported);
                                alert("匯入成功！");
                            }
                        }
                    } catch (err) { alert("檔案格式錯誤"); }
                };
                reader.readAsText(file);
            };

            const isJunior = useMemo(() => {
                const grade = student.classId ? student.classId[0] : '';
                return grade === '1' || grade === '2';
            }, [student.classId]);

            const topStudents = useMemo(() => {
                const approved = records.filter(r => String(getVal(r, 'status')).toLowerCase() === 'approved');
                const counts = {};
                approved.forEach(r => {
                    const key = `${getVal(r, 'classId')}_${getVal(r, 'name')}`;
                    counts[key] = (counts[key] || 0) + 1;
                });
                return Object.entries(counts).map(([k, count]) => ({ classId: k.split('_')[0], name: k.split('_')[1], count }))
                    .sort((a, b) => b.count - a.count).slice(0, 10);
            }, [records]);

            const gradeStats = useMemo(() => {
                const g = { "一年級":0, "二年級":0, "三年級":0, "四年級":0, "五年級":0, "六年級":0 };
                records.filter(r => String(getVal(r, 'status')).toLowerCase() === 'approved').forEach(r => {
                    const cid = String(getVal(r, 'classId'))[0];
                    const n = ["","一","二","三","四","五","六"][cid] + "年級";
                    if(g[n]!==undefined) g[n]++;
                });
                return Object.entries(g);
            }, [records]);

            const latestReviews = useMemo(() => records.filter(r => getVal(r, 'status') === 'approved').slice(-3).reverse(), [records]);

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => setFormData({ ...formData, image: ev.target.result, reviewType: 'image' });
                reader.readAsDataURL(file);
            };

            return (
                <div className="min-h-screen pb-32">
                    <header className="glass sticky top-0 z-50 border-b p-5 flex justify-between items-center shadow-sm">
                        <div onClick={()=>setView('home')} className="cursor-pointer flex items-center gap-3">
                            <div className="bg-amber-400 p-2 rounded-xl text-white shadow-inner"><Icon name="book-open" size={24}/></div>
                            <h1 className="text-xl font-black text-slate-800 tracking-tight">興嘉閱讀護照</h1>
                        </div>
                        <div className="flex gap-2">
                            {isLoggedIn && <span className="text-[10px] font-black bg-slate-100 px-3 py-2 rounded-xl text-slate-500 border border-slate-200">{student.classId} {student.name}</span>}
                            <button onClick={fetchData} className="p-2.5 bg-white rounded-xl border shadow-sm text-slate-400 hover:text-amber-500 transition-all"><Icon name="refresh-cw" size={18}/></button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-8 space-y-6">
                        {view === 'home' && (
                            <div className="space-y-6 animate-in fade-in duration-700">
                                <div className="bg-gradient-to-br from-amber-400 via-amber-500 to-orange-500 rounded-[3rem] p-10 md:p-16 text-center space-y-4 shadow-xl shadow-amber-100 relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
                                    <h2 className="text-4xl md:text-6xl font-black text-white leading-tight relative z-10 drop-shadow-md">{slogan}</h2>
                                    <p className="text-white/90 font-bold text-base md:text-xl relative z-10">{sloganSub}</p>
                                    {!isLoggedIn && (
                                        <button onClick={()=>setView('passport')} className="mt-6 px-12 py-4 bg-white text-orange-500 font-black rounded-2xl shadow-xl hover:bg-slate-50 transition-all hover:-translate-y-1 relative z-10 text-lg">登入個人護照</button>
                                    )}
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                                    {/* 排行榜 */}
                                    <div className="lg:col-span-5 bg-white rounded-[2.5rem] p-8 border card-shadow">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="text-xl font-black flex items-center gap-2"><Icon name="trophy" className="text-amber-400"/> 閱讀小達人榜</h3>
                                            <span className="text-[10px] bg-amber-50 text-amber-500 px-3 py-1 rounded-lg font-black tracking-widest">TOP 10</span>
                                        </div>
                                        <div className="list-container custom-scrollbar">
                                            <div className="space-y-2.5">
                                                {topStudents.map((s, i) => (
                                                    <div key={i} className="flex items-center justify-between p-4 bg-slate-50/50 rounded-2xl border border-transparent hover:border-amber-100 transition-all">
                                                        <div className="flex items-center gap-4">
                                                            <span className={`w-8 h-8 flex items-center justify-center rounded-full font-black text-xs ${i<3 ? 'bg-amber-400 text-white shadow-lg shadow-amber-200' : 'bg-slate-200 text-slate-500'}`}>{i+1}</span>
                                                            <div>
                                                                <p className="font-black text-slate-700">{mask(s.name)}</p>
                                                                <p className="text-[10px] text-slate-400 font-bold">{s.classId} 班</p>
                                                            </div>
                                                        </div>
                                                        <div className="text-right">
                                                            <span className="text-2xl font-black text-amber-500">{s.count}</span>
                                                            <span className="text-[10px] text-slate-400 font-black ml-1">篇</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* 右側內容 */}
                                    <div className="lg:col-span-7 flex flex-col gap-6">
                                        <div className="bg-white rounded-[2.5rem] p-8 border card-shadow">
                                            <h3 className="text-xl font-black mb-6 flex items-center gap-2"><Icon name="activity" className="text-indigo-500"/> 各年級閱讀量</h3>
                                            <div className="grid grid-cols-2 gap-x-8 gap-y-5">
                                                {gradeStats.map(([grade, count]) => {
                                                    const max = Math.max(...gradeStats.map(gs => gs[1])) || 1;
                                                    const percent = (count / max) * 100;
                                                    return (
                                                        <div key={grade} className="space-y-2">
                                                            <div className="flex justify-between text-[11px] font-black px-1">
                                                                <span className="text-slate-500">{grade}</span>
                                                                <span className="text-indigo-500">{count} 篇</span>
                                                            </div>
                                                            <div className="h-2.5 w-full bg-slate-100 rounded-full overflow-hidden">
                                                                <div className="h-full bg-indigo-500 rounded-full transition-all duration-1000" style={{ width: `${percent}%` }}></div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        <div className="bg-white rounded-[2.5rem] p-8 border card-shadow flex-1">
                                            <h3 className="text-xl font-black mb-4 flex items-center gap-2"><Icon name="quote" className="text-rose-500"/> 精選心得分享</h3>
                                            <div className="space-y-3">
                                                {latestReviews.map((r, i) => (
                                                    <div key={i} onClick={()=>setDetail(r)} className="p-4 bg-rose-50/30 rounded-2xl border border-rose-100/30 cursor-pointer hover:bg-rose-50 transition-all flex justify-between items-center group">
                                                        <div className="flex flex-col gap-1">
                                                            <p className="font-black text-slate-800 group-hover:text-rose-500 transition-colors">《{getVal(r, 'bookTitle')}》</p>
                                                            <p className="text-[10px] text-slate-400 font-bold">{mask(getVal(r, 'name'))} ({getVal(r, 'classId')})</p>
                                                        </div>
                                                        <Icon name="arrow-right" size={16} className="text-slate-300"/>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'passport' && (
                            !isLoggedIn ? (
                                <div className="bg-white p-12 rounded-[3.5rem] shadow-xl border text-center max-w-md mx-auto mt-6">
                                    <div className="w-24 h-24 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-8 text-5xl">🔑</div>
                                    <h2 className="text-3xl font-black mb-8">閱讀護照登入</h2>
                                    <div className="space-y-5">
                                        <div className="text-left">
                                            <label className="text-xs font-black text-slate-400 ml-4 mb-2 block">班級 (三位數)</label>
                                            <input className="w-full p-5 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-amber-400 outline-none font-black text-center text-xl" placeholder="例如: 305" value={student.classId} onChange={e=>setStudent({...student, classId:e.target.value})}/>
                                        </div>
                                        <div className="text-left">
                                            <label className="text-xs font-black text-slate-400 ml-4 mb-2 block">學生姓名</label>
                                            <input className="w-full p-5 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-amber-400 outline-none font-black text-center text-xl" placeholder="請輸入姓名" value={student.name} onChange={e=>setStudent({...student, name:e.target.value})}/>
                                        </div>
                                        <button onClick={handleLogin} className="w-full py-5 bg-amber-400 text-white font-black rounded-2xl shadow-xl hover:bg-amber-500 transition-all text-xl mt-4">開啟護照</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-6 animate-in slide-in-from-right duration-500">
                                    <div className="bg-white rounded-[3rem] p-10 border shadow-sm flex flex-col items-center relative overflow-hidden text-center">
                                        <div className="w-24 h-24 bg-indigo-50 rounded-full flex items-center justify-center mb-6 text-5xl animate-bounce">🎨</div>
                                        <h3 className="text-3xl font-black text-slate-800 mb-2">{student.name}，你好！</h3>
                                        <p className="text-slate-400 font-bold mb-8">今天想分享哪一本好書呢？</p>
                                        <div className="grid grid-cols-2 gap-6 w-full max-w-sm border-t pt-8">
                                            <div><p className="text-[10px] text-slate-400 font-black mb-1">已撰寫</p><p className="text-3xl font-black text-indigo-500">{records.filter(r => getVal(r, 'name') === student.name).length}</p></div>
                                            <div><p className="text-[10px] text-slate-400 font-black mb-1">通過審核</p><p className="text-3xl font-black text-green-500">{records.filter(r => getVal(r, 'name') === student.name && getVal(r, 'status') === 'approved').length}</p></div>
                                        </div>
                                    </div>
                                    
                                    <button onClick={() => { setIsEditMode(false); setFormData({id:null, bookTitle:'', author:'', publisher:'', pages:'', reviewType:'text', review:'', image:'', status:'pending'}); setIsFormOpen(true); }} className="w-full py-6 bg-indigo-600 text-white font-black text-xl rounded-[2.5rem] shadow-2xl hover:bg-indigo-700 btn-hover flex items-center justify-center gap-4">
                                        <Icon name="plus-circle" size={28}/> 撰寫新的心得
                                    </button>

                                    <div className="bg-white p-8 rounded-[3rem] border card-shadow">
                                        <div className="flex justify-between items-center mb-8">
                                            <h3 className="font-black text-xl flex items-center gap-2"><Icon name="list" className="text-amber-500"/> 我的心得紀錄</h3>
                                            <button onClick={handleLogout} className="text-xs font-black text-rose-500 bg-rose-50 px-4 py-2 rounded-xl">登出並清除痕跡</button>
                                        </div>
                                        <div className="space-y-3">
                                            {records.filter(r => getVal(r, 'name') === student.name).reverse().map(r => (
                                                <div key={getVal(r, 'id')} className="p-5 bg-slate-50/50 rounded-2xl flex justify-between items-center cursor-pointer hover:bg-white border border-transparent hover:border-slate-200 transition-all" onClick={() => setDetail(r)}>
                                                    <p className="font-black text-slate-700">《{getVal(r, 'bookTitle')}》</p>
                                                    <span className={`text-[10px] font-black px-3 py-1.5 rounded-lg ${getVal(r, 'status')==='approved'?'text-green-500 bg-green-50':'text-amber-500 bg-amber-50'}`}>{getVal(r, 'status')==='approved'?'已通過':'審理中'}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )
                        )}

                        {view === 'admin' && (
                            !isAdmin ? (
                                <div className="bg-white p-12 rounded-[3.5rem] shadow-xl border text-center max-w-md mx-auto mt-6">
                                    <h2 className="text-2xl font-black mb-8">管理員權限驗證</h2>
                                    <input type="password" id="pw" className="w-full p-5 rounded-2xl bg-slate-50 mb-6 text-center text-2xl font-black border-2 focus:border-indigo-400 outline-none" placeholder="請輸入管理密碼"/>
                                    <button className="w-full py-5 bg-slate-800 text-white font-black rounded-2xl shadow-xl" onClick={() => { if(document.getElementById('pw').value===CONFIG.ADMIN_PWD) setIsAdmin(true); else alert('密碼錯誤'); }}>登入系統</button>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center bg-white p-8 rounded-[2.5rem] border card-shadow">
                                        <h2 className="text-2xl font-black flex items-center gap-3"><Icon name="settings" size={28}/> 系統管理後台</h2>
                                        <button onClick={() => setIsAdmin(false)} className="p-4 bg-rose-50 text-rose-500 rounded-2xl hover:bg-rose-500 hover:text-white transition-all"><Icon name="power"/></button>
                                    </div>

                                    {/* 金句管理區 */}
                                    <div className="bg-white p-8 rounded-[2.5rem] border card-shadow space-y-4">
                                        <h3 className="font-black text-lg flex items-center gap-2"><Icon name="edit-3" className="text-orange-500"/> 首頁金句管理</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <input className="p-4 bg-slate-50 rounded-xl font-bold border focus:border-orange-400 outline-none" placeholder="主金句 (例如: 讀萬卷書...)" value={slogan} onChange={e=>{setSlogan(e.target.value); localStorage.setItem('xj_slogan', e.target.value);}}/>
                                            <input className="p-4 bg-slate-50 rounded-xl font-bold border focus:border-orange-400 outline-none" placeholder="副標語..." value={sloganSub} onChange={e=>{setSloganSub(e.target.value); localStorage.setItem('xj_slogan_sub', e.target.value);}}/>
                                        </div>
                                    </div>

                                    {/* 資料匯入匯出區 */}
                                    <div className="bg-white p-8 rounded-[2.5rem] border card-shadow">
                                        <h3 className="font-black text-lg flex items-center gap-2 mb-4"><Icon name="database" className="text-indigo-500"/> 資料備份與還原</h3>
                                        <div className="flex flex-wrap gap-4">
                                            <button onClick={exportData} className="flex-1 min-w-[150px] py-4 bg-indigo-500 text-white font-black rounded-2xl shadow-lg hover:bg-indigo-600 flex items-center justify-center gap-2 transition-all">
                                                <Icon name="download"/> 匯出資料 (JSON)
                                            </button>
                                            <label className="flex-1 min-w-[150px] py-4 bg-slate-800 text-white font-black rounded-2xl shadow-lg hover:bg-slate-700 flex items-center justify-center gap-2 cursor-pointer transition-all">
                                                <Icon name="upload"/> 匯入資料
                                                <input type="file" className="hidden" accept=".json" onChange={importData}/>
                                            </label>
                                        </div>
                                    </div>

                                    <div className="flex bg-slate-200 p-1.5 rounded-2xl gap-1">
                                        {['pending','approved'].map(t => (
                                            <button key={t} onClick={() => setAdminTab(t)} className={`flex-1 py-4 rounded-xl text-xs font-black transition-all ${adminTab===t?'bg-white shadow text-amber-500':'text-slate-500'}`}>{t==='pending'?'待審核作品':'已通過作品'}</button>
                                        ))}
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {records.filter(r => getVal(r, 'status') === adminTab).reverse().map(r => (
                                            <div key={getVal(r, 'id')} className="bg-white p-6 rounded-[2rem] border shadow-sm flex flex-col gap-4">
                                                <div className="flex justify-between items-start">
                                                    <div onClick={()=>setDetail(r)} className="cursor-pointer">
                                                        <p className="font-black text-slate-800">{getVal(r, 'classId')} {getVal(r, 'name')}</p>
                                                        <p className="text-xs font-bold text-slate-400 mt-1 truncate max-w-[150px]">《{getVal(r, 'bookTitle')}》</p>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={()=>{setDetail(r); setIsEditMode(true); setFormData({...r}); setIsFormOpen(true);}} className="p-3 bg-slate-100 text-slate-500 rounded-xl"><Icon name="edit" size={16}/></button>
                                                        <button onClick={() => {if(confirm('確定要永久刪除這筆紀錄嗎？')) callGAS('deleteRecord', getVal(r, 'id'));}} className="p-3 bg-slate-100 text-rose-400 rounded-xl"><Icon name="trash-2" size={16}/></button>
                                                    </div>
                                                </div>
                                                {adminTab==='pending' && <button onClick={() => callGAS('approveRecord', getVal(r, 'id'))} className="w-full py-3 bg-green-500 text-white rounded-xl font-black text-xs hover:bg-green-600 transition-all">核准通過</button>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )
                        )}
                    </main>

                    {/* 底部導覽 */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass rounded-full p-2 flex shadow-2xl border border-white/40 z-50">
                        {['home','passport','admin'].map(v => (
                            <button key={v} onClick={() => setView(v)} className={`flex-1 flex flex-col items-center py-4 rounded-full transition-all duration-300 ${view===v?'nav-active':'text-slate-400'}`}>
                                <Icon name={v==='home'?'home':v==='passport'?'user':'shield'} size={20}/>
                                <span className="text-[10px] font-black mt-1 uppercase">{v==='home'?'首頁':v==='passport'?'個人':'管理'}</span>
                            </button>
                        ))}
                    </nav>

                    {/* 心得彈窗 (加大字型版) */}
                    {isFormOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-2xl rounded-[3rem] p-8 md:p-12 max-h-[90vh] overflow-y-auto shadow-2xl custom-scrollbar relative">
                                <button onClick={()=>setIsFormOpen(false)} className="absolute top-8 right-8 p-3 bg-slate-100 rounded-full hover:bg-rose-100 text-slate-400 hover:text-rose-500 transition-all"><Icon name="x" size={24}/></button>
                                <h3 className="text-3xl font-black mb-10 text-slate-800">{isEditMode ? '修改心得作品' : '發表我的心得'}</h3>
                                
                                <div className="space-y-8">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="space-y-1">
                                            <label className="field-label">書名</label>
                                            <input className="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-amber-400 outline-none field-input text-slate-700" value={formData.bookTitle} onChange={e=>setFormData({...formData, bookTitle:e.target.value})} placeholder="請輸入完整的書名"/>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="field-label">作者</label>
                                            <input className="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-amber-400 outline-none field-input text-slate-700" value={formData.author} onChange={e=>setFormData({...formData, author:e.target.value})} placeholder="作者姓名"/>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="field-label">出版社</label>
                                            <input className="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-amber-400 outline-none field-input text-slate-700" value={formData.publisher} onChange={e=>setFormData({...formData, publisher:e.target.value})} placeholder="例如: 親子天下"/>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="field-label">頁數</label>
                                            <input type="number" className="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-amber-400 outline-none field-input text-slate-700" value={formData.pages} onChange={e=>setFormData({...formData, pages:e.target.value})} placeholder="總頁數"/>
                                        </div>
                                    </div>

                                    {isJunior && !isEditMode && (
                                        <div className="p-8 bg-indigo-50 rounded-[2.5rem] border-2 border-dashed border-indigo-200 text-center">
                                            <label className="cursor-pointer">
                                                <div className="bg-white p-5 rounded-full shadow-lg mx-auto w-fit mb-4 text-indigo-500"><Icon name="camera" size={32}/></div>
                                                <span className="text-lg font-black text-indigo-600 block">低年級特別通道：點我拍照上傳畫作</span>
                                                <input type="file" className="hidden" accept="image/*" onChange={handleImageChange}/>
                                            </label>
                                            {formData.image && <div className="mt-6 relative inline-block"><img src={formData.image} className="h-40 rounded-2xl border-4 border-white shadow-xl"/><button onClick={()=>setFormData({...formData, image:'', reviewType:'text'})} className="absolute -top-3 -right-3 bg-rose-500 text-white rounded-full p-1.5 shadow-lg"><Icon name="x" size={16}/></button></div>}
                                        </div>
                                    )}

                                    <div className="space-y-3 relative">
                                        <label className="field-label flex justify-between items-center">
                                            <span>心得分享 (100-500字)</span>
                                            <span className={`text-xs px-3 py-1 rounded-full ${(formData.review.length < 100 || formData.review.length > 500) ? 'bg-rose-100 text-rose-500' : 'bg-green-100 text-green-500'}`}>{formData.review.length} 字</span>
                                        </label>
                                        <textarea className="w-full p-8 bg-slate-50 rounded-[2.5rem] h-64 border-2 border-transparent focus:border-amber-400 outline-none resize-none transition-all field-textarea text-slate-700" placeholder="這本書讓你想到了什麼？哪些部分最精彩？歡迎跟我們分享你的想法..." value={formData.review} onChange={e=>setFormData({...formData, review:e.target.value})}></textarea>
                                    </div>

                                    <button className={`w-full py-6 text-white text-2xl font-black rounded-[2rem] shadow-2xl transition-all btn-hover flex items-center justify-center gap-3 ${ (formData.review.length < 100 || formData.review.length > 500) && formData.reviewType==='text' ? 'bg-slate-300 cursor-not-allowed opacity-50' : 'bg-amber-400 hover:bg-amber-500 active:bg-amber-600' }`} 
                                        onClick={()=>{
                                            if(!formData.bookTitle) return alert('請填寫書名喔！');
                                            if(formData.reviewType === 'text' && (formData.review.length < 100 || formData.review.length > 500)) return alert('心得字數要在 100 到 500 字之間喔！加油！');
                                            const action = isEditMode ? 'updateRecord' : 'addRecord';
                                            const payload = isEditMode ? formData : { ...formData, name: student.name, classId: student.classId };
                                            callGAS(action, formData.id, payload);
                                            setIsFormOpen(false);
                                        }}
                                        disabled={formData.reviewType === 'text' && (formData.review.length < 100 || formData.review.length > 500)}
                                    >
                                        <Icon name="send" size={24}/> {isEditMode ? '確認更新內容' : '完成，送出作品'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 詳細內容查看 */}
                    {detail && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4" onClick={()=>setDetail(null)}>
                            <div className="bg-white w-full max-w-xl rounded-[3rem] p-10 shadow-2xl border" onClick={e=>e.stopPropagation()}>
                                <div className="flex justify-between items-start mb-8">
                                    <div>
                                        <h3 className="text-3xl font-black text-slate-800 leading-tight">《{getVal(detail, 'bookTitle')}》</h3>
                                        <p className="text-base font-black text-amber-500 mt-2">{getVal(detail, 'classId')} {mask(getVal(detail, 'name'))} 作品</p>
                                    </div>
                                    <button onClick={()=>setDetail(null)} className="p-3 bg-slate-50 rounded-full text-slate-300 hover:text-rose-500"><Icon name="x" size={24}/></button>
                                </div>
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="bg-slate-50 p-5 rounded-2xl"><p className="text-[10px] font-black text-slate-400 uppercase mb-1">作者</p><p className="font-bold text-slate-700 text-lg">{getVal(detail, 'author') || '未紀錄'}</p></div>
                                    <div className="bg-slate-50 p-5 rounded-2xl"><p className="text-[10px] font-black text-slate-400 uppercase mb-1">出版社</p><p className="font-bold text-slate-700 text-lg">{getVal(detail, 'publisher') || '未紀錄'}</p></div>
                                </div>
                                <div className="bg-slate-50/50 p-8 rounded-[2rem] mb-8 border border-slate-100 max-h-[40vh] overflow-y-auto custom-scrollbar leading-relaxed text-slate-600 text-lg font-medium">
                                    {getVal(detail, 'reviewType') === 'image' && getVal(detail, 'image') && (
                                        <img src={getVal(detail, 'image')} className="w-full rounded-2xl border-4 border-white shadow-lg mb-8" />
                                    )}
                                    <p className="whitespace-pre-wrap">{getVal(detail, 'review')}</p>
                                </div>
                                <button className="w-full bg-slate-800 py-5 rounded-2xl text-white font-black hover:bg-slate-700 transition-all shadow-xl text-lg" onClick={()=>setDetail(null)}>關閉</button>
                            </div>
                        </div>
                    )}

                    {loading && (
                        <div className="fixed inset-0 bg-white/70 backdrop-blur-md z-[200] flex flex-col items-center justify-center">
                            <div className="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-6"></div>
                            <div className="font-black text-indigo-500 text-xs tracking-widest uppercase animate-pulse">興嘉閱讀數據連線中</div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
