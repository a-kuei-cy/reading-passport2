<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉小閱讀達人 4.0 - 完整系統</title>
    
    <!-- 引入 Tailwind CSS 進行排版與設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 FontAwesome 圖示庫 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 引入 React 與 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 讓瀏覽器可以直接編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 自訂動畫效果 */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-toast {
            animation: fadeInDown 0.3s ease-out forwards;
        }
        .animate-zoom {
            animation: zoomIn 0.2s ease-out forwards;
        }
        /* 隱藏捲軸但保留滾動功能 (美化用) */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans">
    
    <!-- React 應用程式的掛載點 -->
    <div id="root"></div>

    <!-- React 系統核心程式碼 -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 全域共用元件：提示訊息 (Toast) ---
        const Toast = ({ message, type }) => {
            if (!message) return null;
            return (
                <div className={`fixed top-4 left-1/2 z-[100] px-6 py-3 rounded-full shadow-lg text-white font-medium flex items-center animate-toast ${type === 'error' ? 'bg-red-500' : 'bg-green-500'}`}>
                    <i className={`fa-solid ${type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'} text-xl mr-2`}></i>
                    {message}
                </div>
            );
        };

        // --- 前台：學生視角 ---
        const StudentFrontEnd = ({ quotesList, reviews, onAddReview }) => {
            const [displayQuote, setDisplayQuote] = useState({ main: '', sub: '' });
            const [showSubmitModal, setShowSubmitModal] = useState(false);
            const [newReview, setNewReview] = useState({ student: '', class: '', bookTitle: '', author: '', review: '' });

            useEffect(() => {
                if (quotesList && quotesList.length > 0) {
                    const randomIndex = Math.floor(Math.random() * quotesList.length);
                    setDisplayQuote(quotesList[randomIndex]);
                }
            }, [quotesList]);

            const handleSubmit = (e) => {
                e.preventDefault();
                onAddReview(newReview);
                setShowSubmitModal(false);
                setNewReview({ student: '', class: '', bookTitle: '', author: '', review: '' });
            };

            const approvedReviews = reviews.filter(r => r.status === 'approved');

            return (
                <div className="min-h-screen bg-amber-50/50 pb-24">
                    {/* 導覽列 */}
                    <nav className="bg-white/80 backdrop-blur-md border-b border-amber-100 sticky top-0 z-40">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2 text-amber-600">
                                <i className="fa-solid fa-book-open text-2xl"></i>
                                <span className="text-xl font-extrabold tracking-wide">興嘉小閱讀達人</span>
                            </div>
                            <button onClick={() => setShowSubmitModal(true)} className="px-5 py-2.5 bg-amber-500 text-white rounded-full font-bold hover:bg-amber-600 transition shadow-lg shadow-amber-200 flex items-center">
                                <i className="fa-solid fa-paper-plane mr-2"></i> 我要投稿
                            </button>
                        </div>
                    </nav>

                    {/* 首頁視覺區塊 (Hero) */}
                    <div className="max-w-6xl mx-auto px-4 py-12 md:py-20">
                        <div className="bg-gradient-to-br from-amber-400 to-orange-500 rounded-3xl p-8 md:p-16 text-center shadow-xl shadow-orange-200 relative overflow-hidden">
                            <i className="fa-solid fa-wand-magic-sparkles absolute top-8 left-8 text-white/30 text-5xl animate-pulse"></i>
                            <i className="fa-solid fa-heart absolute bottom-8 right-8 text-white/30 text-6xl animate-bounce"></i>
                            
                            <h1 className="text-3xl md:text-5xl font-black text-white mb-6 drop-shadow-md leading-tight">
                                {displayQuote.main || '讀萬卷書，行萬里路'}
                            </h1>
                            <p className="text-amber-100 text-lg md:text-xl font-medium max-w-2xl mx-auto">
                                {displayQuote.sub || '一起探索書中的奇幻世界！'}
                            </p>
                        </div>
                    </div>

                    {/* 心得牆 */}
                    <div className="max-w-6xl mx-auto px-4">
                        <div className="flex items-center gap-2 mb-8 text-amber-600">
                            <i className="fa-solid fa-book text-xl"></i>
                            <h2 className="text-2xl font-bold text-slate-800">達人好書推薦</h2>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {approvedReviews.map((review) => (
                                <div key={review.id} className="bg-white rounded-3xl p-6 shadow-sm border border-amber-100 hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
                                    <div className="flex items-center justify-between mb-4">
                                        <span className="px-3 py-1 bg-amber-100 text-amber-700 rounded-lg text-xs font-bold">{review.class}</span>
                                        <span className="text-slate-400 text-xs">{review.date}</span>
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-800 mb-1">《{review.bookTitle}》</h3>
                                    <p className="text-sm text-slate-500 mb-4">作者：{review.author}</p>
                                    <div className="bg-amber-50/50 p-4 rounded-2xl text-slate-600 text-sm leading-relaxed mb-4 min-h-[100px]">
                                        {review.review}
                                    </div>
                                    <div className="flex items-center gap-2 text-slate-700 font-bold">
                                        <div className="w-8 h-8 rounded-full bg-amber-200 flex items-center justify-center text-amber-700">
                                            <i className="fa-solid fa-user text-sm"></i>
                                        </div>
                                        {review.student}
                                    </div>
                                </div>
                            ))}
                            {approvedReviews.length === 0 && (
                                <div className="col-span-full text-center py-20 text-slate-400">
                                    <i className="fa-solid fa-book-open text-6xl mx-auto mb-4 opacity-20 block"></i>
                                    <p className="text-lg">目前還沒有心得分享，趕快成為第一個投稿的人吧！</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* 投稿 Modal */}
                    {showSubmitModal && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-3xl p-6 md:p-8 w-full max-w-lg shadow-2xl relative animate-zoom">
                                <button onClick={() => setShowSubmitModal(false)} className="absolute top-4 right-4 p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-full transition">
                                    <i className="fa-solid fa-circle-xmark text-2xl"></i>
                                </button>
                                <h2 className="text-2xl font-bold text-amber-600 mb-6 flex items-center">
                                    <i className="fa-solid fa-paper-plane mr-3"></i> 投稿閱讀心得
                                </h2>
                                
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-bold text-slate-600 mb-1 ml-1">班級</label>
                                            <input required type="text" value={newReview.class} onChange={e => setNewReview({...newReview, class: e.target.value})} className="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-amber-400 outline-none" placeholder="例: 三年甲班" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-600 mb-1 ml-1">姓名</label>
                                            <input required type="text" value={newReview.student} onChange={e => setNewReview({...newReview, student: e.target.value})} className="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-amber-400 outline-none" placeholder="王小明" />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-bold text-slate-600 mb-1 ml-1">書名</label>
                                            <input required type="text" value={newReview.bookTitle} onChange={e => setNewReview({...newReview, bookTitle: e.target.value})} className="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-amber-400 outline-none" placeholder="哈利波特" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-600 mb-1 ml-1">作者</label>
                                            <input required type="text" value={newReview.author} onChange={e => setNewReview({...newReview, author: e.target.value})} className="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-amber-400 outline-none" placeholder="J.K.羅琳" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-600 mb-1 ml-1">心得內容</label>
                                        <textarea required rows="4" value={newReview.review} onChange={e => setNewReview({...newReview, review: e.target.value})} className="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-amber-400 outline-none resize-none" placeholder="分享一下你最喜歡這本書的哪個部分吧！"></textarea>
                                    </div>
                                    <div className="pt-4 flex gap-3">
                                        <button type="button" onClick={() => setShowSubmitModal(false)} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition">取消</button>
                                        <button type="submit" className="flex-1 py-3 bg-amber-500 text-white rounded-xl font-bold hover:bg-amber-600 transition shadow-lg shadow-amber-200">送出審核</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 後台：管理員視角 ---
        const AdminDashboard = ({ quotesList, setQuotesList, reviews, setReviews, showMessage }) => {
            const [activeTab, setActiveTab] = useState('pending'); 
            const [loading, setLoading] = useState(false);
            const [editingReview, setEditingReview] = useState(null);

            // 金句管理
            const handleAddQuote = () => setQuotesList([...quotesList, { id: Date.now(), main: '', sub: '' }]);
            const handleRemoveQuote = (id) => {
                if(quotesList.length <= 1) return showMessage('請至少保留一組金句！', 'error');
                setQuotesList(quotesList.filter(q => q.id !== id));
            };
            const handleQuoteChange = (id, field, value) => {
                setQuotesList(quotesList.map(q => q.id === id ? { ...q, [field]: value } : q));
            };
            const handleSaveQuotes = () => {
                setLoading(true);
                setTimeout(() => {
                    setLoading(false);
                    showMessage('多組金句設定已成功儲存！前台將會隨機顯示。');
                }, 800);
            };

            // 心得管理
            const handleApprove = (id) => {
                setReviews(reviews.map(r => r.id === id ? { ...r, status: 'approved' } : r));
                showMessage('心得已審核通過！前台已可看見。');
            };
            const handleReject = (id) => {
                if(confirm('確定要刪除這筆資料嗎？')) {
                    setReviews(reviews.filter(r => r.id !== id));
                    showMessage('資料已刪除。');
                }
            };
            const handleSaveEdit = (e) => {
                e.preventDefault();
                setReviews(reviews.map(r => r.id === editingReview.id ? editingReview : r));
                setEditingReview(null);
                showMessage('心得資料已更新！');
            };

            const displayedReviews = reviews.filter(r => r.status === activeTab);

            return (
                <div className="min-h-screen bg-slate-50 pb-24 p-4 md:p-8">
                    <div className="max-w-5xl mx-auto space-y-6">
                        
                        <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center space-x-3 text-indigo-900">
                                <i className="fa-solid fa-gear text-2xl text-indigo-600"></i>
                                <h1 className="text-xl font-bold">小小閱讀達人4.0 - 系統管理中心</h1>
                            </div>
                            <div className="text-sm text-slate-500 bg-slate-100 px-4 py-2 rounded-full font-bold">
                                管理者登入中
                            </div>
                        </div>

                        {/* 金句設定 */}
                        <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6">
                                <div>
                                    <h2 className="text-lg font-bold text-slate-800 flex items-center">
                                        <span className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center mr-3">
                                            <i className="fa-solid fa-wand-magic-sparkles text-sm"></i>
                                        </span>
                                        首頁隨機金句題庫
                                    </h2>
                                    <p className="text-sm text-slate-500 mt-1 ml-11">前台首頁每次載入時，將從下方清單中隨機抽取一組顯示。</p>
                                </div>
                                <button onClick={handleAddQuote} className="mt-4 sm:mt-0 px-4 py-2 bg-indigo-50 text-indigo-600 rounded-xl font-bold hover:bg-indigo-100 transition flex items-center">
                                    <i className="fa-solid fa-plus mr-2"></i> 新增金句
                                </button>
                            </div>

                            <div className="space-y-3 max-h-[350px] overflow-y-auto pr-2 mb-4">
                                {quotesList.map((quote, index) => (
                                    <div key={quote.id} className="relative bg-slate-50 border border-slate-100 p-4 rounded-2xl flex flex-col md:flex-row gap-4 items-center">
                                        <div className="bg-slate-200 text-slate-600 text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full shrink-0">
                                            {index + 1}
                                        </div>
                                        <div className="flex-1 w-full space-y-2">
                                            <input type="text" value={quote.main} onChange={(e) => handleQuoteChange(quote.id, 'main', e.target.value)} className="w-full bg-white border border-slate-200 p-2.5 rounded-xl text-sm font-bold focus:border-indigo-400 outline-none" placeholder="主要金句..." />
                                            <input type="text" value={quote.sub} onChange={(e) => handleQuoteChange(quote.id, 'sub', e.target.value)} className="w-full bg-white border border-slate-200 p-2.5 rounded-xl text-sm focus:border-indigo-400 outline-none" placeholder="副標語..." />
                                        </div>
                                        <button onClick={() => handleRemoveQuote(quote.id)} className="p-3 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition shrink-0">
                                            <i className="fa-solid fa-trash-can text-lg"></i>
                                        </button>
                                    </div>
                                ))}
                            </div>

                            <button onClick={handleSaveQuotes} disabled={loading} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-200 flex items-center justify-center">
                                {loading ? '儲存中...' : <><i className="fa-solid fa-floppy-disk text-lg mr-2"></i> 儲存金句清單至雲端</>}
                            </button>
                        </div>

                        {/* 心得審核管理 */}
                        <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                            <div className="flex flex-col sm:flex-row justify-between items-center mb-6">
                                <h2 className="text-lg font-bold text-slate-800 flex items-center">
                                    <span className="w-8 h-8 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center mr-3">
                                        <i className="fa-solid fa-circle-check text-sm"></i>
                                    </span>
                                    學生投稿審核管理
                                </h2>
                                
                                <div className="bg-slate-100 p-1.5 rounded-2xl flex space-x-1 mt-4 sm:mt-0">
                                    <button onClick={() => setActiveTab('pending')} className={`px-6 py-2 rounded-xl text-sm font-bold transition-all ${activeTab === 'pending' ? 'bg-white shadow text-slate-800' : 'text-slate-500 hover:text-slate-700'}`}>
                                        待審核 ({reviews.filter(r=>r.status === 'pending').length})
                                    </button>
                                    <button onClick={() => setActiveTab('approved')} className={`px-6 py-2 rounded-xl text-sm font-bold transition-all ${activeTab === 'approved' ? 'bg-white shadow text-slate-800' : 'text-slate-500 hover:text-slate-700'}`}>
                                        已通過 ({reviews.filter(r=>r.status === 'approved').length})
                                    </button>
                                </div>
                            </div>

                            <div className="space-y-4">
                                {displayedReviews.length === 0 ? (
                                    <div className="text-center py-12 text-slate-400">
                                        <i className="fa-solid fa-circle-check text-5xl mx-auto mb-4 opacity-20 block"></i>
                                        <p>目前沒有{activeTab === 'pending' ? '需要審核' : '已通過'}的心得紀錄</p>
                                    </div>
                                ) : (
                                    displayedReviews.map((review) => (
                                        <div key={review.id} className="border border-slate-100 bg-slate-50/80 p-5 rounded-2xl flex flex-col md:flex-row gap-6 hover:shadow-md transition-shadow">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-3 mb-2">
                                                    <span className="bg-indigo-100 text-indigo-700 px-2.5 py-1 rounded-md text-xs font-bold">{review.class}</span>
                                                    <span className="font-bold text-slate-800">{review.student}</span>
                                                    <span className="text-xs text-slate-400">{review.date}</span>
                                                </div>
                                                <h3 className="text-lg font-bold text-slate-800">《{review.bookTitle}》 <span className="text-sm font-normal text-slate-500">作者：{review.author}</span></h3>
                                                <p className="text-sm text-slate-600 mt-3 bg-white p-3.5 rounded-xl border border-slate-100 leading-relaxed">{review.review}</p>
                                            </div>
                                            
                                            <div className="flex md:flex-col justify-end gap-2 shrink-0">
                                                {activeTab === 'pending' ? (
                                                    <>
                                                        <button onClick={() => handleApprove(review.id)} className="flex-1 md:flex-none px-5 py-2.5 bg-green-500 text-white rounded-xl hover:bg-green-600 transition flex items-center justify-center text-sm font-bold shadow-sm">
                                                            <i className="fa-solid fa-circle-check mr-2"></i> 允許通過
                                                        </button>
                                                        <button onClick={() => handleReject(review.id)} className="flex-1 md:flex-none px-5 py-2.5 bg-rose-50 text-rose-600 rounded-xl hover:bg-rose-100 transition flex items-center justify-center text-sm font-bold">
                                                            <i className="fa-solid fa-circle-xmark mr-2"></i> 拒絕刪除
                                                        </button>
                                                    </>
                                                ) : (
                                                    <>
                                                        <button onClick={() => setEditingReview(review)} className="flex-1 md:flex-none px-5 py-2.5 bg-indigo-50 text-indigo-600 rounded-xl hover:bg-indigo-100 transition flex items-center justify-center text-sm font-bold">
                                                            <i className="fa-solid fa-pen-to-square mr-2"></i> 編輯修改
                                                        </button>
                                                        <button onClick={() => handleReject(review.id)} className="flex-1 md:flex-none px-5 py-2.5 bg-rose-50 text-rose-600 rounded-xl hover:bg-rose-100 transition flex items-center justify-center text-sm font-bold">
                                                            <i className="fa-solid fa-trash-can mr-2"></i> 刪除文章
                                                        </button>
                                                    </>
                                                )}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>

                    {/* 編輯心得 Modal */}
                    {editingReview && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-3xl p-6 md:p-8 w-full max-w-lg shadow-2xl relative animate-zoom">
                                <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center">
                                    <i className="fa-solid fa-pen-to-square mr-3 text-indigo-500"></i> 編修已通過心得
                                </h2>
                                <form onSubmit={handleSaveEdit} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 mb-1">書名</label>
                                            <input required type="text" value={editingReview.bookTitle} onChange={e => setEditingReview({...editingReview, bookTitle: e.target.value})} className="w-full border-2 border-slate-100 p-2.5 rounded-xl outline-none focus:border-indigo-400" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 mb-1">作者</label>
                                            <input required type="text" value={editingReview.author} onChange={e => setEditingReview({...editingReview, author: e.target.value})} className="w-full border-2 border-slate-100 p-2.5 rounded-xl outline-none focus:border-indigo-400" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">心得內容</label>
                                        <textarea required rows="5" value={editingReview.review} onChange={e => setEditingReview({...editingReview, review: e.target.value})} className="w-full border-2 border-slate-100 p-3 rounded-xl outline-none focus:border-indigo-400 resize-none"></textarea>
                                    </div>
                                    <div className="pt-4 flex gap-3">
                                        <button type="button" onClick={() => setEditingReview(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition">取消</button>
                                        <button type="submit" className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">儲存變更</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 主應用程式 ---
        const App = () => {
            const [currentView, setCurrentView] = useState('student');
            const [toastMessage, setToastMessage] = useState({ text: '', type: '' });

            // 預設假資料
            const [quotesList, setQuotesList] = useState([
                { id: 1, main: '讀萬卷書，行萬里路', sub: '與嘉小達人，讓我們一起探索書中的奇幻世界' },
                { id: 2, main: '書中自有黃金屋', sub: '閱讀，是開啟世界大門的鑰匙' },
                { id: 3, main: '閱讀是一場不期而遇的旅行', sub: '在書本裡，遇見更好的自己' }
            ]);

            const [reviews, setReviews] = useState([
                { id: 1, student: '王小明', class: '三年甲班', bookTitle: '哈利波特', author: 'J.K. 羅琳', review: '這本書超級好看，魔法世界很神奇！', status: 'pending', date: '2026-03-29' },
                { id: 2, student: '陳大文', class: '五年丙班', bookTitle: '小王子', author: '安東尼', review: '真正重要的東西，用眼睛是看不見的。', status: 'approved', date: '2026-03-20' },
            ]);

            const showMessage = (text, type = 'success') => {
                setToastMessage({ text, type });
                setTimeout(() => setToastMessage({ text: '', type: '' }), 3000);
            };

            const handleAddReview = (newReview) => {
                const reviewData = {
                    ...newReview,
                    id: Date.now(),
                    status: 'pending',
                    date: new Date().toISOString().split('T')[0]
                };
                setReviews([reviewData, ...reviews]);
                showMessage('心得已成功送出！請等待老師審核後顯示。');
            };

            return (
                <div className="relative min-h-screen bg-slate-100">
                    
                    {/* 視角切換懸浮面板 (展示切換用) */}
                    <div className="fixed bottom-6 right-6 z-50 bg-white/90 backdrop-blur-md p-2 rounded-2xl shadow-2xl border border-slate-200 flex flex-col gap-2">
                        <p className="text-[10px] text-center font-bold text-slate-400 uppercase tracking-wider mb-1">身分切換</p>
                        <button onClick={() => setCurrentView('student')} className={`px-4 py-2.5 rounded-xl font-bold flex items-center justify-center text-sm transition-all ${currentView === 'student' ? 'bg-amber-500 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>
                            <i className="fa-solid fa-user mr-2"></i> 學生前台
                        </button>
                        <button onClick={() => setCurrentView('admin')} className={`px-4 py-2.5 rounded-xl font-bold flex items-center justify-center text-sm transition-all ${currentView === 'admin' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>
                            <i className="fa-solid fa-gear mr-2"></i> 管理後台
                        </button>
                    </div>

                    <Toast message={toastMessage.text} type={toastMessage.type} />

                    {currentView === 'student' ? (
                        <StudentFrontEnd quotesList={quotesList} reviews={reviews} onAddReview={handleAddReview} />
                    ) : (
                        <AdminDashboard quotesList={quotesList} setQuotesList={setQuotesList} reviews={reviews} setReviews={setReviews} showMessage={showMessage} />
                    )}
                </div>
            );
        };

        // 啟動 React
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
