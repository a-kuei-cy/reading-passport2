<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>興嘉閱讀護照 | 拍照上傳版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); }
        .nav-active { background: #f59e0b; color: white; box-shadow: 0 10px 20px -5px rgba(245, 158, 11, 0.4); }
        .card-shadow { box-shadow: 0 4px 25px rgba(0,0,0,0.04); }
        
        .field-label { font-size: 1.2rem; font-weight: 900; color: #1e293b; margin-bottom: 0.75rem; display: block; border-left: 5px solid #f59e0b; padding-left: 10px; }
        .field-input { font-size: 1.4rem; font-weight: 700; padding: 1.5rem !important; background-color: #fff !important; border: 2px solid #e2e8f0 !important; border-radius: 1.5rem; width: 100%; outline: none; transition: border-color 0.2s; }
        .field-input:focus { border-color: #f59e0b; }
        .field-textarea { font-size: 1.3rem; line-height: 1.8; padding: 1.5rem !important; min-height: 250px; resize: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        const CONFIG = {
            GAS_URL: "https://script.google.com/macros/s/AKfycbz8PuqxvXMnDOLizffDYbvjHkkUJc8wvfGlfAUcXSR-XVxawhnzOkmAmcgZ4ir8EzIt/exec",
            ADMIN_PWD: "S2860885*110" 
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [view, setView] = useState('home');
            const [loading, setLoading] = useState(false);
            const [records, setRecords] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminTab, setAdminTab] = useState('pending');
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [student, setStudent] = useState({ classId: '', name: '' });
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [isAllReviewsOpen, setIsAllReviewsOpen] = useState(false);
            
            // 金句狀態
            const [slogan, setSlogan] = useState(() => localStorage.getItem('xj_slogan') || "讀萬卷書，行萬里路");
            const [sloganSub, setSloganSub] = useState(() => localStorage.getItem('xj_slogan_sub') || "興嘉小達人，讓我們一起探索書中的奇幻世界！");

            const [formData, setFormData] = useState({ 
                id: null, bookTitle: '', author: '', publisher: '', pages: '', 
                reviewType: 'text', review: '', image: '', status: 'pending' 
            });
            const [detail, setDetail] = useState(null);

            const getVal = (obj, key) => {
                if (!obj) return "";
                const keys = Object.keys(obj);
                const targetKey = keys.find(k => k.trim().toLowerCase() === key.toLowerCase());
                return targetKey ? obj[targetKey] : "";
            };

            const mask = (s) => (s && s.length > 1) ? s[0] + 'O' + (s.length > 2 ? s.slice(2) : '') : s;

            const fetchData = useCallback(async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${CONFIG.GAS_URL}?action=getAll`);
                    const json = await res.json();
                    if (json.status === 'success') setRecords(json.data.records || []);
                } catch (e) { console.error(e); }
                setLoading(false);
            }, []);

            useEffect(() => { fetchData(); }, [fetchData]);

            const callGAS = async (action, id = null, data = null) => {
                setLoading(true);
                try {
                    await fetch(CONFIG.GAS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action, id, data })
                    });
                    
                    if (action === 'addRecord' && !isAdmin) {
                        setTimeout(() => {
                            alert("心得已提交審核！");
                            handleLogout();
                            setLoading(false);
                        }, 2000);
                    } else {
                        setTimeout(() => { fetchData(); setLoading(false); }, 2000);
                    }
                } catch (e) { 
                    console.error(e); 
                    alert("發送失敗，請檢查網路連線");
                    setLoading(false); 
                }
            };

            const exportToExcel = () => {
                const dataToExport = records.map(r => ({
                    '編號': getVal(r, 'id'),
                    '班級': getVal(r, 'classId'),
                    '姓名': getVal(r, 'name'),
                    '書名': getVal(r, 'bookTitle'),
                    '作者': getVal(r, 'author'),
                    '出版社': getVal(r, 'publisher'),
                    '頁數': getVal(r, 'pages'),
                    // 如果是圖片心得，在 Excel 匯出時顯示圖片網址
                    '心得內容': getVal(r, 'reviewType') === 'image' ? `(圖片心得) ${getVal(r, 'image')}` : getVal(r, 'review'),
                    '狀態': getVal(r, 'status') === 'approved' ? '已核准' : '審核中'
                }));
                const worksheet = XLSX.utils.json_to_sheet(dataToExport);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "閱讀紀錄");
                XLSX.writeFile(workbook, `興嘉閱讀護照_${new Date().toLocaleDateString()}.xlsx`);
            };

            const importFromExcel = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        const data = new Uint8Array(ev.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet);

                        const mappedData = jsonData.map((item, index) => ({
                            classId: String(item['班級'] || ''),
                            name: item['姓名'] || '',
                            bookTitle: item['書名'] || '',
                            author: item['作者'] || '',
                            publisher: item['出版社'] || '',
                            pages: item['頁數'] || '',
                            reviewType: 'text',
                            review: item['心得內容'] || '',
                            status: 'approved'
                        }));

                        if (confirm(`已解析 ${mappedData.length} 筆資料，即將批量寫入試算表並自動審核通過。確定嗎？`)) {
                            await callGAS('importBatch', null, mappedData);
                            alert("批量匯入指令已發出！試算表正在更新中...");
                        }
                    } catch (err) {
                        alert("解析失敗，請確保 Excel 格式正確。");
                    }
                    setLoading(false);
                    e.target.value = ""; 
                };
                reader.readAsArrayBuffer(file);
            };

            // 圖片上傳轉 Base64 處理
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        setFormData({...formData, image: ev.target.result});
                    };
                    reader.readAsDataURL(file);
                }
            };

            // 表單送出前驗證
            const handleFormSubmit = () => {
                // 1. 驗證四個必填欄位
                if (!formData.bookTitle || !formData.author || !formData.publisher || !formData.pages) {
                    return alert('「書名」、「作者」、「出版社」、「頁數」皆為必填項目！');
                }

                // 2. 驗證心得二選一
                if (formData.reviewType === 'text') {
                    if (formData.review.length < 100 || formData.review.length > 500) {
                        return alert('文字心得字數需介於 100 到 500 字之間。');
                    }
                } else {
                    if (!formData.image) {
                        return alert('請點擊相機圖示，拍照或選擇照片上傳！');
                    }
                }

                // 通過驗證，送出資料
                const action = isEditMode ? 'updateRecord' : 'addRecord';
                const payload = isEditMode ? formData : { ...formData, name: student.name, classId: student.classId };
                callGAS(action, formData.id, payload);
                setIsFormOpen(false);
            };

            // 管理員儲存金句
            const saveSlogan = () => {
                localStorage.setItem('xj_slogan', slogan);
                localStorage.setItem('xj_slogan_sub', sloganSub);
                alert('首頁金句已更新並儲存！');
            };

            const handleLogout = () => {
                setStudent({ classId: '', name: '' });
                setIsLoggedIn(false);
                setView('home');
            };

            const approvedRecords = useMemo(() => {
                return records.filter(r => String(getVal(r, 'status')).toLowerCase() === 'approved');
            }, [records]);

            const totalBooks = approvedRecords.length;
            const totalReviews = approvedRecords.length;
            
            const totalStudents = useMemo(() => {
                return new Set(approvedRecords.map(r => getVal(r, 'classId') + '_' + getVal(r, 'name'))).size;
            }, [approvedRecords]);

            const topStudents = useMemo(() => {
                const counts = {};
                approvedRecords.forEach(r => {
                    const key = `${getVal(r, 'classId')}_${getVal(r, 'name')}`;
                    counts[key] = (counts[key] || 0) + 1;
                });
                return Object.entries(counts).map(([k, count]) => ({ classId: k.split('_')[0], name: k.split('_')[1], count }))
                    .sort((a, b) => b.count - a.count).slice(0, 10);
            }, [approvedRecords]);

            const gradeStats = useMemo(() => {
                const g = { "一年級":0, "二年級":0, "三年級":0, "四年級":0, "五年級":0, "六年級":0 };
                approvedRecords.forEach(r => {
                    const gId = String(getVal(r, 'classId'))[0];
                    const label = ["","一","二","三","四","五","六"][gId] + "年級";
                    if(g[label]!==undefined) g[label]++;
                });
                return Object.entries(g);
            }, [approvedRecords]);

            const latestReviews = useMemo(() => approvedRecords.slice(-5).reverse(), [approvedRecords]);

            return (
                <div className="min-h-screen pb-32">
                    <header className="glass sticky top-0 z-50 border-b p-5 flex justify-between items-center">
                        <div onClick={()=>setView('home')} className="cursor-pointer flex items-center gap-3">
                            <div className="bg-amber-400 p-2 rounded-xl text-white shadow-inner font-black"><Icon name="book-open" size={24}/></div>
                            <h1 className="text-xl font-black text-slate-800 tracking-tight">興嘉閱讀護照</h1>
                        </div>
                        <div className="flex gap-2">
                            {isLoggedIn && <span className="text-xs font-black bg-white px-3 py-2 rounded-xl border shadow-sm">{student.classId} {student.name}</span>}
                            <button onClick={fetchData} className="p-2.5 bg-white rounded-xl border shadow-sm hover:text-amber-500"><Icon name="refresh-cw" size={18}/></button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-8 space-y-6">
                        {view === 'home' && (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <div className="bg-gradient-to-br from-amber-500 to-orange-600 rounded-[3rem] p-12 text-center shadow-xl relative overflow-hidden">
                                    <h2 className="text-4xl md:text-5xl font-black text-white drop-shadow-lg mb-4">{slogan}</h2>
                                    <p className="text-white/90 font-bold text-xl">{sloganSub}</p>
                                    {!isLoggedIn && (
                                        <button onClick={()=>setView('passport')} className="mt-8 px-12 py-4 bg-white text-orange-600 font-black rounded-2xl shadow-xl hover:-translate-y-1 transition-all text-xl">點此登入護照</button>
                                    )}
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-white p-6 rounded-[2rem] border card-shadow flex flex-col items-center justify-center relative overflow-hidden">
                                        <div className="absolute -right-4 -top-4 opacity-5"><Icon name="book" size={100}/></div>
                                        <p className="text-slate-500 font-black text-sm mb-1 z-10">全校閱讀總冊數</p>
                                        <p className="text-5xl font-black text-amber-500 z-10">{totalBooks}</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-[2rem] border card-shadow flex flex-col items-center justify-center relative overflow-hidden">
                                        <div className="absolute -right-4 -top-4 opacity-5"><Icon name="pen-tool" size={100}/></div>
                                        <p className="text-slate-500 font-black text-sm mb-1 z-10">累積心得篇數</p>
                                        <p className="text-5xl font-black text-indigo-500 z-10">{totalReviews}</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-[2rem] border card-shadow flex flex-col items-center justify-center relative overflow-hidden">
                                        <div className="absolute -right-4 -top-4 opacity-5"><Icon name="users" size={100}/></div>
                                        <p className="text-slate-500 font-black text-sm mb-1 z-10">參加學生數</p>
                                        <p className="text-5xl font-black text-green-500 z-10">{totalStudents}</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                                    <div className="lg:col-span-5 bg-white rounded-[2.5rem] p-8 border card-shadow">
                                        <h3 className="text-xl font-black flex items-center gap-2 mb-6"><Icon name="award" className="text-amber-400"/> 閱讀小達人榜</h3>
                                        <div className="space-y-3">
                                            {topStudents.map((s, i) => (
                                                <div key={i} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl">
                                                    <div className="flex items-center gap-4">
                                                        <span className={`w-8 h-8 flex items-center justify-center rounded-full font-black text-xs ${i<3 ? 'bg-amber-400 text-white' : 'bg-slate-200 text-slate-500'}`}>{i+1}</span>
                                                        <div><p className="font-black text-slate-700">{mask(s.name)}</p><p className="text-xs text-slate-400 font-bold">{s.classId} 班</p></div>
                                                    </div>
                                                    <div className="text-right font-black"><span className="text-2xl text-amber-500">{s.count}</span><span className="text-xs text-slate-400 ml-1">篇</span></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="lg:col-span-7 flex flex-col gap-6">
                                        <div className="bg-white rounded-[2.5rem] p-8 border card-shadow">
                                            <h3 className="text-xl font-black mb-6 flex items-center gap-2"><Icon name="bar-chart-3" className="text-indigo-500"/> 各年級閱讀量</h3>
                                            <div className="grid grid-cols-2 gap-x-8 gap-y-6">
                                                {gradeStats.map(([grade, count]) => (
                                                    <div key={grade} className="space-y-2">
                                                        <div className="flex justify-between text-xs font-black"><span className="text-slate-500">{grade}</span><span className="text-indigo-600">{count} 篇</span></div>
                                                        <div className="h-3 w-full bg-slate-100 rounded-full overflow-hidden">
                                                            <div className="h-full bg-indigo-500" style={{ width: `${(count/(Math.max(...gradeStats.map(g=>g[1]))||1))*100}%` }}></div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="bg-white rounded-[2.5rem] p-8 border card-shadow flex-1 flex flex-col">
                                            <h3 className="text-xl font-black mb-4 flex items-center gap-2"><Icon name="bookmark" className="text-rose-500"/> 最新心得分享</h3>
                                            <div className="space-y-3 flex-1">
                                                {latestReviews.map((r, i) => (
                                                    <div key={i} onClick={()=>setDetail(r)} className="p-4 bg-rose-50 rounded-2xl border border-rose-100 cursor-pointer hover:shadow-md transition-all flex justify-between items-center">
                                                        <div>
                                                            <p className="font-black text-slate-800">《{getVal(r, 'bookTitle')}》</p>
                                                            <p className="text-xs text-slate-400 font-bold">{mask(getVal(r, 'name'))} ({getVal(r, 'classId')})</p>
                                                        </div>
                                                        <Icon name="arrow-right" size={16} className="text-rose-300"/>
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={() => setIsAllReviewsOpen(true)} className="mt-4 w-full py-3 bg-slate-50 hover:bg-slate-100 border text-slate-500 font-black rounded-xl transition-all flex items-center justify-center gap-2">
                                                其他 more... <Icon name="chevron-down" size={16}/>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'passport' && (
                            !isLoggedIn ? (
                                <div className="bg-white p-12 rounded-[3rem] shadow-xl border max-w-md mx-auto mt-6 text-center">
                                    <h2 className="text-3xl font-black mb-8 text-slate-800">學生登入</h2>
                                    <div className="space-y-6 text-left">
                                        <div><label className="field-label">班級代號</label><input className="field-input" value={student.classId} onChange={e=>setStudent({...student, classId:e.target.value})} placeholder="例如 305"/></div>
                                        <div><label className="field-label">學生姓名</label><input className="field-input" value={student.name} onChange={e=>setStudent({...student, name:e.target.value})} placeholder="請輸入姓名"/></div>
                                        <button onClick={()=>{ if(student.classId && student.name) setIsLoggedIn(true); else alert('請填寫完整資訊'); }} className="w-full py-6 bg-amber-500 text-white font-black rounded-2xl shadow-xl text-xl mt-4">進入護照系統</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    <div className="bg-white rounded-[3rem] p-10 border text-center shadow-sm">
                                        <h3 className="text-3xl font-black text-slate-800 mb-2">{student.name} 同學</h3>
                                        <p className="text-slate-400 font-bold mb-6">歡迎回到你的閱讀冒險之旅</p>
                                        <button onClick={() => { setIsEditMode(false); setFormData({id:null, bookTitle:'', author:'', publisher:'', pages:'', reviewType:'text', review:'', image:'', status:'pending'}); setIsFormOpen(true); }} className="w-full py-6 bg-indigo-600 text-white font-black text-2xl rounded-3xl shadow-2xl flex items-center justify-center gap-4 hover:scale-[1.02] transition-transform">
                                            <Icon name="pen-tool" size={28}/> 填寫新心得
                                        </button>
                                    </div>
                                    <div className="bg-white p-8 rounded-[3rem] border card-shadow">
                                        <div className="flex justify-between items-center mb-6"><h3 className="font-black text-xl">歷史寫作紀錄</h3><button onClick={handleLogout} className="text-xs font-black text-rose-500 bg-rose-50 px-4 py-2 rounded-xl">登出</button></div>
                                        <div className="space-y-3">
                                            {records.filter(r => getVal(r, 'name') === student.name).reverse().map(r => (
                                                <div key={getVal(r, 'id')} className="p-5 bg-slate-50 rounded-2xl flex justify-between items-center cursor-pointer hover:bg-white border" onClick={() => setDetail(r)}>
                                                    <p className="font-black text-slate-700">《{getVal(r, 'bookTitle')}》</p>
                                                    <div className="flex items-center gap-2">
                                                        {getVal(r, 'reviewType') === 'image' && <Icon name="image" size={16} className="text-indigo-400"/>}
                                                        <span className={`text-xs font-black px-3 py-1 rounded-lg ${getVal(r, 'status')==='approved'?'text-green-600 bg-green-50':'text-amber-600 bg-amber-50'}`}>{getVal(r, 'status')==='approved'?'通過':'待審'}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )
                        )}

                        {view === 'admin' && (
                            !isAdmin ? (
                                <div className="bg-white p-12 rounded-[3rem] shadow-xl border max-w-md mx-auto mt-6 text-center">
                                    <h2 className="text-2xl font-black mb-8">管理員驗證</h2>
                                    <input type="password" id="pw" className="field-input text-center mb-6" placeholder="請輸入密碼"/>
                                    <button className="w-full py-5 bg-slate-800 text-white font-black rounded-2xl shadow-xl" onClick={() => { if(document.getElementById('pw').value===CONFIG.ADMIN_PWD) setIsAdmin(true); else alert('密碼錯誤'); }}>登入後台</button>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center bg-white p-8 rounded-[2.5rem] border shadow-sm">
                                        <h2 className="text-2xl font-black">後台管理</h2>
                                        <button onClick={() => setIsAdmin(false)} className="p-4 bg-rose-50 text-rose-500 rounded-2xl"><Icon name="log-out"/></button>
                                    </div>

                                    {/* 新增：管理員編輯金句區塊 */}
                                    <div className="bg-white p-8 rounded-[2.5rem] border card-shadow space-y-6">
                                        <h3 className="font-black text-lg flex items-center gap-2"><Icon name="message-square" className="text-indigo-500"/> 首頁金句與標語設定</h3>
                                        <div className="space-y-5 bg-slate-50 p-6 rounded-[1.5rem] border border-slate-100">
                                            <div>
                                                <label className="text-sm font-bold text-slate-500 mb-2 block">主標題 (大字)</label>
                                                <input className="field-input !py-3 !text-lg" value={slogan} onChange={e=>setSlogan(e.target.value)} placeholder="例如：讀萬卷書，行萬里路" />
                                            </div>
                                            <div>
                                                <label className="text-sm font-bold text-slate-500 mb-2 block">副標題 (小字)</label>
                                                <input className="field-input !py-3 !text-lg" value={sloganSub} onChange={e=>setSloganSub(e.target.value)} placeholder="副標題內容" />
                                            </div>
                                            <button onClick={saveSlogan} className="w-full py-4 bg-indigo-600 text-white font-black rounded-xl shadow-md hover:bg-indigo-700 transition-colors">
                                                儲存標語設定 (儲存於本設備)
                                            </button>
                                        </div>
                                    </div>

                                    <div className="bg-white p-8 rounded-[2.5rem] border card-shadow space-y-6">
                                        <h3 className="font-black text-lg flex items-center gap-2"><Icon name="file-up" className="text-orange-500"/> 資料同步與 Excel 作業</h3>
                                        <div className="flex flex-wrap gap-4 pt-4 border-t">
                                            <button onClick={exportToExcel} className="flex-1 py-5 bg-green-600 text-white font-black rounded-2xl shadow-lg flex items-center justify-center gap-2">
                                                <Icon name="download"/> 匯出資料備份
                                            </button>
                                            <label className="flex-1 py-5 bg-slate-800 text-white font-black rounded-2xl shadow-lg flex items-center justify-center gap-2 cursor-pointer text-center">
                                                <Icon name="upload"/> 匯入 Excel (寫入雲端)
                                                <input type="file" className="hidden" accept=".xlsx, .xls" onChange={importFromExcel}/>
                                            </label>
                                        </div>
                                    </div>

                                    <div className="flex bg-slate-200 p-1.5 rounded-2xl gap-1">
                                        {['pending','approved'].map(t => (
                                            <button key={t} onClick={() => setAdminTab(t)} className={`flex-1 py-4 rounded-xl text-xs font-black transition-all ${adminTab===t?'bg-white shadow text-amber-500':'text-slate-500'}`}>{t==='pending'?'待審核':'已通過'}</button>
                                        ))}
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {records.filter(r => getVal(r, 'status') === adminTab).reverse().map(r => (
                                            <div key={getVal(r, 'id')} className="bg-white p-6 rounded-[2rem] border shadow-sm flex flex-col gap-4">
                                                <div className="flex justify-between items-start">
                                                    <div onClick={()=>setDetail(r)} className="cursor-pointer">
                                                        <p className="font-black text-slate-800">{getVal(r, 'classId')} {getVal(r, 'name')}</p>
                                                        <p className="text-xs font-bold text-slate-400 truncate max-w-[150px]">《{getVal(r, 'bookTitle')}》</p>
                                                        {getVal(r, 'reviewType') === 'image' && <span className="inline-flex items-center gap-1 text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-1 rounded mt-1"><Icon name="camera" size={12}/> 照片心得</span>}
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={()=>{setDetail(r); setIsEditMode(true); setFormData({...r}); setIsFormOpen(true);}} className="p-3 bg-slate-50 rounded-xl text-slate-500"><Icon name="edit-3" size={16}/></button>
                                                        <button onClick={() => {if(confirm('確定刪除？')) callGAS('deleteRecord', getVal(r, 'id'));}} className="p-3 bg-slate-50 text-rose-400 rounded-xl"><Icon name="trash" size={16}/></button>
                                                    </div>
                                                </div>
                                                {adminTab==='pending' && <button onClick={() => callGAS('approveRecord', getVal(r, 'id'))} className="w-full py-3 bg-green-500 text-white rounded-xl font-black text-xs">核准通過</button>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass rounded-full p-2 flex shadow-2xl border z-50">
                        {['home','passport','admin'].map(v => (
                            <button key={v} onClick={() => setView(v)} className={`flex-1 flex flex-col items-center py-4 rounded-full transition-all duration-300 ${view===v?'nav-active':'text-slate-400'}`}>
                                <Icon name={v==='home'?'home':v==='passport'?'user':'shield'} size={20}/>
                                <span className="text-[10px] font-black mt-1">{v==='home'?'首頁':v==='passport'?'個人':'管理'}</span>
                            </button>
                        ))}
                    </nav>

                    {isAllReviewsOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-5xl rounded-[3rem] p-8 md:p-10 max-h-[90vh] overflow-y-auto shadow-2xl relative custom-scrollbar">
                                <button onClick={()=>setIsAllReviewsOpen(false)} className="absolute top-8 right-8 p-3 bg-slate-100 rounded-full hover:bg-rose-100 transition-all"><Icon name="x" size={24}/></button>
                                <h3 className="text-3xl font-black mb-8 text-slate-800 flex items-center gap-3"><Icon name="library" size={32} className="text-amber-500"/> 全校心得總覽</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {approvedRecords.slice().reverse().map(r => (
                                        <div key={getVal(r, 'id')} onClick={()=>setDetail(r)} className="p-5 bg-slate-50 rounded-2xl border cursor-pointer hover:border-amber-400 hover:shadow-md transition-all">
                                            <p className="font-black text-slate-800 text-lg mb-1 truncate">《{getVal(r, 'bookTitle')}》</p>
                                            <div className="flex justify-between items-center">
                                                <p className="text-sm text-slate-500 font-bold">{getVal(r, 'classId')} {mask(getVal(r, 'name'))}</p>
                                                {getVal(r, 'reviewType') === 'image' && <Icon name="image" size={14} className="text-indigo-400"/>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {isFormOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-3xl rounded-[3rem] p-8 md:p-12 max-h-[90vh] overflow-y-auto shadow-2xl relative custom-scrollbar">
                                <button onClick={()=>setIsFormOpen(false)} className="absolute top-8 right-8 p-3 bg-slate-100 rounded-full"><Icon name="x" size={24}/></button>
                                <h3 className="text-3xl font-black mb-10 text-slate-800">{isEditMode ? '修改心得作品' : '發表心得紀錄'}</h3>
                                <div className="space-y-8">
                                    {/* 四個必填欄位 */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div><label className="field-label">書名 <span className="text-rose-500">*</span></label><input className="field-input" value={formData.bookTitle} onChange={e=>setFormData({...formData, bookTitle:e.target.value})} placeholder="必填"/></div>
                                        <div><label className="field-label">作者 <span className="text-rose-500">*</span></label><input className="field-input" value={formData.author} onChange={e=>setFormData({...formData, author:e.target.value})} placeholder="必填"/></div>
                                        <div><label className="field-label">出版社 <span className="text-rose-500">*</span></label><input className="field-input" value={formData.publisher} onChange={e=>setFormData({...formData, publisher:e.target.value})} placeholder="必填"/></div>
                                        <div><label className="field-label">頁數 <span className="text-rose-500">*</span></label><input type="number" className="field-input" value={formData.pages} onChange={e=>setFormData({...formData, pages:e.target.value})} placeholder="必填"/></div>
                                    </div>
                                    
                                    {/* 心得繳交方式 (二選一) */}
                                    <div className="pt-4 border-t-2 border-slate-100">
                                        <label className="field-label mb-4">繳交方式 <span className="text-rose-500">*</span> (二選一)</label>
                                        <div className="flex bg-slate-100 p-2 rounded-2xl gap-2 mb-6">
                                            <button className={`flex-1 py-4 rounded-xl font-black text-lg transition-all flex items-center justify-center gap-2 ${formData.reviewType === 'text' ? 'bg-white shadow text-indigo-600' : 'text-slate-500 hover:bg-slate-200'}`} onClick={()=>setFormData({...formData, reviewType:'text'})}>
                                                <Icon name="type" size={20}/> 文字心得
                                            </button>
                                            <button className={`flex-1 py-4 rounded-xl font-black text-lg transition-all flex items-center justify-center gap-2 ${formData.reviewType === 'image' ? 'bg-white shadow text-indigo-600' : 'text-slate-500 hover:bg-slate-200'}`} onClick={()=>setFormData({...formData, reviewType:'image'})}>
                                                <Icon name="camera" size={20}/> 拍照上傳
                                            </button>
                                        </div>

                                        {formData.reviewType === 'text' ? (
                                            <div className="animate-in fade-in duration-300">
                                                <label className="field-label flex justify-between items-center text-sm"><span>心得內容 (100-500字)</span><span className={`text-xs font-black px-3 py-1 rounded-full ${ (formData.review.length < 100 || formData.review.length > 500) ? 'bg-rose-100 text-rose-600' : 'bg-green-100 text-green-600' }`}>{formData.review.length} 字</span></label>
                                                <textarea className="field-input field-textarea mt-2" value={formData.review} onChange={e=>setFormData({...formData, review:e.target.value})} placeholder="請寫下讀後感..."></textarea>
                                            </div>
                                        ) : (
                                            <div className="animate-in fade-in duration-300 border-4 border-dashed border-slate-200 rounded-[2rem] p-8 text-center hover:border-indigo-400 transition-colors bg-slate-50">
                                                {formData.image ? (
                                                    <div className="relative">
                                                        <img src={formData.image} alt="預覽" className="max-h-64 mx-auto rounded-xl shadow-md border" />
                                                        <button className="absolute -top-4 -right-4 bg-rose-500 text-white p-3 rounded-full shadow-lg hover:scale-110 transition-transform" onClick={()=>setFormData({...formData, image:''})}><Icon name="x" size={20}/></button>
                                                    </div>
                                                ) : (
                                                    <label className="cursor-pointer flex flex-col items-center justify-center space-y-4 py-8">
                                                        <div className="w-20 h-20 bg-indigo-100 text-indigo-500 rounded-full flex items-center justify-center"><Icon name="camera" size={36}/></div>
                                                        <span className="text-2xl font-black text-slate-700">點此拍照或選擇相片</span>
                                                        <span className="text-base text-slate-400 font-bold">請確保紙本心得字跡清晰可辨認</span>
                                                        <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handleImageUpload} />
                                                    </label>
                                                )}
                                            </div>
                                        )}
                                    </div>

                                    <button className="w-full py-8 bg-amber-500 hover:bg-amber-600 text-white text-3xl font-black rounded-[2.5rem] shadow-2xl transition-colors mt-6" onClick={handleFormSubmit}>
                                        {isEditMode ? '保存修改' : '送出心得作品'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 詳細內容查看 Modal */}
                    {detail && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[110] flex items-center justify-center p-4" onClick={()=>setDetail(null)}>
                            <div className="bg-white w-full max-w-2xl rounded-[3rem] p-8 md:p-12 shadow-2xl relative max-h-[90vh] overflow-y-auto custom-scrollbar" onClick={e=>e.stopPropagation()}>
                                <button onClick={()=>setDetail(null)} className="absolute top-6 right-6 p-3 bg-slate-100 rounded-full hover:bg-slate-200"><Icon name="x" size={24}/></button>
                                
                                <div className="mb-8 border-b-2 border-slate-100 pb-6 pr-12">
                                    <h3 className="text-3xl font-black text-slate-800 leading-tight">《{getVal(detail, 'bookTitle')}》</h3>
                                    <div className="flex flex-wrap gap-4 mt-4">
                                        <span className="text-lg font-black text-amber-500">{getVal(detail, 'classId')} {mask(getVal(detail, 'name'))}</span>
                                        <span className="text-sm font-bold text-slate-400 flex items-center gap-1"><Icon name="user" size={14}/> {getVal(detail, 'author')}</span>
                                        <span className="text-sm font-bold text-slate-400 flex items-center gap-1"><Icon name="book-open" size={14}/> {getVal(detail, 'publisher')} / {getVal(detail, 'pages')} 頁</span>
                                    </div>
                                </div>

                                <div className="bg-slate-50 p-8 rounded-[2.5rem] mb-8 leading-relaxed text-xl font-medium text-slate-700">
                                    {getVal(detail, 'reviewType') === 'image' || getVal(detail, 'image').startsWith('http') || getVal(detail, 'image').startsWith('data:') ? (
                                        <div className="text-center space-y-4">
                                            <div className="inline-flex items-center gap-2 bg-indigo-100 text-indigo-600 px-4 py-2 rounded-full text-sm font-black mb-2"><Icon name="camera" size={16}/> 紙本拍照上傳</div>
                                            <img src={getVal(detail, 'image')} className="w-full rounded-2xl shadow-sm border border-slate-200" alt="學生心得照片" />
                                        </div>
                                    ) : (
                                        <p className="whitespace-pre-wrap">{getVal(detail, 'review')}</p>
                                    )}
                                </div>
                                <button className="w-full bg-slate-800 py-6 rounded-2xl text-white font-black text-xl shadow-xl hover:bg-slate-700" onClick={()=>setDetail(null)}>關閉視窗</button>
                            </div>
                        </div>
                    )}

                    {loading && (
                        <div className="fixed inset-0 bg-white/80 backdrop-blur-md z-[200] flex flex-col items-center justify-center">
                            <div className="w-20 h-20 border-8 border-amber-500 border-t-transparent rounded-full animate-spin mb-8"></div>
                            <div className="font-black text-amber-500 text-xl tracking-widest animate-pulse">系統處理中...</div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
