<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校園閱讀護照系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
      }
    }
  </script>
  
  <style>
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;  
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased selection:bg-emerald-200 selection:text-emerald-900">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';

    // 🔴 您的 Google Apps Script 網址 
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz8PuqxvXMnDOLizffDYbvjHkkUJc8wvfGlfAUcXSR-XVxawhnzOkmAmcgZ4ir8EzIt/exec"; 

    // --- 共用 UI 元件 ---
    function LoadingOverlay({ message }) {
      return (
        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[200]">
          <div className="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center max-w-xs mx-4">
            <i className="fas fa-circle-notch fa-spin text-4xl text-emerald-500 mb-4"></i>
            <p className="font-bold text-gray-700 text-center">{message}</p>
          </div>
        </div>
      );
    }

    function CustomModal({ modal, onClose }) {
      if (!modal.isOpen) return null;
      return (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
          <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
            <h3 className="text-lg font-bold mb-3 text-gray-800">
              {modal.type === 'confirm' ? <><i className="fas fa-question-circle text-amber-500 mr-2"></i>請確認</> : <><i className="fas fa-info-circle text-blue-500 mr-2"></i>系統提示</>}
            </h3>
            <p className="text-gray-600 mb-6 leading-relaxed">{modal.message}</p>
            <div className="flex justify-end space-x-3">
              {modal.type === 'confirm' && (
                <button onClick={onClose} className="px-5 py-2 bg-gray-100 text-gray-700 font-medium rounded-lg hover:bg-gray-200 transition-colors">取消</button>
              )}
              <button 
                onClick={() => { if(modal.onConfirm) modal.onConfirm(); onClose(); }} 
                className={`px-5 py-2 text-white font-medium rounded-lg transition-colors ${modal.type === 'confirm' ? 'bg-amber-500 hover:bg-amber-600' : 'bg-emerald-600 hover:bg-emerald-700'}`}
              >確定</button>
            </div>
          </div>
        </div>
      );
    }

    // --- 主應用程式 App 元件 ---
    function App() {
      const [isDbReady, setIsDbReady] = useState(false);
      const [isProcessing, setIsProcessing] = useState(false);
      const [currentUser, setCurrentUser] = useState(null); 
      const [view, setView] = useState('login'); 
      const [modal, setModal] = useState({ isOpen: false, type: 'info', message: '', onConfirm: null });
      
      const [reflections, setReflections] = useState([]);
      const [quotes, setQuotes] = useState([]);
      const [currentQuote, setCurrentQuote] = useState(null);
      const [classPasswords, setClassPasswords] = useState({});
      const [adminPassword, setAdminPassword] = useState('admin');

      const showAlert = (message) => setModal({ isOpen: true, type: 'info', message, onConfirm: null });
      const showConfirm = (message, onConfirm) => setModal({ isOpen: true, type: 'confirm', message, onConfirm });
      const closeModal = () => setModal({ ...modal, isOpen: false });

      const fetchSheetData = async () => {
        try {
          const res = await fetch(SCRIPT_URL);
          const data = await res.json();
          if (data.records) setReflections(data.records.sort((a, b) => Number(b.timestamp) - Number(a.timestamp)));
          if (data.config) {
            if (data.config.sloganList) {
              setQuotes(data.config.sloganList);
              if (data.config.sloganList.length > 0) {
                setCurrentQuote(data.config.sloganList[Math.floor(Math.random() * data.config.sloganList.length)]);
              }
            }
            if (data.config.classPasswords) setClassPasswords(data.config.classPasswords);
            if (data.config.adminPassword) setAdminPassword(data.config.adminPassword);
          }
        } catch (error) {
          console.error("讀取失敗:", error);
          showAlert("無法連接到 Google 試算表，請確認網址與權限。");
        } finally {
          setIsDbReady(true);
        }
      };

      const sendSheetData = async (payloadObj, successMessage) => {
        setIsProcessing(true);
        try {
          const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payloadObj) });
          const result = await res.json();
          if (result.success) {
            await fetchSheetData(); 
            if (successMessage) showAlert(successMessage);
            return true;
          } else throw new Error(result.error || "未知錯誤");
        } catch (error) {
          console.error("API 錯誤:", error);
          showAlert("資料傳送失敗，請稍後再試。");
          return false;
        } finally {
          setIsProcessing(false);
        }
      };

      useEffect(() => { fetchSheetData(); }, []);

      const handleAddReflection = async (formData) => {
        const payload = { classId: currentUser.classId, name: currentUser.name, ...formData };
        if (await sendSheetData({ action: 'addRecord', payload }, '心得已成功送出！')) setView('student_dash');
      };
      const handleApproveReflection = async (id) => { await sendSheetData({ action: 'approveRecord', id }, '審核通過！'); };
      const handleDeleteReflection = async (id) => { await sendSheetData({ action: 'deleteRecord', id }, '心得已刪除！'); };
      const handleSaveAllQuotes = async (newQuotesArray, message) => { await sendSheetData({ action: 'updateConfig', payload: newQuotesArray }, message); };
      const handleSavePasswords = async (newAdminPw, newClassPws) => {
        await sendSheetData({ action: 'updatePasswords', payload: { adminPassword: newAdminPw, classPasswords: newClassPws } }, '權限與密碼已更新！');
      };

      if (view === 'login' || !currentUser) {
        return (
            <>
                {isProcessing && <LoadingOverlay message="系統處理中..." />}
                <CustomModal modal={modal} onClose={closeModal} />
                <LoginScreen isDbReady={isDbReady} isProcessing={isProcessing} classPasswords={classPasswords} adminPassword={adminPassword} setCurrentUser={setCurrentUser} setView={setView} showAlert={showAlert} />
            </>
        );
      }

      return (
        <div className="min-h-screen flex flex-col relative">
          {isProcessing && <LoadingOverlay message="資料同步中..." />}
          <CustomModal modal={modal} onClose={closeModal} />

          <nav className="bg-emerald-600 text-white shadow-md p-4 sticky top-0 z-40">
            <div className="max-w-6xl mx-auto flex flex-wrap gap-4 justify-between items-center">
              <div className="flex items-center space-x-2">
                <i className="fas fa-book-reader text-2xl"></i>
                <span className="text-xl font-bold">校園閱讀護照</span>
              </div>
              <div className="flex items-center space-x-4">
                <span className="text-sm bg-emerald-700 px-3 py-1.5 rounded-full shadow-inner font-medium">
                  {currentUser.role === 'admin' ? '👑 系統管理員' : currentUser.role === 'teacher' ? `👩‍🏫 導師 (${currentUser.classId})` : `👨‍🎓 ${currentUser.classId} ${currentUser.name}`}
                </span>
                <button onClick={() => { setCurrentUser(null); setView('login'); }} className="hover:text-amber-200 font-medium"><i className="fas fa-sign-out-alt mr-1"></i> 登出</button>
              </div>
            </div>
          </nav>

          {currentQuote && currentUser.role !== 'admin' && (
            <div className="bg-amber-50 border-b border-amber-200 p-6 text-center">
              <p className="text-amber-900 font-bold text-xl mb-1">「{currentQuote.title}」</p>
              {currentQuote.sub && <p className="text-amber-700 text-sm">{currentQuote.sub}</p>}
            </div>
          )}

          <main className="flex-grow max-w-6xl mx-auto w-full p-4 sm:p-6">
            {currentUser.role === 'student' ? (
              <StudentView view={view} setView={setView} reflections={reflections} currentUser={currentUser} handleAddReflection={handleAddReflection} />
            ) : (
              <AdminView view={view} setView={setView} reflections={reflections} quotes={quotes} currentUser={currentUser} classPasswords={classPasswords} adminPassword={adminPassword} handleApproveReflection={handleApproveReflection} handleDeleteReflection={handleDeleteReflection} handleSaveAllQuotes={handleSaveAllQuotes} handleSavePasswords={handleSavePasswords} showConfirm={showConfirm} showAlert={showAlert} />
            )}
          </main>
        </div>
      );
    }

    // --- 登入畫面 ---
    function LoginScreen({ isDbReady, isProcessing, classPasswords, adminPassword, setCurrentUser, setView, showAlert }) {
      const [loginTab, setLoginTab] = useState('student');
      const [selectedClass, setSelectedClass] = useState('');
      const [studentName, setStudentName] = useState('');
      const [passwordInput, setPasswordInput] = useState('');
      
      const availableClasses = Object.keys(classPasswords);
      useEffect(() => { if (availableClasses.length > 0 && !selectedClass) setSelectedClass(availableClasses[0]); }, [availableClasses, selectedClass]);

      const handleLogin = (e) => {
        e.preventDefault();
        if (!isDbReady) return showAlert("系統載入中，請稍候。");

        if (loginTab === 'student') {
          if (!selectedClass || !studentName.trim()) return showAlert("請選擇班級並輸入姓名！");
          setCurrentUser({ role: 'student', classId: selectedClass, name: studentName.trim() });
          setView('student_dash');
        } else if (loginTab === 'teacher') {
          if (passwordInput !== classPasswords[selectedClass]) return showAlert("導師密碼錯誤！");
          setCurrentUser({ role: 'teacher', classId: selectedClass });
          setView('admin_dash'); 
        } else if (loginTab === 'admin') {
          if (passwordInput !== adminPassword) return showAlert("管理員密碼錯誤！");
          setCurrentUser({ role: 'admin' });
          setView('admin_dash');
        }
      };

      return (
        <div className="min-h-screen bg-emerald-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-xl max-w-md w-full overflow-hidden border">
            <div className="bg-emerald-600 p-8 text-center text-white relative">
              <i className="fas fa-book-open text-4xl mb-4"></i>
              <h1 className="text-2xl font-bold">校園閱讀護照系統</h1>
            </div>
            <div className="flex border-b">
              <button type="button" onClick={() => setLoginTab('student')} className={`flex-1 py-4 font-bold text-sm ${loginTab === 'student' ? 'text-emerald-600 border-b-2 border-emerald-600 bg-emerald-50' : 'text-gray-500 hover:bg-gray-50'}`}>👨‍🎓 學生</button>
              <button type="button" onClick={() => setLoginTab('teacher')} className={`flex-1 py-4 font-bold text-sm ${loginTab === 'teacher' ? 'text-indigo-600 border-b-2 border-indigo-600 bg-indigo-50' : 'text-gray-500 hover:bg-gray-50'}`}>👩‍🏫 導師</button>
              <button type="button" onClick={() => setLoginTab('admin')} className={`flex-1 py-4 font-bold text-sm ${loginTab === 'admin' ? 'text-amber-600 border-b-2 border-amber-600 bg-amber-50' : 'text-gray-500 hover:bg-gray-50'}`}>👑 管理員</button>
            </div>
            <form onSubmit={handleLogin} className="p-6 space-y-5">
              {(loginTab === 'student' || loginTab === 'teacher') && (
                <div>
                  <label className="block text-sm font-bold text-gray-700 mb-2">選擇班級</label>
                  {availableClasses.length === 0 ? <div className="p-3 bg-red-50 text-red-600 rounded-lg text-sm">尚未建立班級</div> : (
                    <select value={selectedClass} onChange={e => setSelectedClass(e.target.value)} className="w-full p-3 border rounded-lg focus:ring-emerald-500">
                      {availableClasses.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  )}
                </div>
              )}
              {loginTab === 'student' && availableClasses.length > 0 && (
                <div>
                  <label className="block text-sm font-bold text-gray-700 mb-2">學生姓名</label>
                  <input type="text" required value={studentName} onChange={e => setStudentName(e.target.value)} className="w-full p-3 border rounded-lg" placeholder="真實姓名" />
                </div>
              )}
              {(loginTab === 'teacher' || loginTab === 'admin') && (
                <div>
                  <label className="block text-sm font-bold text-gray-700 mb-2">輸入密碼</label>
                  <input type="password" required value={passwordInput} onChange={e => setPasswordInput(e.target.value)} className="w-full p-3 border rounded-lg" placeholder="請輸入密碼" />
                </div>
              )}
              <button type="submit" disabled={!isDbReady || isProcessing} className="w-full py-3 mt-2 text-white font-bold rounded-lg bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50">
                {isProcessing ? '登入中...' : '登入系統'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // --- 學生介面 ---
    function StudentView({ view, setView, reflections, currentUser, handleAddReflection }) {
      const myReflections = reflections.filter(r => r.classId === currentUser.classId && r.name === currentUser.name);
      const approvedCount = myReflections.filter(r => r.status === 'approved').length;

      return (
        <div>
          <div className="flex space-x-3 mb-6">
            <button onClick={() => setView('student_dash')} className={`px-5 py-2.5 rounded-xl font-bold ${view === 'student_dash' ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 border'}`}>我的首頁</button>
            <button onClick={() => setView('student_submit')} className={`px-5 py-2.5 rounded-xl font-bold ${view === 'student_submit' ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 border'}`}>發表新心得</button>
          </div>

          {view === 'student_dash' && (
            <div className="space-y-6">
              <div className="grid grid-cols-2 gap-5">
                <div className="bg-white p-6 rounded-2xl shadow-sm border text-center">
                  <p className="text-gray-500 font-medium mb-1">審核通過</p>
                  <p className="text-4xl font-black text-gray-800">{approvedCount}</p>
                </div>
                <div className="bg-white p-6 rounded-2xl shadow-sm border text-center">
                  <p className="text-gray-500 font-medium mb-1">總共提交</p>
                  <p className="text-4xl font-black text-gray-800">{myReflections.length}</p>
                </div>
              </div>
              <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <div className="p-5 bg-gray-50 border-b"><h3 className="font-bold">我的紀錄</h3></div>
                <ul className="divide-y">
                  {myReflections.map(r => (
                    <li key={r.id} className="p-5 flex justify-between items-center">
                      <div><h4 className="font-bold">{r.bookTitle}</h4><p className="text-sm text-gray-500">{r.author}</p></div>
                      <span className={`px-3 py-1 rounded-full text-sm font-bold ${r.status === 'approved' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>
                        {r.status === 'approved' ? '已通過' : '審核中'}
                      </span>
                    </li>
                  ))}
                  {myReflections.length === 0 && <li className="p-10 text-center text-gray-400">尚未發表心得</li>}
                </ul>
              </div>
            </div>
          )}

          {view === 'student_submit' && <StudentSubmitForm handleAddReflection={handleAddReflection} />}
        </div>
      );
    }

    // --- 學生提交表單 ---
    function StudentSubmitForm({ handleAddReflection }) {
      const [formData, setFormData] = useState({ bookTitle: '', author: '', publisher: '', pages: '', reviewType: 'text', review: '', image: '' });
      const handleSubmit = (e) => { e.preventDefault(); handleAddReflection(formData); };
      const handleImageChange = (e) => {
        const file = e.target.files[0];
        if (file) { const reader = new FileReader(); reader.onloadend = () => setFormData({...formData, image: reader.result}); reader.readAsDataURL(file); }
      };

      return (
        <div className="bg-white rounded-2xl shadow-sm border p-6 max-w-2xl mx-auto">
          <h2 className="text-2xl font-bold mb-6 border-b pb-4">發表閱讀心得</h2>
          <form onSubmit={handleSubmit} className="space-y-4">
            <input type="text" required placeholder="書名" onChange={e => setFormData({...formData, bookTitle: e.target.value})} className="w-full p-3 border rounded-lg" />
            <div className="grid grid-cols-3 gap-4">
              <input type="text" required placeholder="作者" onChange={e => setFormData({...formData, author: e.target.value})} className="w-full p-3 border rounded-lg" />
              <input type="text" required placeholder="出版社" onChange={e => setFormData({...formData, publisher: e.target.value})} className="w-full p-3 border rounded-lg" />
              <input type="number" required placeholder="頁數" onChange={e => setFormData({...formData, pages: e.target.value})} className="w-full p-3 border rounded-lg" />
            </div>
            <div className="flex space-x-4 mb-4">
              <label className="flex-1 cursor-pointer p-3 border rounded-lg text-center"><input type="radio" name="rt" className="mr-2" checked={formData.reviewType === 'text'} onChange={() => setFormData({...formData, reviewType: 'text'})}/>文字心得</label>
              <label className="flex-1 cursor-pointer p-3 border rounded-lg text-center"><input type="radio" name="rt" className="mr-2" checked={formData.reviewType === 'photo'} onChange={() => setFormData({...formData, reviewType: 'photo'})}/>照片學習單</label>
            </div>
            {formData.reviewType === 'text' ? (
              <textarea required rows="5" placeholder="輸入心得..." onChange={e => setFormData({...formData, review: e.target.value})} className="w-full p-3 border rounded-lg"></textarea>
            ) : (
              <div>
                <input type="file" accept="image/*" required onChange={handleImageChange} className="w-full p-2 border rounded-lg" />
                {formData.image && <img src={formData.image} alt="預覽" className="mt-2 max-h-48 rounded" />}
              </div>
            )}
            <button type="submit" className="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg hover:bg-emerald-700">送出審核</button>
          </form>
        </div>
      );
    }

    // --- 管理員/導師介面 ---
    function AdminView({ view, setView, reflections, quotes, currentUser, classPasswords, adminPassword, handleApproveReflection, handleDeleteReflection, handleSaveAllQuotes, handleSavePasswords, showConfirm, showAlert }) {
      const visibleReflections = currentUser.role === 'teacher' ? reflections.filter(r => r.classId === currentUser.classId) : reflections;
      const isAdmin = currentUser.role === 'admin';

      return (
        <div>
          <div className="flex flex-wrap gap-3 mb-6 bg-white p-3 rounded-2xl shadow-sm border">
            <button onClick={() => setView('admin_dash')} className={`px-4 py-2 rounded-lg font-bold ${view === 'admin_dash' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600'}`}>審核管理</button>
            {isAdmin && (
              <>
                <button onClick={() => setView('admin_quotes')} className={`px-4 py-2 rounded-lg font-bold ${view === 'admin_quotes' ? 'bg-amber-600 text-white' : 'bg-gray-100 text-gray-600'}`}>標語設定</button>
                <button onClick={() => setView('admin_passwords')} className={`px-4 py-2 rounded-lg font-bold ${view === 'admin_passwords' ? 'bg-rose-600 text-white' : 'bg-gray-100 text-gray-600'}`}>班級與密碼管理</button>
              </>
            )}
          </div>
          
          {view === 'admin_dash' && <AdminDashboard reflections={visibleReflections} handleApproveReflection={handleApproveReflection} handleDeleteReflection={handleDeleteReflection} showConfirm={showConfirm} />}
          {view === 'admin_quotes' && isAdmin && <AdminQuotes quotes={quotes} handleSaveAllQuotes={handleSaveAllQuotes} showConfirm={showConfirm} />}
          {view === 'admin_passwords' && isAdmin && <PasswordManager classPasswords={classPasswords} adminPassword={adminPassword} handleSavePasswords={handleSavePasswords} showConfirm={showConfirm} showAlert={showAlert} />}
        </div>
      );
    }

    // --- 審核管理區塊 ---
    function AdminDashboard({ reflections, handleApproveReflection, handleDeleteReflection, showConfirm }) {
      const [filter, setFilter] = useState('pending');
      const filteredData = reflections.filter(r => filter === 'all' || r.status === filter);
      const [showImageModal, setShowImageModal] = useState(null);

      return (
        <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
          <div className="p-4 bg-slate-50 border-b flex justify-between items-center">
            <h2 className="font-bold">學生心得審核</h2>
            <select value={filter} onChange={e => setFilter(e.target.value)} className="p-2 border rounded">
              <option value="pending">待審核</option><option value="approved">已通過</option><option value="all">全部</option>
            </select>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-left min-w-[700px]">
              <thead className="bg-gray-50 border-b">
                <tr><th className="p-4">學生</th><th className="p-4">書籍</th><th className="p-4">內容</th><th className="p-4 text-center">操作</th></tr>
              </thead>
              <tbody>
                {filteredData.map(r => (
                  <tr key={r.id} className="border-b hover:bg-gray-50">
                    <td className="p-4"><b>{r.name}</b><br/><span className="text-sm text-gray-500">{r.classId}</span></td>
                    <td className="p-4"><b>{r.bookTitle}</b><br/><span className="text-sm text-gray-500">{r.author}</span></td>
                    <td className="p-4">
                      {r.reviewType === 'text' ? <p className="line-clamp-2 text-sm text-gray-700">{r.review}</p> : <button onClick={() => setShowImageModal(r.image)} className="text-blue-600 underline text-sm">檢視照片</button>}
                    </td>
                    <td className="p-4 flex gap-2 justify-center">
                      {r.status === 'pending' && <button onClick={() => handleApproveReflection(r.id)} className="px-3 py-1 bg-green-100 text-green-700 rounded text-sm font-bold">通過</button>}
                      <button onClick={() => showConfirm('確定刪除？', () => handleDeleteReflection(r.id))} className="px-3 py-1 bg-red-100 text-red-700 rounded text-sm font-bold">刪除</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {showImageModal && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[150] p-4" onClick={() => setShowImageModal(null)}>
              <img src={showImageModal} className="max-w-full max-h-[90vh] rounded bg-white" />
            </div>
          )}
        </div>
      );
    }

    // --- 標語管理 ---
    function AdminQuotes({ quotes, handleSaveAllQuotes, showConfirm }) {
      const [newTitle, setNewTitle] = useState(''); const [newSub, setNewSub] = useState('');
      const onAdd = (e) => {
        e.preventDefault();
        if(!newTitle.trim()) return;
        handleSaveAllQuotes([...quotes, { title: newTitle.trim(), sub: newSub.trim() }], '新增成功！');
        setNewTitle(''); setNewSub('');
      };
      return (
        <div className="bg-white rounded-2xl p-6 border">
          <h2 className="font-bold mb-4">首頁標語管理</h2>
          <form onSubmit={onAdd} className="flex gap-4 mb-6">
            <input type="text" required value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder="主標題" className="flex-2 p-2 border rounded w-full" />
            <input type="text" value={newSub} onChange={e=>setNewSub(e.target.value)} placeholder="副標題" className="flex-1 p-2 border rounded w-full" />
            <button type="submit" className="bg-amber-600 text-white px-4 py-2 rounded font-bold whitespace-nowrap">新增</button>
          </form>
          <ul className="divide-y border rounded">
            {quotes.map((q, i) => (
              <li key={i} className="p-3 flex justify-between items-center">
                <div><b>{q.title}</b> <span className="text-gray-500 text-sm">{q.sub}</span></div>
                <button onClick={() => showConfirm('刪除？', () => handleSaveAllQuotes(quotes.filter((_, idx)=>idx!==i), '刪除成功'))} className="text-red-500">刪除</button>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    // --- 密碼與班級管理 ---
    function PasswordManager({ classPasswords, adminPassword, handleSavePasswords, showConfirm, showAlert }) {
      const [localAdminPw, setLocalAdminPw] = useState(adminPassword);
      const [localClassPws, setLocalClassPws] = useState(classPasswords);
      const [newClassId, setNewClassId] = useState(''); const [newClassPw, setNewClassPw] = useState('');

      const handleAdd = (e) => {
        e.preventDefault();
        if (localClassPws[newClassId]) return showAlert("班級已存在！");
        setLocalClassPws({...localClassPws, [newClassId.trim()]: newClassPw.trim()});
        setNewClassId(''); setNewClassPw('');
      };

      return (
        <div className="space-y-6 pb-20">
          <div className="bg-white rounded-2xl p-6 border">
            <h2 className="font-bold text-rose-800 mb-2">最高管理員密碼</h2>
            <input type="text" value={localAdminPw} onChange={e=>setLocalAdminPw(e.target.value)} className="p-3 border rounded w-full max-w-sm" />
          </div>
          <div className="bg-white rounded-2xl p-6 border">
            <h2 className="font-bold text-indigo-800 mb-4">班級與導師密碼</h2>
            <form onSubmit={handleAdd} className="flex gap-4 mb-6">
              <input type="text" required value={newClassId} onChange={e=>setNewClassId(e.target.value)} placeholder="班級名稱" className="p-3 border rounded w-full" />
              <input type="text" required value={newClassPw} onChange={e=>setNewClassPw(e.target.value)} placeholder="導師密碼" className="p-3 border rounded w-full" />
              <button type="submit" className="bg-indigo-600 text-white px-6 py-3 rounded font-bold whitespace-nowrap">新增</button>
            </form>
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
              {Object.entries(localClassPws).map(([cid, pw]) => (
                <div key={cid} className="p-4 border rounded flex justify-between items-center">
                  <div><b>{cid}</b><br/><span className="text-gray-500 text-sm">密碼: {pw}</span></div>
                  <button onClick={() => { const up = {...localClassPws}; delete up[cid]; setLocalClassPws(up); }} className="text-red-500"><i className="fas fa-trash"></i></button>
                </div>
              ))}
            </div>
          </div>
          <div className="fixed bottom-6 right-6">
            <button onClick={() => handleSavePasswords(localAdminPw, localClassPws)} className="bg-slate-800 text-white font-bold py-4 px-8 rounded-full shadow-xl hover:bg-black">
               儲存密碼設定
            </button>
          </div>
        </div>
      );
    }

    // 🔴 最後一步：將 React 渲染到畫面上 
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
