<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校園閱讀護照系統</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome 圖示庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Maps 支援現代 ES Modules -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';

    // ==========================================
    // Google Apps Script 網址
    // ==========================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz8PuqxvXMnDOLizffDYbvjHkkUJc8wvfGlfAUcXSR-XVxawhnzOkmAmcgZ4ir8EzIt/exec"; 

    const defaultQuotes = [
      { title: '讀萬卷書，行萬里路', sub: '興嘉小達人，讓我們一起探索書中的奇幻世界！' },
      { title: '閱讀是一座隨身攜帶的避難所。', sub: 'Reading is a sanctuary you can carry with you.' }
    ];

    function App() {
      // 系統與認證狀態
      const [isDbReady, setIsDbReady] = useState(false);
      const [isProcessing, setIsProcessing] = useState(false);
      const [currentUser, setCurrentUser] = useState(null); 
      const [view, setView] = useState('login'); 
      
      // 自訂對話框狀態
      const [modal, setModal] = useState({ isOpen: false, type: 'info', message: '', onConfirm: null });
      
      // 試算表資料狀態
      const [reflections, setReflections] = useState([]);
      const [quotes, setQuotes] = useState([]);
      const [currentQuote, setCurrentQuote] = useState(null);

      // 輔助函數：顯示對話框
      const showAlert = (message) => setModal({ isOpen: true, type: 'info', message, onConfirm: null });
      const showConfirm = (message, onConfirm) => setModal({ isOpen: true, type: 'confirm', message, onConfirm });
      const closeModal = () => setModal({ ...modal, isOpen: false });

      // === 與 Google Apps Script 通訊的核心函數 ===
      const fetchSheetData = async () => {
        try {
          const res = await fetch(SCRIPT_URL);
          const data = await res.json();
          
          // 解析心得資料 (Records 表格)，按時間戳記新到舊排序
          if (data.records) {
            const refData = data.records.sort((a, b) => Number(b.timestamp) - Number(a.timestamp));
            setReflections(refData);
          }
          
          // 解析金句資料 (Config 表格)
          let fetchedQuotes = defaultQuotes;
          if (data.config) {
            if (data.config.sloganList && Array.isArray(data.config.sloganList)) {
              fetchedQuotes = data.config.sloganList;
            } else if (data.config.slogan) {
              fetchedQuotes = [{ title: data.config.slogan, sub: data.config.sloganSub || '' }];
            }
          }
          setQuotes(fetchedQuotes);
          pickRandomQuote(fetchedQuotes);

        } catch (error) {
          console.error("讀取試算表失敗:", error);
          showAlert("無法連接到 Google 試算表，請確認網址與權限。");
        } finally {
          setIsDbReady(true);
        }
      };

      const sendSheetData = async (payloadObj, successMessage) => {
        setIsProcessing(true);
        try {
          // 使用 POST 傳送 JSON 格式字串給 Apps Script
          const res = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payloadObj)
          });
          
          const result = await res.json();
          if (result.success) {
            await fetchSheetData(); // 重新拉取最新資料
            if (successMessage) showAlert(successMessage);
            return true;
          } else {
            throw new Error(result.error || "未知錯誤");
          }
        } catch (error) {
          console.error("寫入試算表失敗:", error);
          showAlert("資料傳送失敗，請稍後再試。");
          return false;
        } finally {
          setIsProcessing(false);
        }
      };

      // 初始載入資料
      useEffect(() => {
        fetchSheetData();
      }, []);

      const pickRandomQuote = (quoteList) => {
        if (quoteList && quoteList.length > 0) {
          const randomIndex = Math.floor(Math.random() * quoteList.length);
          setCurrentQuote(quoteList[randomIndex]);
        }
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setView('login');
      };

      // === 試算表操作 CRUD 函數 ===
      
      // [學生] 新增心得 (action: 'addRecord')
      const handleAddReflection = async (formData) => {
        const payload = {
          classId: currentUser.classId,
          name: currentUser.name,
          bookTitle: formData.bookTitle,
          author: formData.author,
          publisher: formData.publisher,
          pages: formData.pages,
          reviewType: formData.reviewType,
          review: formData.review,
          image: formData.image || ''
        };
        const success = await sendSheetData({ action: 'addRecord', payload }, '心得已成功送出，等待老師審核！');
        if (success) setView('student_dash');
      };

      // [管理員] 核准心得 (action: 'approveRecord')
      const handleApproveReflection = async (id) => {
        await sendSheetData({ action: 'approveRecord', id }, '心得已審核通過！');
      };

      // [管理員] 更新心得內容 (action: 'updateRecord')
      const handleUpdateReflection = async (id, updatedData) => {
        await sendSheetData({ action: 'updateRecord', id, payload: updatedData }, '心得資料已更新！');
      };

      // [管理員] 刪除心得 (action: 'deleteRecord')
      const handleDeleteReflection = async (id) => {
        await sendSheetData({ action: 'deleteRecord', id }, '心得已從試算表中刪除！');
      };

      // [管理員] 金句操作 (統一 action: 'updateConfig')
      const handleSaveAllQuotes = async (newQuotesArray, message) => {
        await sendSheetData({ action: 'updateConfig', payload: newQuotesArray }, message);
      };

      // --- 登入畫面 ---
      if (view === 'login') {
        return (
          <div className="min-h-screen bg-amber-50 flex items-center justify-center p-4 relative">
            {isProcessing && <LoadingOverlay message="系統處理中..." />}
            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center relative overflow-hidden">
              {!isDbReady && (
                <div className="absolute top-0 left-0 w-full h-1 bg-emerald-100">
                  <div className="h-full bg-emerald-500 animate-pulse w-1/2 rounded-r-full"></div>
                </div>
              )}
              <i className="fas fa-book-open text-6xl text-emerald-600 mx-auto mb-4 block"></i>
              <h1 className="text-3xl font-bold text-gray-800 mb-2">校園閱讀護照系統</h1>
              <p className="text-gray-500 mb-8 flex items-center justify-center space-x-2">
                <span>請選擇您的登入身份以進入系統</span>
                {isDbReady ? 
                  <span className="flex items-center text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full"><i className="fas fa-table text-[10px] mr-1"></i>連線成功</span> : 
                  <span className="flex items-center text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full"><i className="fas fa-spinner fa-spin text-[10px] mr-1"></i>連線中</span>
                }
              </p>
              
              <div className="space-y-4">
                <button 
                  disabled={!isDbReady || isProcessing}
                  onClick={() => { setCurrentUser({ role: 'student', name: '王小明', classId: 'S112001' }); setView('student_dash'); }}
                  className="w-full flex items-center justify-center space-x-2 bg-emerald-500 hover:bg-emerald-600 disabled:opacity-50 text-white p-3 rounded-lg font-medium transition-colors"
                >
                  <i className="fas fa-user text-lg"></i>
                  <span>學生登入 (王小明)</span>
                </button>
                <button 
                  disabled={!isDbReady || isProcessing}
                  onClick={() => { setCurrentUser({ role: 'admin', name: '管理員' }); setView('admin_dash'); }}
                  className="w-full flex items-center justify-center space-x-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white p-3 rounded-lg font-medium transition-colors"
                >
                  <i className="fas fa-cog text-lg"></i>
                  <span>管理者登入 (教師/行政)</span>
                </button>
              </div>
            </div>

            <CustomModal modal={modal} onClose={closeModal} />
          </div>
        );
      }

      // --- 主佈局外觀 ---
      return (
        <div className="min-h-screen bg-gray-50 flex flex-col relative">
          {isProcessing && <LoadingOverlay message="資料同步中，請稍候..." />}
          <CustomModal modal={modal} onClose={closeModal} />

          {/* 導覽列 */}
          <nav className="bg-emerald-600 text-white shadow-md p-4 sticky top-0 z-40">
            <div className="max-w-6xl mx-auto flex justify-between items-center">
              <div className="flex items-center space-x-2">
                <i className="fas fa-book-reader text-2xl"></i>
                <span className="text-xl font-bold">校園閱讀護照</span>
              </div>
              
              <div className="flex items-center space-x-4">
                <span className="text-sm bg-emerald-700 px-3 py-1 rounded-full shadow-inner">
                  {currentUser.role === 'admin' ? '管理者模式' : `學生：${currentUser.name}`}
                </span>
                <button onClick={handleLogout} className="hover:text-amber-200 transition-colors flex items-center font-medium">
                  <i className="fas fa-sign-out-alt text-lg mr-1"></i> 登出
                </button>
              </div>
            </div>
          </nav>

          {/* 隨機金句顯示區 */}
          {currentQuote && (
            <div className="bg-gradient-to-r from-amber-50 to-amber-100 border-b border-amber-200 p-4 text-center shadow-inner relative overflow-hidden">
              <i className="fas fa-quote-right absolute text-amber-200/40 text-8xl -top-6 -left-2 -z-0"></i>
              <div className="relative z-10 max-w-4xl mx-auto">
                <p className="text-amber-900 font-bold text-lg tracking-wide">「{currentQuote.title}」</p>
                <p className="text-amber-700 text-sm mt-1 opacity-80">{currentQuote.sub}</p>
              </div>
              <button 
                onClick={() => pickRandomQuote(quotes)}
                className="absolute right-4 top-1/2 -translate-y-1/2 text-amber-500 hover:text-amber-800 p-2 bg-white/50 rounded-full hover:bg-white transition-all shadow-sm"
                title="換一句"
              >
                <i className="fas fa-sync-alt"></i>
              </button>
            </div>
          )}

          {/* 主要內容區 */}
          <main className="flex-grow max-w-6xl mx-auto w-full p-4 sm:p-6 lg:p-8">
            {currentUser.role === 'student' ? (
              <StudentView 
                view={view} setView={setView} 
                reflections={reflections} 
                currentUser={currentUser}
                handleAddReflection={handleAddReflection}
              />
            ) : (
              <AdminView 
                view={view} setView={setView}
                reflections={reflections} quotes={quotes}
                handleApproveReflection={handleApproveReflection}
                handleUpdateReflection={handleUpdateReflection}
                handleDeleteReflection={handleDeleteReflection}
                handleSaveAllQuotes={handleSaveAllQuotes}
                showConfirm={showConfirm}
                showAlert={showAlert}
              />
            )}
          </main>
        </div>
      );
    }

    // ==========================================
    // 共用元件：全螢幕載入遮罩
    // ==========================================
    function LoadingOverlay({ message }) {
      return (
        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[200]">
          <div className="bg-white p-5 rounded-2xl shadow-xl flex flex-col items-center">
            <i className="fas fa-circle-notch fa-spin text-4xl text-emerald-500 mb-3"></i>
            <p className="text-gray-700 font-bold">{message}</p>
            <p className="text-xs text-gray-400 mt-1">Google Sheets 處理約需 1-3 秒</p>
          </div>
        </div>
      );
    }

    // ==========================================
    // 共用元件：自訂對話框
    // ==========================================
    function CustomModal({ modal, onClose }) {
      if (!modal.isOpen) return null;
      return (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4 animate-in fade-in duration-200">
          <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl scale-100">
            <h3 className={`text-lg font-bold mb-3 flex items-center ${modal.type === 'confirm' ? 'text-amber-600' : 'text-emerald-600'}`}>
              <i className={`fas ${modal.type === 'confirm' ? 'fa-question-circle' : 'fa-info-circle'} mr-2`}></i>
              {modal.type === 'confirm' ? '請確認' : '系統提示'}
            </h3>
            <p className="text-gray-600 mb-6 leading-relaxed whitespace-pre-line">{modal.message}</p>
            <div className="flex justify-end space-x-3">
              {modal.type === 'confirm' && (
                <button onClick={onClose} className="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium">取消</button>
              )}
              <button 
                onClick={() => { if(modal.onConfirm) modal.onConfirm(); onClose(); }} 
                className={`px-4 py-2 text-white rounded-lg font-medium shadow-sm ${modal.type === 'confirm' ? 'bg-amber-500 hover:bg-amber-600' : 'bg-emerald-600 hover:bg-emerald-700'}`}
              >
                {modal.type === 'confirm' ? '確定執行' : '我知道了'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 學生視角元件
    // ==========================================
    function StudentView({ view, setView, reflections, currentUser, handleAddReflection }) {
      const myReflections = reflections.filter(r => r.classId === currentUser.classId);
      const approvedCount = myReflections.filter(r => r.status === 'approved').length;

      return (
        <div>
          <div className="flex space-x-4 mb-6">
            <button onClick={() => setView('student_dash')} className={`px-5 py-2.5 rounded-xl font-bold shadow-sm transition-all ${view === 'student_dash' ? 'bg-emerald-600 text-white shadow-emerald-200' : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}>
              <i className="fas fa-home mr-2"></i>我的護照首頁
            </button>
            <button onClick={() => setView('student_submit')} className={`px-5 py-2.5 rounded-xl font-bold shadow-sm transition-all ${view === 'student_submit' ? 'bg-emerald-600 text-white shadow-emerald-200' : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}>
              <i className="fas fa-pen mr-2"></i>發表新心得
            </button>
          </div>

          {view === 'student_dash' && (
            <div className="space-y-6 animate-in slide-in-from-bottom-4 duration-500">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-emerald-100 flex items-center space-x-5">
                  <div className="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center flex-shrink-0">
                    <i className="fas fa-book-open text-2xl"></i>
                  </div>
                  <div>
                    <p className="text-gray-500 text-sm font-medium">累積審核通過</p>
                    <p className="text-3xl font-black text-gray-800">{approvedCount} <span className="text-lg font-medium text-gray-500">本</span></p>
                  </div>
                </div>
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-blue-100 flex items-center space-x-5">
                  <div className="w-14 h-14 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center flex-shrink-0">
                    <i className="fas fa-file-alt text-2xl"></i>
                  </div>
                  <div>
                    <p className="text-gray-500 text-sm font-medium">等待審核中</p>
                    <p className="text-3xl font-black text-gray-800">{myReflections.filter(r => r.status === 'pending').length} <span className="text-lg font-medium text-gray-500">篇</span></p>
                  </div>
                </div>
              </div>

              {/* 紀錄列表 */}
              <div className="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                <div className="p-5 bg-gray-50/80 border-b border-gray-100 flex items-center justify-between">
                  <h3 className="font-bold text-gray-800 text-lg">我的心得紀錄</h3>
                </div>
                {myReflections.length === 0 ? (
                  <div className="p-12 text-center text-gray-400">
                    <i className="fas fa-folder-open text-4xl mb-3 opacity-50 block"></i>
                    尚未發表任何心得，趕快去發表吧！
                  </div>
                ) : (
                  <ul className="divide-y divide-gray-100">
                    {myReflections.map(r => (
                      <li key={r.id} className="p-5 hover:bg-gray-50 transition-colors">
                        <div className="flex flex-col md:flex-row justify-between md:items-start gap-4">
                          <div>
                            <h4 className="font-bold text-xl text-gray-800 mb-1">{r.bookTitle}</h4>
                            <p className="text-sm text-gray-500">作者：{r.author} | 出版社：{r.publisher} | {r.pages}頁</p>
                            <span className="inline-flex items-center mt-3 text-xs px-2.5 py-1 bg-gray-100 text-gray-600 rounded-md font-medium">
                              <i className={`fas ${r.reviewType === 'text' ? 'fa-pen-nib' : 'fa-camera'} mr-1.5`}></i>
                              {r.reviewType === 'text' ? '文字心得' : '照片學習單'}
                            </span>
                          </div>
                          <div className="text-left md:text-right flex flex-row md:flex-col items-center md:items-end justify-between">
                            <span className={`inline-flex items-center px-3 py-1 rounded-full text-sm font-bold shadow-sm ${
                              r.status === 'approved' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'
                            }`}>
                              <i className={`fas ${r.status === 'approved' ? 'fa-check' : 'fa-hourglass-half'} mr-1.5 text-xs`}></i>
                              {r.status === 'approved' ? '已通過' : '審核中'}
                            </span>
                            <div className="text-xs text-gray-400 mt-0 md:mt-2 font-mono">
                              {r.timestamp ? new Date(Number(r.timestamp)).toLocaleDateString() : '未知日期'}
                            </div>
                          </div>
                        </div>
                      </li>
                    ))}
                  </ul>
                )}
              </div>
            </div>
          )}

          {view === 'student_submit' && (
            <StudentSubmitForm handleAddReflection={handleAddReflection} />
          )}
        </div>
      );
    }

    // 發表心得表單元件
    function StudentSubmitForm({ handleAddReflection }) {
      const [formData, setFormData] = useState({
        bookTitle: '', author: '', publisher: '', pages: '', 
        reviewType: 'text', review: '', image: ''
      });

      // 處理圖片轉 Base64
      const handleImageChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setFormData({...formData, image: reader.result});
          };
          reader.readAsDataURL(file);
        }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        handleAddReflection(formData);
      };

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8 max-w-3xl mx-auto animate-in fade-in duration-500">
          <h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center">
            <i className="fas fa-edit text-emerald-500 mr-2"></i> 發表閱讀心得
          </h2>
          <form onSubmit={handleSubmit} className="space-y-6">
            <div className="bg-slate-50 p-5 rounded-xl space-y-4 border border-slate-100">
              <h3 className="font-bold text-slate-700 mb-2 border-b border-slate-200 pb-2">圖書資訊 (必填)</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                  <label className="block text-sm font-bold text-slate-700 mb-1">書名 <span className="text-red-500">*</span></label>
                  <input type="text" required value={formData.bookTitle} onChange={e => setFormData({...formData, bookTitle: e.target.value})}
                    className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="例如：哈利波特" />
                </div>
                <div>
                  <label className="block text-sm font-bold text-slate-700 mb-1">作者 <span className="text-red-500">*</span></label>
                  <input type="text" required value={formData.author} onChange={e => setFormData({...formData, author: e.target.value})}
                    className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all" placeholder="例如：J.K. 羅琳" />
                </div>
                <div>
                  <label className="block text-sm font-bold text-slate-700 mb-1">出版社 <span className="text-red-500">*</span></label>
                  <input type="text" required value={formData.publisher} onChange={e => setFormData({...formData, publisher: e.target.value})}
                    className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all" placeholder="例如：皇冠" />
                </div>
                <div>
                  <label className="block text-sm font-bold text-slate-700 mb-1">頁數 <span className="text-red-500">*</span></label>
                  <input type="number" required min="1" value={formData.pages} onChange={e => setFormData({...formData, pages: e.target.value})}
                    className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all" placeholder="例如：350" />
                </div>
              </div>
            </div>

            <div>
              <label className="block text-sm font-bold text-gray-700 mb-3">
                心得類型 <span className="text-red-500">*</span>
              </label>
              <div className="flex space-x-4 mb-5">
                <label className={`flex-1 cursor-pointer border-2 rounded-xl p-4 flex flex-col items-center justify-center transition-all ${formData.reviewType === 'text' ? 'border-emerald-500 bg-emerald-50/50 shadow-sm' : 'border-gray-100 hover:border-gray-200 hover:bg-gray-50'}`}>
                  <input type="radio" name="reviewType" value="text" className="sr-only" 
                    checked={formData.reviewType === 'text'} onChange={() => setFormData({...formData, reviewType: 'text', review: '', image: ''})} />
                  <i className={`fas fa-file-alt text-3xl mb-2 ${formData.reviewType === 'text' ? 'text-emerald-600' : 'text-gray-300'}`}></i>
                  <span className={`font-bold ${formData.reviewType === 'text' ? 'text-emerald-800' : 'text-gray-500'}`}>文字心得</span>
                </label>
                <label className={`flex-1 cursor-pointer border-2 rounded-xl p-4 flex flex-col items-center justify-center transition-all ${formData.reviewType === 'photo' ? 'border-emerald-500 bg-emerald-50/50 shadow-sm' : 'border-gray-100 hover:border-gray-200 hover:bg-gray-50'}`}>
                  <input type="radio" name="reviewType" value="photo" className="sr-only" 
                    checked={formData.reviewType === 'photo'} onChange={() => setFormData({...formData, reviewType: 'photo', review: '', image: ''})} />
                  <i className={`fas fa-image text-3xl mb-2 ${formData.reviewType === 'photo' ? 'text-emerald-600' : 'text-gray-300'}`}></i>
                  <span className={`font-bold ${formData.reviewType === 'text' ? 'text-emerald-800' : 'text-gray-500'}`}>照片 (學習單)</span>
                </label>
              </div>

              {formData.reviewType === 'text' ? (
                <div className="animate-in fade-in">
                  <label className="block text-sm font-bold text-gray-700 mb-1">心得內容 <span className="text-red-500">*</span></label>
                  <textarea required rows="6" value={formData.review} onChange={e => setFormData({...formData, review: e.target.value})}
                    className="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all resize-none shadow-sm" 
                    placeholder="寫下你從這本書學到了什麼？最喜歡哪個部分？"
                  ></textarea>
                </div>
              ) : (
                <div className="border-2 border-dashed border-emerald-200 rounded-xl p-8 text-center bg-emerald-50/30 animate-in fade-in relative">
                  <i className="fas fa-cloud-upload-alt text-5xl text-emerald-300 mb-3 block"></i>
                  <p className="text-emerald-800 font-bold mb-2">點擊選擇學習單照片</p>
                  <input type="file" accept="image/*" required onChange={handleImageChange} className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-100 file:text-emerald-700 hover:file:bg-emerald-200 cursor-pointer mx-auto" />
                  {formData.image && (
                    <div className="mt-4 flex justify-center">
                      <img src={formData.image} alt="預覽" className="h-32 object-contain rounded border border-gray-200 bg-white" />
                    </div>
                  )}
                </div>
              )}
            </div>

            <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-4 rounded-xl transition-all shadow-md hover:shadow-lg flex justify-center items-center">
              <i className="fas fa-paper-plane mr-2"></i> 送出至 Google 試算表
            </button>
          </form>
        </div>
      );
    }

    // ==========================================
    // 管理者視角元件
    // ==========================================
    function AdminView({ view, setView, reflections, quotes, handleApproveReflection, handleUpdateReflection, handleDeleteReflection, handleSaveAllQuotes, showConfirm, showAlert }) {
      const NavButton = ({ targetView, iconClass, label }) => (
        <button 
          onClick={() => setView(targetView)}
          className={`flex items-center px-4 py-2.5 rounded-xl font-bold transition-all shadow-sm ${view === targetView ? 'bg-indigo-600 text-white shadow-indigo-200' : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}
        >
          <i className={`${iconClass} mr-2`}></i> {label}
        </button>
      );

      return (
        <div className="animate-in fade-in duration-500">
          <div className="flex flex-wrap gap-3 mb-6 bg-white p-2 rounded-2xl shadow-sm border border-gray-100 w-fit">
            <NavButton targetView="admin_dash" iconClass="fas fa-check-circle" label="試算表審核管理" />
            <NavButton targetView="admin_quotes" iconClass="fas fa-quote-left" label="標語/金句設定" />
            
            <a href="https://docs.google.com/spreadsheets/" target="_blank" className="flex items-center px-4 py-2.5 rounded-xl font-bold transition-all shadow-sm bg-green-50 text-green-700 border border-green-200 hover:bg-green-100 ml-auto">
              <i className="fas fa-external-link-alt mr-2"></i> 開啟 Google 試算表
            </a>
          </div>

          {view === 'admin_dash' && <AdminDashboard reflections={reflections} handleApproveReflection={handleApproveReflection} handleUpdateReflection={handleUpdateReflection} handleDeleteReflection={handleDeleteReflection} showConfirm={showConfirm} showAlert={showAlert} />}
          {view === 'admin_quotes' && <AdminQuotes quotes={quotes} handleSaveAllQuotes={handleSaveAllQuotes} showConfirm={showConfirm} />}
        </div>
      );
    }

    // 1. 心得審核管理
    function AdminDashboard({ reflections, handleApproveReflection, handleUpdateReflection, handleDeleteReflection, showConfirm, showAlert }) {
      const [filter, setFilter] = useState('pending');
      const [editingItem, setEditingItem] = useState(null); 
      const [showImageModal, setShowImageModal] = useState(null);

      const filteredData = reflections.filter(r => filter === 'all' || r.status === filter);

      const onApprove = (id) => handleApproveReflection(id);
      const onDelete = (id) => showConfirm('確定要從試算表永久刪除這筆心得嗎？', () => handleDeleteReflection(id));

      const onEditSave = (e) => {
        e.preventDefault();
        // 後端 updateRecord 只需要 payload, id。status 不會被改(後端沒寫)
        const payloadData = {
          bookTitle: editingItem.bookTitle, author: editingItem.author,
          publisher: editingItem.publisher, pages: editingItem.pages,
          reviewType: editingItem.reviewType, review: editingItem.review, image: editingItem.image
        };
        handleUpdateReflection(editingItem.id, payloadData);
        setEditingItem(null);
      };

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
          <div className="p-5 bg-slate-50 border-b border-gray-200 flex justify-between items-center flex-wrap gap-4">
            <h2 className="text-xl font-bold text-slate-800 flex items-center"><i className="fas fa-tasks text-indigo-500 mr-2"></i>學生心得列表</h2>
            <div className="flex space-x-2 bg-white p-1 rounded-lg border border-gray-200 shadow-sm">
              {['pending', 'approved', 'all'].map(status => (
                <button key={status} onClick={() => setFilter(status)} className={`px-4 py-1.5 text-sm font-bold rounded-md transition-colors ${filter === status ? 'bg-indigo-100 text-indigo-800' : 'text-gray-500 hover:bg-gray-50'}`}>
                  {status === 'pending' ? '⏳ 待審核' : status === 'approved' ? '✓ 已通過' : '全部'}
                  <span className="ml-1.5 px-1.5 py-0.5 bg-white rounded-full text-[10px] shadow-sm">{reflections.filter(r => status === 'all' || r.status === status).length}</span>
                </button>
              ))}
            </div>
          </div>

          <div className="overflow-x-auto">
            <table className="w-full text-left border-collapse">
              <thead>
                <tr className="bg-white text-gray-500 text-sm border-b-2 border-gray-100">
                  <th className="p-4 font-bold">送出日期/學生</th>
                  <th className="p-4 font-bold">書籍資訊</th>
                  <th className="p-4 font-bold w-1/3">心得內容</th>
                  <th className="p-4 font-bold">狀態</th>
                  <th className="p-4 font-bold text-center">操作</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {filteredData.length === 0 ? (
                  <tr><td colSpan="5" className="p-12 text-center text-gray-400 font-medium">無符合條件的資料</td></tr>
                ) : (
                  filteredData.map(r => (
                    <tr key={r.id} className="hover:bg-slate-50/50 transition-colors group">
                      <td className="p-4 align-top">
                        <div className="text-sm font-bold text-slate-800">{r.name}</div>
                        <div className="text-xs text-slate-500 font-mono mt-0.5">{r.classId}</div>
                        <div className="text-xs text-slate-400 mt-2 flex items-center"><i className="far fa-clock mr-1"></i>{r.timestamp ? new Date(Number(r.timestamp)).toLocaleString() : ''}</div>
                      </td>
                      <td className="p-4 align-top">
                        <div className="font-bold text-indigo-900 mb-1">{r.bookTitle}</div>
                        <div className="text-xs text-slate-600 space-y-0.5">
                          <p>作者：{r.author}</p>
                          <p>版本：{r.publisher}</p>
                          <p>頁數：{r.pages} 頁</p>
                        </div>
                      </td>
                      <td className="p-4 align-top">
                        <span className={`inline-flex items-center mb-2 text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider ${r.reviewType === 'text' ? 'bg-blue-50 text-blue-700 border border-blue-100' : 'bg-purple-50 text-purple-700 border border-purple-100'}`}>
                          {r.reviewType === 'text' ? '文字心得' : '照片/學習單'}
                        </span>
                        {r.reviewType === 'text' ? (
                          <div className="text-sm text-slate-700 line-clamp-3 bg-white p-2 rounded border border-gray-100" title={r.review}>
                            {r.review}
                          </div>
                        ) : (
                          r.image ? (
                            <button onClick={() => setShowImageModal(r.image)} className="block mt-1 text-sm bg-indigo-50 text-indigo-600 px-3 py-1 rounded hover:bg-indigo-100 transition">
                              <i className="fas fa-image mr-1"></i> 點擊檢視圖片
                            </button>
                          ) : <span className="text-gray-400 text-xs">無圖片資料</span>
                        )}
                      </td>
                      <td className="p-4 align-top">
                        <span className={`inline-flex items-center px-2.5 py-1 text-xs font-bold rounded-full shadow-sm ${r.status === 'approved' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>
                          <i className={`fas ${r.status === 'approved' ? 'fa-check-circle' : 'fa-clock'} mr-1`}></i>
                          {r.status === 'approved' ? '已通過' : '待審核'}
                        </span>
                      </td>
                      <td className="p-4 align-top">
                        <div className="flex flex-col gap-2 items-center opacity-80 group-hover:opacity-100 transition-opacity">
                          {r.status === 'pending' && (
                            <button onClick={() => onApprove(r.id)} className="w-8 h-8 flex items-center justify-center bg-emerald-50 text-emerald-600 hover:bg-emerald-500 hover:text-white rounded-lg shadow-sm transition-colors" title="核准通過">
                              <i className="fas fa-check"></i>
                            </button>
                          )}
                          <div className="flex space-x-2">
                            <button onClick={() => setEditingItem({...r})} className="w-8 h-8 flex items-center justify-center text-blue-600 bg-blue-50 hover:bg-blue-600 hover:text-white rounded-lg transition-colors" title="編修內容">
                              <i className="fas fa-edit"></i>
                            </button>
                            <button onClick={() => onDelete(r.id)} className="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-white hover:bg-rose-500 rounded-lg transition-colors" title="刪除">
                              <i className="fas fa-trash-alt"></i>
                            </button>
                          </div>
                        </div>
                      </td>
                    </tr>
                  ))
                )}
              </tbody>
            </table>
          </div>

          {/* 圖片預覽 Modal */}
          {showImageModal && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-[150] p-4 animate-in fade-in" onClick={() => setShowImageModal(null)}>
              <div className="relative max-w-4xl max-h-[90vh]" onClick={e => e.stopPropagation()}>
                <button onClick={() => setShowImageModal(null)} className="absolute -top-10 right-0 text-white hover:text-gray-300 text-3xl"><i className="fas fa-times"></i></button>
                <img src={showImageModal} alt="學習單" className="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl bg-white" />
              </div>
            </div>
          )}

          {/* 編修 Modal */}
          {editingItem && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in">
              <div className="bg-white rounded-2xl w-full max-w-2xl shadow-2xl max-h-[90vh] flex flex-col overflow-hidden">
                <div className="p-5 border-b bg-indigo-50/50 flex justify-between items-center">
                  <h3 className="text-lg font-bold text-indigo-900 flex items-center">
                    <i className="fas fa-edit text-indigo-500 mr-2"></i> 編修書籍與心得內容
                  </h3>
                  <button onClick={() => setEditingItem(null)} className="text-slate-400 hover:text-slate-600"><i className="fas fa-times text-xl"></i></button>
                </div>
                <div className="p-6 overflow-y-auto">
                  <form id="editForm" onSubmit={onEditSave} className="space-y-5">
                    <div className="grid grid-cols-2 gap-5">
                      <div>
                        <label className="block text-xs font-bold text-slate-600 mb-1">書名</label>
                        <input type="text" required value={editingItem.bookTitle} onChange={e => setEditingItem({...editingItem, bookTitle: e.target.value})} className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-600 mb-1">作者</label>
                        <input type="text" value={editingItem.author} onChange={e => setEditingItem({...editingItem, author: e.target.value})} className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-600 mb-1">出版社</label>
                        <input type="text" value={editingItem.publisher} onChange={e => setEditingItem({...editingItem, publisher: e.target.value})} className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-600 mb-1">頁數</label>
                        <input type="number" value={editingItem.pages} onChange={e => setEditingItem({...editingItem, pages: e.target.value})} className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" />
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-600 mb-1">心得內容 (若為文字心得)</label>
                      <textarea rows="4" value={editingItem.review} onChange={e => setEditingItem({...editingItem, review: e.target.value})} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
                    </div>
                  </form>
                </div>
                <div className="p-4 border-t bg-slate-50 flex justify-end space-x-3">
                  <button type="button" onClick={() => setEditingItem(null)} className="px-5 py-2.5 text-slate-600 hover:bg-slate-200 rounded-lg font-medium">取消</button>
                  <button form="editForm" type="submit" className="px-5 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-bold shadow-md">儲存變更至試算表</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 2. 標語/金句管理 (對接 Config)
    function AdminQuotes({ quotes, handleSaveAllQuotes, showConfirm }) {
      const [newQuote, setNewQuote] = useState({ title: '', sub: '' });
      const [editingIndex, setEditingIndex] = useState(null);

      const onAdd = (e) => {
        e.preventDefault();
        if (!newQuote.title) return;
        const updatedList = [...quotes, newQuote];
        handleSaveAllQuotes(updatedList, '新標語已加入清單並儲存！');
        setNewQuote({ title: '', sub: '' });
      };

      const onDelete = (index) => {
        showConfirm('確定刪除此句？', () => {
          const updatedList = quotes.filter((_, i) => i !== index);
          handleSaveAllQuotes(updatedList, '標語已刪除！');
        });
      };

      const onEditSave = (index, newTitle, newSub) => {
        const updatedList = [...quotes];
        updatedList[index] = { title: newTitle, sub: newSub };
        handleSaveAllQuotes(updatedList, '標語更新成功！');
        setEditingIndex(null);
      };

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
          <div className="p-6 bg-gradient-to-r from-indigo-50 to-white border-b border-indigo-100">
            <h2 className="text-xl font-bold text-indigo-900 flex items-center mb-2">
              <i className="fas fa-quote-left mr-2 text-indigo-500"></i> Config 設定 - 隨機標語管理
            </h2>
            <p className="text-sm text-gray-500 mb-4">系統會將以下所有句子整理成一個陣列 (Array)，直接存入 Config 表格的 A2 儲存格中。</p>
            
            <form onSubmit={onAdd} className="bg-white p-5 rounded-xl shadow-sm border border-indigo-100 flex flex-col md:flex-row gap-4 items-start md:items-center">
              <div className="flex-1 w-full relative">
                <i className="fas fa-heading absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" placeholder="主標題 (例如：讀萬卷書)" required value={newQuote.title} onChange={e => setNewQuote({...newQuote, title: e.target.value})} className="w-full pl-9 pr-3 py-2.5 border border-gray-200 rounded-lg text-sm outline-none" />
              </div>
              <div className="flex-1 w-full relative">
                <i className="fas fa-align-left absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" placeholder="副標題 (例如：行萬里路)" value={newQuote.sub} onChange={e => setNewQuote({...newQuote, sub: e.target.value})} className="w-full pl-9 pr-3 py-2.5 border border-gray-200 rounded-lg text-sm outline-none" />
              </div>
              <button type="submit" className="w-full md:w-auto px-6 py-2.5 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 shadow-md">新增寫入</button>
            </form>
          </div>

          <ul className="divide-y divide-gray-100 p-2">
            {quotes.map((q, index) => (
              <li key={index} className="p-4 hover:bg-slate-50 rounded-xl transition-colors flex flex-col md:flex-row justify-between md:items-center gap-4 m-2">
                {editingIndex === index ? (
                  <form className="flex-1 flex gap-3" onSubmit={(e) => { e.preventDefault(); onEditSave(index, e.target.title.value, e.target.sub.value); }}>
                    <input name="title" defaultValue={q.title} className="flex-1 p-2 border rounded text-sm" placeholder="主標題" required />
                    <input name="sub" defaultValue={q.sub} className="flex-1 p-2 border rounded text-sm" placeholder="副標題" />
                    <button type="submit" className="px-4 py-2 bg-emerald-500 text-white rounded-md text-sm font-bold"><i className="fas fa-check"></i></button>
                    <button type="button" onClick={() => setEditingIndex(null)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded-md text-sm font-bold"><i className="fas fa-times"></i></button>
                  </form>
                ) : (
                  <>
                    <div className="flex-1 border-l-4 border-indigo-200 pl-4 py-1">
                      <p className="font-bold text-gray-800 text-lg">{q.title}</p>
                      <p className="text-gray-500 text-sm mt-1">{q.sub}</p>
                    </div>
                    <div className="flex space-x-2">
                      <button onClick={() => setEditingIndex(index)} className="w-10 h-10 text-indigo-600 bg-indigo-50 rounded-full"><i className="fas fa-edit"></i></button>
                      <button onClick={() => onDelete(index)} className="w-10 h-10 text-rose-600 bg-rose-50 rounded-full"><i className="fas fa-trash-alt"></i></button>
                    </div>
                  </>
                )}
              </li>
            ))}
          </ul>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
